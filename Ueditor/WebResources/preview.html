<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Virtual Preview</title>
    <link rel="stylesheet" href="katex/katex.min.css">
    <script src="katex/katex.min.js"></script>
    <style>
        :root {
            --bg: transparent;
            --fg: #d4d4d4;
            --muted: #9aa0a6;
            --link: #4da3ff;
            --code-bg: #2d2d2d;
            --border: #3e3e3e;
            --font: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
            --row-height: 34px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.55;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }

        #preview-scroll {
            position: absolute;
            inset: 0;
            overflow: auto;
            padding: 0;
        }

        #html-preview {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        body.html-mode #preview-scroll {
            display: none;
        }

        body.html-mode #html-preview {
            display: block;
        }

        #virtual-spacer {
            width: 1px;
            height: var(--row-height);
        }

        #preview-viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            will-change: transform;
        }

        body:not(.wrap-enabled) #preview-viewport {
            right: auto;
            min-width: 100%;
            width: max-content;
        }

        .preview-row {
            min-height: var(--row-height);
            padding: 4px 22px;
            overflow: visible;
            border-bottom: none;
            overflow-wrap: anywhere;
        }

        .preview-row.empty {
            border-bottom-color: transparent;
        }

        .preview-row.loading {
            color: var(--muted);
            font-style: italic;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        blockquote,
        ul,
        ol,
        pre {
            margin: 0;
        }

        h1,
        h2,
        h3 {
            line-height: 1.25;
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 1.35em; }
        h2 { font-size: 1.2em; }
        h3 { font-size: 1.08em; }

        a {
            color: var(--link);
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: var(--code-bg);
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.9em;
        }

        pre {
            padding: 3px 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--code-bg);
            white-space: pre;
        }

        body.wrap-enabled pre {
            white-space: pre-wrap;
        }

        body:not(.wrap-enabled) .preview-row {
            min-width: 100%;
            width: max-content;
            overflow: visible;
            white-space: nowrap;
            overflow-wrap: normal;
        }

        body:not(.wrap-enabled) pre {
            overflow: visible;
        }

        table {
            border-collapse: collapse;
            margin: 6px 0;
            font-size: 0.9em;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 5px 10px;
            text-align: left;
        }
        th {
            background: color-mix(in srgb, var(--fg) 10%, transparent);
            font-weight: 600;
        }

        blockquote {
            padding-left: 12px;
            color: var(--muted);
            border-left: 3px solid var(--border);
        }

        .math {
            overflow: hidden;
            font-family: "Cambria Math", "Times New Roman", serif;
            text-align: center;
        }

        .math.inline {
            display: inline-block;
            overflow: visible;
            vertical-align: -0.12em;
            text-align: left;
        }

        .math.display {
            display: block;
            overflow-x: auto;
            padding: 2px 0;
        }

        .aozora {
            font-family: "Yu Mincho", "MS Mincho", "Hiragino Mincho ProN", "BIZ UDPMincho", serif;
            letter-spacing: 0.04em;
        }

        .empty-message {
            padding: 20px 22px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div id="preview-scroll">
        <div id="virtual-spacer"></div>
        <div id="preview-viewport"></div>
    </div>
    <iframe id="html-preview" sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"></iframe>

    <script>
        const scroll = document.getElementById('preview-scroll');
        const spacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('preview-viewport');
        const htmlPreview = document.getElementById('html-preview');

        const state = {
            lineCount: 1,
            rowHeight: 34,
            overscan: 20,
            mode: 'markdown',
            cache: new Map(),
            pending: new Set(),
            rowHeights: new Map(),
            wordWrap: true,
            requestSeq: 1,
            renderQueued: false,
            lastRangeKey: '',
            cacheVersion: 0
        };

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function sanitizeHtml(html) {
            const template = document.createElement('template');
            template.innerHTML = html || '';
            template.content.querySelectorAll('script, iframe, object, embed, base, link, meta').forEach(node => {
                node.replaceWith(document.createComment('blocked by Ueditor preview'));
            });
            template.content.querySelectorAll('*').forEach(node => {
                [...node.attributes].forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = attr.value.trim().toLowerCase();
                    if (name.startsWith('on') || value.startsWith('javascript:') || value.startsWith('data:text/html')) {
                        node.removeAttribute(attr.name);
                    }
                });
            });
            return template.innerHTML;
        }

        function escapeAttribute(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function htmlPreviewInjection(baseHref) {
            const base = baseHref ? `<base href="${escapeAttribute(baseHref)}">` : '';
            return `${base}<style id="ueditor-html-preview-selection-fix">html,body{min-height:100%;}body,body *{-webkit-user-select:text!important;user-select:text!important;}body{cursor:text;}</style>`;
        }

        function buildHtmlPreviewDocument(html, baseHref) {
            const source = String(html || '');
            const injection = htmlPreviewInjection(baseHref);
            if (/<head(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<head(\s[^>]*)?>/i, match => `${match}${injection}`);
            }
            if (/<html(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<html(\s[^>]*)?>/i, match => `${match}<head>${injection}</head>`);
            }
            const bodySource = source.replace(/^\s*<!doctype[^>]*>\s*/i, '');
            if (/<body(?:\s[^>]*)?>/i.test(bodySource)) {
                return `<!DOCTYPE html><html><head>${injection}</head>${bodySource}</html>`;
            }
            return `<!DOCTYPE html><html><head>${injection}</head><body>${bodySource}</body></html>`;
        }

        function setHtmlMode(enabled) {
            document.body.classList.toggle('html-mode', enabled);
            if (!enabled) {
                htmlPreview.removeAttribute('srcdoc');
            }
        }

        function renderHtmlPreview(message) {
            state.mode = 'html';
            state.cache.clear();
            state.pending.clear();
            state.rowHeights.clear();
            state.cacheVersion++;
            state.lastRangeKey = '';
            setHtmlMode(true);
            viewport.innerHTML = '';
            spacer.style.height = `${state.rowHeight}px`;
            htmlPreview.srcdoc = buildHtmlPreviewDocument(message.text || '', message.baseHref || '');
        }

        function inlineMarkdown(text) {
            const fragments = [];
            const stash = html => {
                const token = `\u0001${fragments.length}\u0001`;
                fragments.push(html);
                return token;
            };

            let out = String(text ?? '');

            out = out.replace(/`([^`]+)`/g, (_, code) => stash(`<code>${escapeHtml(code)}</code>`));
            out = stashInlineMath(out, stash);
            out = stashHtmlTags(out, stash);
            out = escapeHtml(out);

            out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, (_, label, href) => {
                return `<a href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${label}</a>`;
            });
            out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            out = out.replace(/==([^=]+)==/g, '<mark>$1</mark>');
            out = out.replace(/~~([^~]+)~~/g, '<s>$1</s>');

            fragments.forEach((fragment, index) => {
                out = out.split(`\u0001${index}\u0001`).join(fragment);
            });

            return sanitizeHtml(out);
        }

        function stashInlineMath(value, stash) {
            return value
                .replace(/\\\[([\s\S]+?)\\\]/g, (_, expr) => stash(renderLatex(expr, true)))
                .replace(/\\\(([\s\S]+?)\\\)/g, (_, expr) => stash(renderLatex(expr, false)))
                .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => stash(renderLatex(expr, true)))
                .replace(/(^|[^\w\\])\$([^$\n]+?)\$/g, (_, prefix, expr) => `${prefix}${stash(renderLatex(expr, false))}`);
        }

        function stashHtmlTags(value, stash) {
            return value.replace(/<\/?[A-Za-z][A-Za-z0-9:-]*(?:\s+[^<>]*?)?\s*\/?>/g, tag => {
                return stash(sanitizeHtml(tag));
            });
        }

        function cleanupLatex(text) {
            return (text || '')
                .replace(/\\begin\{document\}|\\end\{document\}/g, '')
                .replace(/\\\(|\\\)|\\\[|\\\]|\$\$/g, '')
                .trim();
        }

        function renderLatex(text, display) {
            const cleaned = cleanupLatex(text);
            if (!cleaned) return '';
            try {
                const html = katex.renderToString(cleaned, { displayMode: display, throwOnError: false, trust: false });
                return display
                    ? `<span class="math display">${html}</span>`
                    : `<span class="math inline">${html}</span>`;
            } catch (e) {
                return `<code>${escapeHtml(text)}</code>`;
            }
        }

        function renderLatexLine(line) {
            const text = cleanupLatex(line);
            if (!text) return '';
            try {
                return `<div class="math display">${katex.renderToString(text, { displayMode: true, throwOnError: false, trust: false })}</div>`;
            } catch (e) {
                return `<code>${escapeHtml(line)}</code>`;
            }
        }

        function renderAozoraLine(line) {
            let html = escapeHtml(line);
            html = html.replace(/《《([\s\S]+?)》》/g, '<span style="text-emphasis: sesame; -webkit-text-emphasis: sesame;">$1</span>');
            html = html.replace(/[｜|]([^《\n\r]+?)《([^》\n\r]+?)》/g, '<ruby>$1<rt>$2</rt></ruby>');
            html = html.replace(/([\u4e00-\u9faf\u3400-\u4dbf\uF900-\uFAFF]+?)《([^》\n\r]+?)》/g, '<ruby>$1<rt>$2</rt></ruby>');
            html = html.replace(/［＃太字］([\s\S]*?)［＃太字終わり］/g, '<strong>$1</strong>');
            html = html.replace(/［＃斜体］([\s\S]*?)［＃斜体終わり］/g, '<em>$1</em>');
            html = html.replace(/［＃[\s\S]*?］/g, '');
            return `<p class="aozora">${html}</p>`;
        }

        function renderMarkdownLine(line, prevLine, accumulated) {
            const trimmed = line.trim();
            if (!trimmed) return '';
            if (/^```/.test(trimmed)) return '<pre><code>```</code></pre>';

            // Table row
            if (/^\|.+\|$/.test(trimmed) && /\|/.test(trimmed.replace(/^\|/, '').replace(/\|$/, ''))) {
                const isHeader = prevLine && /^\|[-:| ]+\|$/.test(prevLine.trim());
                if (isHeader) return null;
                const cells = trimmed.split(/(?<!\\)\|/).filter(c => c !== '' || trimmed.startsWith('|'));
                const isSep = cells.every(c => /^[-:| ]+$/.test(c.trim()));
                if (isSep) return null;
                const cols = cells.map(c => {
                    const content = c.trim();
                    const isAlignedRight = /^:?-+:?$/.test(content);
                    const align = isAlignedRight ? (content.endsWith(':') && content.startsWith(':') ? 'center' : content.endsWith(':') ? 'right' : 'left') : '';
                    return align ? { content: inlineMarkdown(c), align } : inlineMarkdown(c);
                });
                const cellHtml = cols.map(c => typeof c === 'string' ? `<td>${c}</td>` : `<td style="text-align:${c.align}">${c.content}</td>`).join('');
                return `<tr>${cellHtml}</tr>`;
            }

            const heading = /^(#{1,6})\s+(.+)$/.exec(line);
            if (heading) {
                const level = Math.min(6, heading[1].length);
                return `<h${level}>${inlineMarkdown(heading[2])}</h${level}>`;
            }
            if (/^>\s?/.test(line)) return `<blockquote>${inlineMarkdown(line.replace(/^>\s?/, ''))}</blockquote>`;
            const task = /^(\s*)[-*]\s+\[( |x|X)\]\s+(.+)$/.exec(line);
            if (task) {
                const indent = Math.floor(task[1].length / 2);
                const checked = task[2].toLowerCase() === 'x' ? ' checked' : '';
                const nest = '  '.repeat(indent);
                return `${nest}<p style="margin-left:${indent * 20}px"><input type="checkbox" disabled${checked}> ${inlineMarkdown(task[3])}</p>`;
            }
            const ul = /^(\s*)[-*+]\s+(.+)$/.exec(line);
            if (ul) {
                const indent = Math.floor(ul[1].length / 2);
                const nest = '  '.repeat(indent);
                return `${nest}<ul><li style="margin-left:${indent * 20}px">${inlineMarkdown(ul[2])}</li></ul>`;
            }
            const ol = /^(\s*)\d+\.\s+(.+)$/.exec(line);
            if (ol) {
                const indent = Math.floor(ol[1].length / 2);
                const nest = '  '.repeat(indent);
                return `${nest}<ol><li style="margin-left:${indent * 20}px">${inlineMarkdown(ol[2])}</li></ol>`;
            }
            if (/^\*{3,}\s*$/.test(trimmed) || /^-{3,}\s*$/.test(trimmed) || /^_{3,}\s*$/.test(trimmed)) return '<hr>';
            if (/^\$\$[\s\S]*\$\$$/.test(trimmed)) return renderLatexLine(trimmed);
            if (/^\\\[[\s\S]*\\\]$/.test(trimmed)) return renderLatexLine(trimmed);
            if (/^<\/?[A-Za-z][A-Za-z0-9:-]*(?:\s+[^<>]*?)?\s*\/?>/.test(trimmed)) {
                return inlineMarkdown(line);
            }
            return `<p>${inlineMarkdown(line)}</p>`;
        }

        function renderLine(line) {
            if (state.mode === 'html') return sanitizeHtml(line || '');
            if (state.mode === 'latex') return renderLatexLine(line || '');
            if (state.mode === 'aozora') return renderAozoraLine(line || '');
            return renderMarkdownLine(line || '');
        }

        function applyTheme(message) {
            const theme = message.theme || 'Dark';
            const bg = message.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const fg = message.customForegroundColor || (theme === 'Light' ? '#1a1a1a' : '#d4d4d4');
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--fg', fg);
            document.documentElement.style.setProperty('--code-bg', theme === 'Light' ? '#f3f5f7' : '#2d2d2d');
            document.documentElement.style.setProperty('--border', theme === 'Light' ? '#d8dee4' : '#3e3e3e');
            document.documentElement.style.setProperty('--muted', theme === 'Light' ? '#667085' : '#9aa0a6');
            document.documentElement.style.setProperty('--font', message.uiFontFamily || '"Segoe UI", "Malgun Gothic", Arial, sans-serif');
        }

        function setupVirtualHeight() {
            spacer.style.height = `${totalVirtualHeight()}px`;
        }

        function rowHeightFor(lineNumber) {
            return state.rowHeights.get(lineNumber) || state.rowHeight;
        }

        function totalVirtualHeight() {
            let total = Math.max(1, state.lineCount) * state.rowHeight;
            for (const height of state.rowHeights.values()) {
                total += Math.max(0, height - state.rowHeight);
            }
            return total;
        }

        function rowTop(lineNumber) {
            let top = (Math.max(1, lineNumber) - 1) * state.rowHeight;
            for (const [line, height] of state.rowHeights.entries()) {
                if (line < lineNumber) {
                    top += Math.max(0, height - state.rowHeight);
                }
            }
            return top;
        }

        function lineAt(scrollTop) {
            let line = Math.min(state.lineCount, Math.max(1, Math.floor(scrollTop / state.rowHeight) + 1));
            while (line < state.lineCount && rowTop(line + 1) <= scrollTop) line++;
            while (line > 1 && rowTop(line) > scrollTop) line--;
            return line;
        }

        function initVirtualPreview(message) {
            state.mode = message.mode || 'markdown';
            state.wordWrap = message.wordWrap !== false;
            state.lineCount = Math.max(1, Number(message.lineCount || 1));
            state.cache.clear();
            state.pending.clear();
            state.rowHeights.clear();
            state.cacheVersion++;
            state.lastRangeKey = '';
            setHtmlMode(false);
            document.body.classList.toggle('wrap-enabled', state.wordWrap);
            applyTheme(message);
            setupVirtualHeight();
            receiveLineBlock(message.initialStartLine || 1, message.initialLines || []);
            queueRender(true);
        }

        function visibleRange() {
            const viewHeight = Math.max(scroll.clientHeight, state.rowHeight);
            const firstVisible = lineAt(scroll.scrollTop);
            const lastVisible = lineAt(scroll.scrollTop + viewHeight);
            const start = Math.max(1, firstVisible - state.overscan);
            const end = Math.min(state.lineCount, lastVisible + state.overscan);
            return { start, end, count: Math.max(0, end - start + 1) };
        }

        function requestLines(start, count) {
            if (count <= 0) return;
            const key = `${start}:${count}`;
            if (state.pending.has(key)) return;
            state.pending.add(key);
            post({
                type: 'previewRequestLines',
                requestId: state.requestSeq++,
                startLine: start,
                count
            });
        }

        function requestMissingLines(start, end) {
            let missingStart = 0;
            let missingCount = 0;
            for (let line = start; line <= end; line++) {
                if (!state.cache.has(line)) {
                    if (missingStart === 0) {
                        missingStart = line;
                        missingCount = 1;
                    } else {
                        missingCount++;
                    }
                } else if (missingStart !== 0) {
                    requestLines(missingStart, missingCount);
                    missingStart = 0;
                    missingCount = 0;
                }
            }
            if (missingStart !== 0) requestLines(missingStart, missingCount);
        }

        function queueRender(force = false) {
            if (force) state.lastRangeKey = '';
            if (state.renderQueued) return;
            state.renderQueued = true;
            requestAnimationFrame(() => {
                state.renderQueued = false;
                render();
            });
        }

        function render() {
            const range = visibleRange();
            requestMissingLines(range.start, range.end);
            const key = `${range.start}:${range.end}:${state.lineCount}:${state.mode}:${scroll.clientWidth}:${totalVirtualHeight()}:${state.cacheVersion}`;
            if (key === state.lastRangeKey) return;
            state.lastRangeKey = key;
            viewport.style.transform = `translateY(${rowTop(range.start)}px)`;

            const rows = [];
                let skipUntilLine = 0;
                let inTable = false;
                let tableRows = [];
                for (let lineNumber = range.start; lineNumber <= range.end; lineNumber++) {
                    if (!state.cache.has(lineNumber)) {
                        rows.push(`<div class="preview-row loading">로딩 중...</div>`);
                        continue;
                    }

                    const line = state.cache.get(lineNumber) || '';
                    const prevLine = state.cache.get(lineNumber - 1);
                    let rendered;
                    if (lineNumber <= skipUntilLine) {
                        rendered = '';
                    } else if (state.mode === 'markdown' && isDisplayMathFence(line)) {
                        const block = collectDisplayMathBlock(lineNumber, range.end);
                        if (block) {
                            rendered = renderLatexLine(block.text);
                            skipUntilLine = block.endLine;
                        } else {
                            rendered = '';
                        }
                    } else if (state.mode === 'markdown' && /^\|.+\|$/.test(line.trim())) {
                        const tr = renderMarkdownLine(line, prevLine);
                        if (tr === null) {
                            continue;
                        }
                        const isSep = line.split('|').filter(c => c.trim()).every(c => /^[-:| ]+$/.test(c.trim()));
                        if (isSep) {
                            inTable = true;
                            tableRows = [];
                            continue;
                        }
                        if (inTable || (prevLine && /^\|[-:| ]+\|$/.test(prevLine.trim()))) {
                            inTable = true;
                            tableRows.push(tr);
                            const nextLine = state.cache.get(lineNumber + 1);
                            const isLastTableRow = !nextLine || !/^\|.+\|$/.test(nextLine.trim());
                            if (isLastTableRow) {
                                rendered = `<table><thead>${tableRows[0]}</thead><tbody>${tableRows.slice(1).join('')}</tbody></table>`;
                                inTable = false;
                                tableRows = [];
                            } else {
                                rendered = '';
                            }
                        } else {
                            rendered = tr;
                        }
                    } else {
                        rendered = renderLine(line);
                    }
                    if (rendered !== undefined && rendered !== null) {
                        rows.push(`<div class="preview-row${rendered === '' ? ' empty' : ''}">${rendered}</div>`);
                    }
                }

            viewport.innerHTML = rows.join('');
            measureRenderedRows();
        }

        function isDisplayMathFence(line) {
            const trimmed = (line || '').trim();
            return trimmed === '$$' || trimmed === '\\[';
        }

        function isDisplayMathClose(line, opener) {
            const trimmed = (line || '').trim();
            return opener === '$$' ? trimmed === '$$' : trimmed === '\\]';
        }

        function collectDisplayMathBlock(startLine, maxLine) {
            const opener = (state.cache.get(startLine) || '').trim();
            const parts = [];
            for (let line = startLine + 1; line <= maxLine; line++) {
                if (!state.cache.has(line)) return null;
                const text = state.cache.get(line) || '';
                if (isDisplayMathClose(text, opener)) {
                    return {
                        text: parts.join('\n'),
                        endLine: line
                    };
                }
                parts.push(text);
            }
            return null;
        }

        function measureRenderedRows() {
            let changed = false;
            const rows = viewport.querySelectorAll('.preview-row');
            const startLine = visibleRange().start;
            rows.forEach((row, index) => {
                const lineNumber = startLine + index;
                const measured = Math.max(state.rowHeight, Math.ceil(row.scrollHeight));
                if (rowHeightFor(lineNumber) !== measured) {
                    state.rowHeights.set(lineNumber, measured);
                    changed = true;
                }
            });

            if (changed) {
                setupVirtualHeight();
                state.lastRangeKey = '';
                requestAnimationFrame(() => render());
            }
        }

        function receiveLineBlock(startLine, lines) {
            const start = Number(startLine || 1);
            const safeLines = Array.isArray(lines) ? lines : [];
            for (let i = 0; i < safeLines.length; i++) {
                state.cache.set(start + i, safeLines[i] ?? '');
            }
            state.cacheVersion++;
            for (const key of [...state.pending]) {
                const [pendingStart, pendingCount] = key.split(':').map(Number);
                const pendingEnd = pendingStart + pendingCount - 1;
                const receivedEnd = start + safeLines.length - 1;
                if (start <= pendingStart && (safeLines.length === 0 || receivedEnd >= pendingEnd || receivedEnd >= state.lineCount)) {
                    state.pending.delete(key);
                }
            }
            return safeLines.length;
        }

        function receiveLines(message) {
            receiveLineBlock(message.startLine || 1, message.lines || []);
            queueRender(true);
        }

        function renderFullFallback(message) {
            state.mode = message.mode || 'markdown';
            if (state.mode === 'html') {
                renderHtmlPreview(message);
                return;
            }
            state.wordWrap = message.wordWrap !== false;
            applyTheme(message);
            const lines = String(message.text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            state.lineCount = Math.max(1, lines.length);
            state.cache.clear();
            state.rowHeights.clear();
            lines.forEach((line, index) => state.cache.set(index + 1, line));
            state.cacheVersion++;
            setHtmlMode(false);
            document.body.classList.toggle('wrap-enabled', state.wordWrap);
            setupVirtualHeight();
            queueRender(true);
        }

        scroll.addEventListener('scroll', () => queueRender());
        window.addEventListener('resize', () => queueRender(true));
        window.addEventListener('dragover', event => event.preventDefault(), false);
        window.addEventListener('drop', event => event.preventDefault(), false);

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (message.action === 'initVirtualPreview') initVirtualPreview(message);
                else if (message.action === 'previewLines') receiveLines(message);
                else if (message.action === 'renderHtmlPreview') renderHtmlPreview(message);
                else if (message.action === 'render') renderFullFallback(message);
            });
        }
    </script>
</body>
</html>
