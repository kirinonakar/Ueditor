<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Unified Preview</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --muted: #9aa0a6;
            --link: #4da3ff;
            --code-bg: #2d2d2d;
            --border: #3e3e3e;
            --font: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.62;
        }

        #preview-container {
            height: 100%;
            overflow: auto;
            padding: 20px 22px 36px;
        }

        h1, h2, h3 {
            line-height: 1.25;
            margin: 22px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        h1:first-child, h2:first-child, h3:first-child {
            margin-top: 0;
        }

        p, ul, ol, blockquote, pre, table {
            margin: 0 0 14px;
        }

        a {
            color: var(--link);
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: var(--code-bg);
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.9em;
        }

        pre {
            padding: 14px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--code-bg);
        }

        pre code {
            padding: 0;
            background: transparent;
        }

        blockquote {
            padding: 4px 0 4px 14px;
            color: var(--muted);
            border-left: 3px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 6px 9px;
            border: 1px solid var(--border);
        }

        th {
            background: color-mix(in srgb, var(--code-bg), transparent 12%);
            text-align: left;
        }

        .math-block {
            display: block;
            overflow-x: auto;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--code-bg);
            font-family: "Cambria Math", "Times New Roman", serif;
            text-align: center;
            white-space: pre-wrap;
        }

        .latex-render {
            font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
            font-size: 1.08em;
        }

        .latex-render.display {
            display: block;
            overflow-x: auto;
            padding: 14px;
            text-align: center;
        }

        .frac {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            line-height: 1.1;
            margin: 0 0.15em;
        }

        .frac > .num {
            padding: 0 0.25em 0.12em;
            border-bottom: 1px solid currentColor;
        }

        .frac > .den {
            padding: 0.12em 0.25em 0;
        }

        .sqrt {
            display: inline-flex;
            align-items: stretch;
            margin: 0 0.1em;
        }

        .sqrt-symbol {
            font-size: 1.2em;
            line-height: 1;
        }

        .sqrt-body {
            border-top: 1px solid currentColor;
            padding: 0 0.18em;
        }

        .matrix {
            display: inline-table;
            border-collapse: collapse;
            margin: 0 0.3em;
            vertical-align: middle;
        }

        .matrix td {
            border: 0;
            padding: 0.15em 0.55em;
            text-align: center;
        }

        .matrix-wrap::before { content: "("; font-size: 2.2em; vertical-align: middle; }
        .matrix-wrap::after { content: ")"; font-size: 2.2em; vertical-align: middle; }

        .tok-keyword { color: #569cd6; }
        .tok-type { color: #4ec9b0; }
        .tok-string { color: #ce9178; }
        .tok-number { color: #b5cea8; }
        .tok-comment { color: #6a9955; font-style: italic; }
        .tok-tag { color: #569cd6; }
        .tok-attr { color: #9cdcfe; }

        .empty {
            color: var(--muted);
        }

        /* Custom scrollbar styling for seamless dark/light theme match */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: color-mix(in srgb, var(--fg) 35%, transparent);
        }
    </style>
</head>
<body>
    <div id="preview-container"><p class="empty">미리보기를 기다리는 중...</p></div>

    <script>
        const container = document.getElementById('preview-container');

        function escapeHtml(value) {
            return (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function sanitizeHtml(html) {
            const template = document.createElement('template');
            template.innerHTML = html || '';

            template.content.querySelectorAll('script, iframe, object, embed, base, link, meta').forEach(node => {
                node.replaceWith(document.createComment('blocked by Ueditor preview'));
            });

            template.content.querySelectorAll('*').forEach(node => {
                [...node.attributes].forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = attr.value.trim().toLowerCase();
                    if (name.startsWith('on') || value.startsWith('javascript:') || value.startsWith('data:text/html')) {
                        node.removeAttribute(attr.name);
                    }
                });
            });

            return template.innerHTML;
        }

        const mathBlocks = [];
        function stashMath(text) {
            // Stash $$ ... $$
            let stashed = (text || '').replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
                const placeholder = `___LATEXBLOCK_${mathBlocks.length}___`;
                mathBlocks.push({ expr, display: true });
                return placeholder;
            });
            // Stash $ ... $
            stashed = stashed.replace(/\$([^$\n]+?)\$/g, (_, expr) => {
                const placeholder = `___LATEXINLINE_${mathBlocks.length}___`;
                mathBlocks.push({ expr, display: false });
                return placeholder;
            });
            return stashed;
        }

        function unstashMath(html) {
            return html.replace(/___(LATEXBLOCK|LATEXINLINE)_(\d+)___/g, (_, type, index) => {
                const item = mathBlocks[index];
                return renderLatexInline(item.expr, item.display);
            });
        }

        function inlineMarkdown(text) {
            let out = text;
            out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
            out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            out = out.replace(/==([^=]+)==/g, '<mark>$1</mark>');
            out = out.replace(/~~([^~]+)~~/g, '<s>$1</s>');
            out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
            return out;
        }

        function tokenSpan(className, value) {
            return `<span class="${className}">${escapeHtml(value)}</span>`;
        }

        function highlightCode(text, language) {
            const lang = (language || '').toLowerCase();
            if (lang === 'html' || lang === 'xml') {
                return escapeHtml(text).replace(/(&lt;\/?)([\w:-]+)([^&]*?)(&gt;)/g, (_, open, tag, attrs, close) => {
                    const highlightedAttrs = attrs.replace(/([\w:-]+)(=)(&quot;.*?&quot;|'.*?')/g, '<span class="tok-attr">$1</span>$2<span class="tok-string">$3</span>');
                    return `${open}<span class="tok-tag">${tag}</span>${highlightedAttrs}${close}`;
                });
            }

            if (lang === 'json') {
                return escapeHtml(text)
                    .replace(/(&quot;[^&]*?&quot;)(\s*:)?/g, (_, key, colon) => colon ? `<span class="tok-attr">${key}</span>${colon}` : `<span class="tok-string">${key}</span>`)
                    .replace(/\b(true|false|null)\b/g, '<span class="tok-keyword">$1</span>')
                    .replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
            }

            const pattern = /(\/\/.*?$|\/\*[\s\S]*?\*\/|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`|\b(?:class|interface|struct|enum|namespace|using|public|private|protected|internal|static|readonly|async|await|return|if|else|switch|case|break|continue|for|foreach|while|do|try|catch|finally|throw|new|var|let|const|function|import|export|from|extends|implements|void|null|true|false|this|base|get|set|record|sealed|override|virtual)\b|\b(?:string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)\b|\b\d+(?:\.\d+)?\b)/gim;
            let html = '';
            let lastIndex = 0;
            for (const matchResult of text.matchAll(pattern)) {
                const match = matchResult[0];
                html += escapeHtml(text.slice(lastIndex, matchResult.index));
                if (match.startsWith('//') || match.startsWith('/*')) html += tokenSpan('tok-comment', match);
                else if (/^["'`]/.test(match)) html += tokenSpan('tok-string', match);
                else if (/^\d/.test(match)) html += tokenSpan('tok-number', match);
                else if (/^(string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)$/.test(match)) html += tokenSpan('tok-type', match);
                else html += tokenSpan('tok-keyword', match);
                lastIndex = matchResult.index + match.length;
            }
            html += escapeHtml(text.slice(lastIndex));
            return html;
        }

        function renderCodeBlock(code, language) {
            return `<pre><code>${highlightCode(code, language)}</code></pre>`;
        }

        function renderTable(lines) {
            const rows = lines.map(line => line.trim().replace(/^\||\|$/g, '').split('|').map(cell => inlineMarkdown(cell.trim())));
            const body = rows.map((row, index) => {
                if (index === 1 && row.every(cell => /^:?-{3,}:?$/.test(cell))) return '';
                const tag = index === 0 ? 'th' : 'td';
                return `<tr>${row.map(cell => `<${tag}>${cell}</${tag}>`).join('')}</tr>`;
            }).join('');
            return `<table>${body}</table>`;
        }

        function renderMarkdown(text) {
            if (!text || !text.trim()) {
                container.innerHTML = '<p class="empty">문서 내용이 없습니다.</p>';
                return;
            }

            mathBlocks.length = 0; // Clear previous stashes
            const stashedText = stashMath(text);

            const lines = stashedText.replace(/\r\n/g, '\n').split('\n');
            const html = [];
            let paragraph = [];
            let list = [];
            let ordered = false;
            let quote = [];
            let code = [];
            let codeLanguage = '';
            let table = [];
            let inCode = false;

            function flushParagraph() {
                if (paragraph.length) {
                    html.push(`<p>${inlineMarkdown(paragraph.join(' '))}</p>`);
                    paragraph = [];
                }
            }
            function flushList() {
                if (list.length) {
                    html.push(`<${ordered ? 'ol' : 'ul'}>${list.map(item => `<li>${inlineMarkdown(item)}</li>`).join('')}</${ordered ? 'ol' : 'ul'}>`);
                    list = [];
                }
            }
            function flushQuote() {
                if (quote.length) {
                    html.push(`<blockquote>${quote.map(inlineMarkdown).join('<br>')}</blockquote>`);
                    quote = [];
                }
            }
            function flushTable() {
                if (table.length) {
                    html.push(renderTable(table));
                    table = [];
                }
            }

            for (const raw of lines) {
                const line = raw;
                if (line.trim().startsWith('```')) {
                    if (inCode) {
                        html.push(renderCodeBlock(code.join('\n'), codeLanguage));
                        code = [];
                        codeLanguage = '';
                        inCode = false;
                    } else {
                        flushParagraph(); flushList(); flushQuote(); flushTable();
                        codeLanguage = line.trim().slice(3).trim();
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) {
                    code.push(line);
                    continue;
                }
                if (!line.trim()) {
                    flushParagraph(); flushList(); flushQuote(); flushTable();
                    continue;
                }
                if (/^\|.+\|$/.test(line.trim())) {
                    flushParagraph(); flushList(); flushQuote();
                    table.push(line);
                    continue;
                }
                flushTable();
                const heading = /^(#{1,3})\s+(.+)$/.exec(line);
                if (heading) {
                    flushParagraph(); flushList(); flushQuote();
                    html.push(`<h${heading[1].length}>${inlineMarkdown(heading[2])}</h${heading[1].length}>`);
                    continue;
                }
                const ul = /^[-*]\s+(.+)$/.exec(line);
                if (ul) {
                    flushParagraph(); flushQuote();
                    ordered = false;
                    list.push(ul[1]);
                    continue;
                }
                const ol = /^\d+\.\s+(.+)$/.exec(line);
                if (ol) {
                    flushParagraph(); flushQuote();
                    ordered = true;
                    list.push(ol[1]);
                    continue;
                }
                const bq = /^>\s?(.+)$/.exec(line);
                if (bq) {
                    flushParagraph(); flushList();
                    quote.push(bq[1]);
                    continue;
                }
                flushList(); flushQuote();
                paragraph.push(line.trim());
            }

            flushParagraph(); flushList(); flushQuote(); flushTable();
            const sanitized = sanitizeHtml(html.join('\n'));
            container.innerHTML = unstashMath(sanitized);
        }

        function renderLatex(text) {
            if (!text || !text.trim()) {
                container.innerHTML = '<p class="empty">LaTeX 내용이 없습니다.</p>';
                return;
            }

            container.innerHTML = renderLatexInline(text, true);
        }

        function renderLatexInline(text, display) {
            const cleaned = cleanupLatex(text);
            return `<span class="latex-render${display ? ' display math-block' : ''}">${renderLatexExpression(cleaned)}</span>`;
        }

        function cleanupLatex(text) {
            return (text || '')
                .replace(/\\begin\{document\}|\\end\{document\}/g, '')
                .replace(/\\\(|\\\)|\\\[|\\\]|\$\$/g, '')
                .trim();
        }

        function extractGroup(value, openIndex) {
            if (value[openIndex] !== '{') return null;
            let depth = 0;
            for (let i = openIndex; i < value.length; i++) {
                if (value[i] === '{') depth++;
                if (value[i] === '}') depth--;
                if (depth === 0) {
                    return { content: value.slice(openIndex + 1, i), end: i + 1 };
                }
            }
            return null;
        }

        function replaceCommandWithGroups(value, command, groupCount, renderer) {
            let result = '';
            let index = 0;
            while (index < value.length) {
                const found = value.indexOf(command, index);
                if (found < 0) {
                    result += value.slice(index);
                    break;
                }

                result += value.slice(index, found);
                let cursor = found + command.length;
                const groups = [];
                let ok = true;
                for (let i = 0; i < groupCount; i++) {
                    while (value[cursor] === ' ') cursor++;
                    const group = extractGroup(value, cursor);
                    if (!group) {
                        ok = false;
                        break;
                    }
                    groups.push(group.content);
                    cursor = group.end;
                }

                if (ok) {
                    result += renderer(groups);
                    index = cursor;
                } else {
                    result += command;
                    index = found + command.length;
                }
            }
            return result;
        }

        function renderLatexExpression(input) {
            let value = input;
            const fragments = [];
            const stash = html => {
                const token = `\u0000${fragments.length}\u0000`;
                fragments.push(html);
                return token;
            };

            value = renderMatrix(value, stash);
            value = replaceCommandWithGroups(value, '\\frac', 2, groups => stash(`<span class="frac"><span class="num">${renderLatexExpression(groups[0])}</span><span class="den">${renderLatexExpression(groups[1])}</span></span>`));
            value = replaceCommandWithGroups(value, '\\sqrt', 1, groups => stash(`<span class="sqrt"><span class="sqrt-symbol">√</span><span class="sqrt-body">${renderLatexExpression(groups[0])}</span></span>`));

            value = escapeHtml(value)
                .replace(/\\alpha/g, 'α').replace(/\\beta/g, 'β').replace(/\\gamma/g, 'γ').replace(/\\delta/g, 'δ')
                .replace(/\\epsilon/g, 'ε').replace(/\\theta/g, 'θ').replace(/\\lambda/g, 'λ').replace(/\\mu/g, 'μ')
                .replace(/\\pi/g, 'π').replace(/\\sigma/g, 'σ').replace(/\\phi/g, 'φ').replace(/\\omega/g, 'ω')
                .replace(/\\Gamma/g, 'Γ').replace(/\\Delta/g, 'Δ').replace(/\\Theta/g, 'Θ').replace(/\\Lambda/g, 'Λ')
                .replace(/\\Pi/g, 'Π').replace(/\\Sigma/g, 'Σ').replace(/\\Omega/g, 'Ω')
                .replace(/\\sum/g, '∑').replace(/\\int/g, '∫').replace(/\\infty/g, '∞')
                .replace(/\\times/g, '×').replace(/\\cdot/g, '·').replace(/\\leq/g, '≤').replace(/\\geq/g, '≥').replace(/\\neq/g, '≠')
                .replace(/\\rightarrow/g, '→').replace(/\\left|\\right/g, '')
                .replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>').replace(/_\{([^}]+)\}/g, '<sub>$1</sub>')
                .replace(/\^([A-Za-z0-9+\-=]+)/g, '<sup>$1</sup>').replace(/_([A-Za-z0-9+\-=]+)/g, '<sub>$1</sub>');
            fragments.forEach((fragment, index) => {
                value = value.split(`\u0000${index}\u0000`).join(fragment);
            });
            return value;
        }

        function renderMatrix(value, stash) {
            return value.replace(/\\begin\{(?:p|b)?matrix\}([\s\S]*?)\\end\{(?:p|b)?matrix\}/g, (_, body) => {
                const rows = body.trim().split(/\\\\/).map(row => row.split('&').map(cell => `<td>${renderLatexExpression(cell.trim())}</td>`).join(''));
                return stash(`<span class="matrix-wrap"><table class="matrix">${rows.map(row => `<tr>${row}</tr>`).join('')}</table></span>`);
            });
        }

        function applyTheme(message) {
            const theme = message.theme || 'Dark';
            const bg = message.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const fg = message.customForegroundColor || (theme === 'Light' ? '#1a1a1a' : '#d4d4d4');
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--fg', fg);
            document.documentElement.style.setProperty('--code-bg', theme === 'Light' ? '#f3f5f7' : '#2d2d2d');
            document.documentElement.style.setProperty('--border', theme === 'Light' ? '#d8dee4' : '#3e3e3e');
            document.documentElement.style.setProperty('--muted', theme === 'Light' ? '#667085' : '#9aa0a6');
            document.documentElement.style.setProperty('--font', message.uiFontFamily || '"Segoe UI", "Malgun Gothic", Arial, sans-serif');
        }

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (message.action !== 'render') return;

                applyTheme(message);
                if (message.mode === 'html') {
                    container.innerHTML = sanitizeHtml(message.text || '');
                } else if (message.mode === 'latex') {
                    renderLatex(message.text || '');
                } else {
                    renderMarkdown(message.text || '');
                }
            });
        }
    </script>
</body>
</html>
