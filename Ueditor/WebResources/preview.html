<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Virtual Preview</title>
    <link rel="stylesheet" href="katex/katex.min.css">
    <script src="katex/katex.min.js"></script>
    <script src="mermaid/mermaid.min.js"></script>
    <style>
        :root {
            --bg: transparent;
            --fg: #d4d4d4;
            --muted: #9aa0a6;
            --link: #4da3ff;
            --code-bg: #2d2d2d;
            --border: #3e3e3e;
            --font: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
            --row-height: 24px;
            --empty-row-height: 12px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            font-size: var(--font-size, 15px);
            line-height: 1.55;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }

        #preview-scroll {
            position: absolute;
            inset: 0;
            overflow: auto;
            padding: 0;
        }

        #html-preview {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
            overflow: auto;
            -webkit-user-select: text;
            user-select: text;
        }

        body.html-mode #preview-scroll {
            display: none;
        }

        body.html-mode #html-preview {
            display: block;
        }

        #virtual-spacer {
            width: 1px;
            height: var(--row-height);
        }

        #preview-viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            will-change: transform;
        }

        body:not(.wrap-enabled) #preview-viewport {
            right: auto;
            min-width: 100%;
            width: max-content;
        }

        .preview-row {
            min-height: var(--row-height);
            padding: 0 22px;
            overflow: visible;
            border-bottom: none;
            overflow-wrap: anywhere;
        }

        .preview-row.empty {
            min-height: var(--empty-row-height);
            height: var(--empty-row-height);
            padding-top: 0;
            padding-bottom: 0;
            border-bottom-color: transparent;
        }

        .preview-row.skipped {
            min-height: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }

        .preview-row.loading {
            color: var(--muted);
            font-style: italic;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        blockquote,
        ul,
        ol,
        pre {
            margin: 0;
        }

        h1,
        h2 {
            line-height: 1.25;
            border-bottom: 1px solid var(--border);
        }

        h3 {
            line-height: 1.25;
        }

        h1 {
            font-size: 1.35em;
        }

        h2 {
            font-size: 1.2em;
        }

        h3 {
            font-size: 1.08em;
        }

        [align="center" i] {
            text-align: center;
        }

        [align="right" i] {
            text-align: right;
        }

        [align="left" i] {
            text-align: left;
        }

        a {
            color: var(--link);
        }

        img {
            max-width: 100%;
            height: auto;
            vertical-align: middle;
        }

        p>img:only-child {
            display: block;
            margin: 6px 0;
        }

        p[align="center"]>img:only-child,
        div[align="center"]>img:only-child,
        center>img:only-child {
            margin-left: auto;
            margin-right: auto;
        }

        p[align="right"]>img:only-child,
        div[align="right"]>img:only-child {
            margin-left: auto;
            margin-right: 0;
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: var(--code-bg);
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.9em;
        }

        pre {
            padding: 16px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--code-bg);
            white-space: pre;
            line-height: 1.45;
        }

        body.wrap-enabled pre {
            white-space: pre;
        }

        pre code {
            display: block;
            padding: 0;
            border-radius: 0;
            background: transparent;
            font-size: 0.9em;
            line-height: inherit;
            white-space: inherit;
        }

        body:not(.wrap-enabled) .preview-row {
            min-width: 100%;
            width: max-content;
            overflow: visible;
            white-space: nowrap;
            overflow-wrap: normal;
        }

        body:not(.wrap-enabled) pre {
            overflow: visible;
        }

        table {
            border-collapse: collapse;
            margin: 6px 0;
            font-size: 0.9em;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 5px 10px;
            text-align: left;
        }

        th {
            background: color-mix(in srgb, var(--fg) 10%, transparent);
            font-weight: 600;
        }

        blockquote {
            padding-left: 12px;
            color: var(--muted);
            border-left: 3px solid var(--border);
        }

        .math {
            overflow: hidden;
            font-family: "Cambria Math", "Times New Roman", serif;
            text-align: center;
        }

        .math.inline {
            display: inline-block;
            overflow: visible;
            vertical-align: -0.12em;
            text-align: left;
        }

        .math.display {
            display: block;
            overflow-x: auto;
            padding: 2px 0;
        }

        .aozora {
            font-family: "Noto Serif JP", "Yu Mincho", "MS Mincho", "Hiragino Mincho ProN", "BIZ UDPMincho", serif;
            letter-spacing: 0.04em;
        }

        .empty-message {
            padding: 20px 22px;
            color: var(--muted);
        }

        .mermaid-block {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 6px 0;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-x: auto;
            min-height: 48px;
        }

        .mermaid-block svg {
            max-width: 100%;
            height: auto;
        }

        body.csv-mode #preview-viewport {
            position: relative;
            width: 100%;
            will-change: auto;
            overflow: visible;
        }

        .csv-table-wrap {
            padding: 0 22px 22px;
        }

        .csv-table-wrap table {
            font-size: 0.85em;
        }

        .csv-table-wrap th,
        .csv-table-wrap td {
            white-space: nowrap;
            padding: 4px 12px;
        }

        .csv-table-wrap td.csv-numeric {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .csv-empty {
            padding: 20px 22px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div id="preview-scroll">
        <div id="virtual-spacer"></div>
        <div id="preview-viewport"></div>
    </div>
    <iframe id="html-preview"
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"></iframe>

    <script>
        const scroll = document.getElementById('preview-scroll');
        const spacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('preview-viewport');
        const htmlPreview = document.getElementById('html-preview');

        const state = {
            lineCount: 1,
            rowHeight: 24,
            overscan: 20,
            mode: 'markdown',
            cache: new Map(),
            pending: new Set(),
            rowHeights: new Map(),
            wordWrap: true,
            baseHref: '',
            requestSeq: 1,
            renderQueued: false,
            lastRangeKey: '',
            cacheVersion: 0,
            blockContextLines: 120,
            scrollSyncEnabled: true,
            mermaidCache: new Map(),
            theme: 'Dark'
        };

        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({
                startOnLoad: false,
                securityLevel: 'loose',
                theme: 'dark'
            });
        }

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        let isSyncingScroll = false;
        let suppressPreviewScrollEvents = false;
        let scrollSuppressionToken = 0;

        function suppressPreviewScrollUntilNextFrame() {
            const token = ++scrollSuppressionToken;
            suppressPreviewScrollEvents = true;
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    if (token === scrollSuppressionToken) {
                        suppressPreviewScrollEvents = false;
                    }
                });
            });
        }

        function setPreviewScrollTopSilently(value) {
            const target = Math.max(0, Number(value || 0));
            if (Math.abs(scroll.scrollTop - target) <= 0.5) return;
            suppressPreviewScrollUntilNextFrame();
            scroll.scrollTop = target;
        }

        function trimRowHeights() {
            for (const line of [...state.rowHeights.keys()]) {
                if (line > state.lineCount) {
                    state.rowHeights.delete(line);
                }
            }
        }

        function getHtmlPreviewScrollTop() {
            try {
                const doc = htmlPreview.contentDocument;
                const win = htmlPreview.contentWindow;
                return win?.scrollY || doc?.documentElement?.scrollTop || doc?.body?.scrollTop || 0;
            } catch (e) {
                return 0;
            }
        }

        function restoreHtmlPreviewScrollTop(scrollTop) {
            try {
                htmlPreview.contentWindow?.scrollTo(0, Math.max(0, Number(scrollTop || 0)));
            } catch (e) {
                // Ignore inaccessible iframe state.
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function sanitizeHtml(html) {
            const template = document.createElement('template');
            template.innerHTML = html || '';
            template.content.querySelectorAll('script, iframe, object, embed, base, link, meta').forEach(node => {
                node.replaceWith(document.createComment('blocked by Ueditor preview'));
            });
            template.content.querySelectorAll('*').forEach(node => {
                [...node.attributes].forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = attr.value.trim().toLowerCase();
                    if (name.startsWith('on') || value.startsWith('javascript:') || value.startsWith('data:text/html')) {
                        node.removeAttribute(attr.name);
                    }
                });
            });
            rewritePreviewMediaUrls(template.content);
            return template.innerHTML;
        }

        function escapeAttribute(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function parseMarkdownImageTarget(value) {
            const target = String(value || '').trim();
            if (!target) return { src: '', title: '' };

            if (target.startsWith('<')) {
                const closeIndex = target.indexOf('>');
                if (closeIndex > 0) {
                    return {
                        src: target.slice(1, closeIndex).trim(),
                        title: parseOptionalTitle(target.slice(closeIndex + 1))
                    };
                }
            }

            const titled = /^(\S+)\s+(["'])(.*?)\2\s*$/.exec(target);
            if (titled) {
                return { src: titled[1], title: titled[3] };
            }

            return { src: target, title: '' };
        }

        function parseOptionalTitle(value) {
            const match = /^\s+(["'])(.*?)\1\s*$/.exec(String(value || ''));
            return match ? match[2] : '';
        }

        function isSafeMediaUrl(value) {
            const trimmed = String(value || '').trim().toLowerCase();
            return !!trimmed &&
                !trimmed.startsWith('javascript:') &&
                !trimmed.startsWith('vbscript:') &&
                !trimmed.startsWith('data:text/html');
        }

        function renderMarkdownImage(alt, target) {
            const parsed = parseMarkdownImageTarget(target);
            if (!isSafeMediaUrl(parsed.src)) {
                return escapeHtml(`![${alt}](${target})`);
            }

            const src = resolvePreviewResourceUrl(parsed.src);
            const title = parsed.title ? ` title="${escapeAttribute(parsed.title)}"` : '';
            return `<img src="${escapeAttribute(src)}" alt="${escapeAttribute(alt)}"${title} loading="lazy" decoding="async">`;
        }

        function resolvePreviewResourceUrl(value) {
            const raw = String(value || '').trim();
            if (!raw || !state.baseHref || raw.startsWith('#') || !isSafeMediaUrl(raw)) {
                return raw;
            }

            try {
                return new URL(raw, state.baseHref).href;
            } catch {
                return raw;
            }
        }

        function rewritePreviewMediaUrls(root) {
            root.querySelectorAll('img[src], video[src], audio[src], source[src], track[src]').forEach(node => {
                node.setAttribute('src', resolvePreviewResourceUrl(node.getAttribute('src')));
            });
            root.querySelectorAll('video[poster]').forEach(node => {
                node.setAttribute('poster', resolvePreviewResourceUrl(node.getAttribute('poster')));
            });
        }

        function htmlPreviewInjection(baseHref) {
            const base = baseHref ? `<base href="${escapeAttribute(baseHref)}">` : '';
            return `${base}<style id="ueditor-html-preview-selection-fix">html,body{min-height:100%;overflow:auto!important;-webkit-user-select:text!important;user-select:text!important;}body{cursor:text;}</style>`;
        }

        function setPreviewBaseHref(baseHref) {
            state.baseHref = String(baseHref || '');
            let base = document.getElementById('preview-base-href');
            if (!state.baseHref) {
                if (base) base.remove();
                return;
            }
            if (!base) {
                base = document.createElement('base');
                base.id = 'preview-base-href';
                document.head.appendChild(base);
            }
            base.setAttribute('href', state.baseHref);
        }

        function buildHtmlPreviewDocument(html, baseHref) {
            const source = String(html || '');
            const injection = htmlPreviewInjection(baseHref);
            if (/<head(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<head(\s[^>]*)?>/i, match => `${match}${injection}`);
            }
            if (/<html(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<html(\s[^>]*)?>/i, match => `${match}<head>${injection}</head>`);
            }
            const bodySource = source.replace(/^\s*<!doctype[^>]*>\s*/i, '');
            if (/<body(?:\s[^>]*)?>/i.test(bodySource)) {
                return `<!DOCTYPE html><html><head>${injection}</head>${bodySource}</html>`;
            }
            return `<!DOCTYPE html><html><head>${injection}</head><body>${bodySource}</body></html>`;
        }

        function setHtmlMode(enabled) {
            document.body.classList.toggle('html-mode', enabled);
            if (!enabled) {
                htmlPreview.removeAttribute('srcdoc');
            }
        }

        function renderHtmlPreview(message) {
            const previousFrameScrollTop = getHtmlPreviewScrollTop();
            state.mode = 'html';
            state.scrollSyncEnabled = message.scrollSyncEnabled !== false;
            setPreviewBaseHref(message.baseHref || '');
            state.cache.clear();
            state.pending.clear();
            state.rowHeights.clear();
            state.cacheVersion++;
            state.lastRangeKey = '';
            setHtmlMode(true);
            viewport.innerHTML = '';
            spacer.style.height = `${state.rowHeight}px`;
            htmlPreview.addEventListener('load', () => {
                restoreHtmlPreviewScrollTop(previousFrameScrollTop);
                requestAnimationFrame(() => restoreHtmlPreviewScrollTop(previousFrameScrollTop));
            }, { once: true });
            htmlPreview.srcdoc = buildHtmlPreviewDocument(message.text || '', message.baseHref || '');
        }

        function inlineMarkdown(text) {
            const fragments = [];
            const stash = html => {
                const token = `\u0001${fragments.length}\u0001`;
                fragments.push(html);
                return token;
            };

            let out = String(text ?? '');

            out = stashCodeSpans(out, stash);
            out = out.replace(/!\[([^\]]*)\]\(([^)]*)\)/g, (_, alt, target) => stash(renderMarkdownImage(alt, target)));
            out = stashInlineMath(out, stash);
            out = stashHtmlTags(out, stash);
            out = escapeHtml(out);

            out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, (_, label, href) => {
                return `<a href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${label}</a>`;
            });
            out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            out = out.replace(/==([^=]+)==/g, '<mark>$1</mark>');
            out = out.replace(/~~([^~]+)~~/g, '<s>$1</s>');

            fragments.forEach((fragment, index) => {
                out = out.split(`\u0001${index}\u0001`).join(fragment);
            });

            return sanitizeHtml(out);
        }

        function normalizeCodeSpanText(value) {
            const normalized = String(value ?? '').replace(/\s*\n\s*/g, ' ');
            if (normalized.length >= 2 &&
                normalized.startsWith(' ') &&
                normalized.endsWith(' ') &&
                /[^ ]/.test(normalized.slice(1, -1))) {
                return normalized.slice(1, -1);
            }
            return normalized;
        }

        function stashCodeSpans(value, stash) {
            const source = String(value ?? '');
            let result = '';
            let index = 0;

            while (index < source.length) {
                if (source[index] !== '`') {
                    result += source[index++];
                    continue;
                }

                const openerStart = index;
                while (index < source.length && source[index] === '`') {
                    index++;
                }

                const delimiter = source.slice(openerStart, index);
                const closeIndex = source.indexOf(delimiter, index);
                if (closeIndex < 0) {
                    result += delimiter;
                    continue;
                }

                const code = normalizeCodeSpanText(source.slice(index, closeIndex));
                result += stash(`<code>${escapeHtml(code)}</code>`);
                index = closeIndex + delimiter.length;
            }

            return result;
        }

        function stashInlineMath(value, stash) {
            return value
                .replace(/\\\[([\s\S]+?)\\\]/g, (_, expr) => stash(renderLatex(expr, true)))
                .replace(/\\\(([\s\S]+?)\\\)/g, (_, expr) => stash(renderLatex(expr, false)))
                .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => stash(renderLatex(expr, true)))
                .replace(/(^|[^\w\\])\$([^$\n]+?)\$/g, (_, prefix, expr) => `${prefix}${stash(renderLatex(expr, false))}`);
        }

        function sanitizeInlineHtmlTag(tag) {
            const raw = String(tag || '');
            const match = /^<\/?\s*([A-Za-z][A-Za-z0-9:-]*)([^<>]*?)\s*\/?>$/.exec(raw);
            if (!match) return escapeHtml(raw);

            const isClosing = /^<\s*\//.test(raw);
            const tagName = match[1].toLowerCase();
            const allowedInlineTags = new Set(['span', 'strong', 'em', 'b', 'i', 'u', 'big', 'small', 'mark', 's', 'code']);
            if (!allowedInlineTags.has(tagName)) return escapeHtml(raw);
            if (isClosing) return `</${tagName}>`;

            if (tagName === 'span') {
                const styleMatch = /\bstyle\s*=\s*(["'])(.*?)\1/i.exec(match[2] || '');
                if (styleMatch) {
                    const colorMatch = /(?:^|;)\s*color\s*:\s*(#[0-9a-fA-F]{6})\s*;?\s*(?:$|;)/i.exec(styleMatch[2]);
                    if (colorMatch) {
                        return `<span style="color: ${colorMatch[1].toUpperCase()}">`;
                    }
                }
            }

            return `<${tagName}>`;
        }

        function stashHtmlTags(value, stash) {
            return value.replace(/<\/?[A-Za-z][A-Za-z0-9:-]*(?:\s+[^<>]*?)?\s*\/?>/g, tag => {
                return stash(sanitizeInlineHtmlTag(tag));
            });
        }

        function cleanupLatex(text) {
            return (text || '')
                .replace(/\\begin\{document\}|\\end\{document\}/g, '')
                .replace(/\\\(|\\\)|\\\[|\\\]|\$\$/g, '')
                .trim();
        }

        function renderLatex(text, display) {
            const cleaned = cleanupLatex(text);
            if (!cleaned) return '';
            try {
                const html = katex.renderToString(cleaned, { displayMode: display, throwOnError: false, trust: false });
                return display
                    ? `<span class="math display">${html}</span>`
                    : `<span class="math inline">${html}</span>`;
            } catch (e) {
                return `<code>${escapeHtml(text)}</code>`;
            }
        }

        function renderLatexLine(line) {
            const text = cleanupLatex(line);
            if (!text) return '';
            try {
                return `<div class="math display">${katex.renderToString(text, { displayMode: true, throwOnError: false, trust: false })}</div>`;
            } catch (e) {
                return `<code>${escapeHtml(line)}</code>`;
            }
        }

        function renderAozoraLine(line) {
            let html = escapeHtml(line);
            html = html.replace(/《《([\s\S]+?)》》/g, '<span style="text-emphasis: sesame; -webkit-text-emphasis: sesame;">$1</span>');
            html = html.replace(/[｜|]([^《\n\r]+?)《([^》\n\r]+?)》/g, '<ruby>$1<rt>$2</rt></ruby>');
            html = html.replace(/([\u4e00-\u9faf\u3400-\u4dbf\uF900-\uFAFF]+?)《([^》\n\r]+?)》/g, '<ruby>$1<rt>$2</rt></ruby>');
            html = html.replace(/［＃太字］([\s\S]*?)［＃太字終わり］/g, '<strong>$1</strong>');
            html = html.replace(/［＃斜体］([\s\S]*?)［＃斜体終わり］/g, '<em>$1</em>');
            html = html.replace(/［＃[\s\S]*?］/g, '');
            return `<p class="aozora">${html}</p>`;
        }

        function parseCsvLine(line) {
            const cells = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"' && i + 1 < line.length && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        cells.push(current);
                        current = '';
                    } else {
                        current += ch;
                    }
                }
            }
            cells.push(current);
            return cells;
        }

        function renderCsvCell(content, tag, isNumeric) {
            const escaped = escapeHtml(content);
            const cls = isNumeric ? ' class="csv-numeric"' : '';
            return `<${tag}${cls}>${escaped || '&nbsp;'}</${tag}>`;
        }

        function renderCsvPreview(message) {
            state.mode = 'csv';
            state.scrollSyncEnabled = message.scrollSyncEnabled !== false;
            state.cache.clear();
            state.pending.clear();
            state.rowHeights.clear();
            state.cacheVersion++;
            state.lastRangeKey = '';
            setHtmlMode(false);
            document.body.classList.remove('wrap-enabled');
            document.body.classList.add('csv-mode');
            viewport.innerHTML = '';
            spacer.style.height = '0';

            const text = String(message.text || '');
            if (!text.trim()) {
                viewport.innerHTML = '<div class="csv-empty">빈 CSV 파일입니다.</div>';
                return;
            }

            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            const nonEmpty = lines.filter(l => l.trim().length > 0);
            if (nonEmpty.length === 0) {
                viewport.innerHTML = '<div class="csv-empty">빈 CSV 파일입니다.</div>';
                return;
            }

            const parsedRows = nonEmpty.map(parseCsvLine);
            const maxColumns = parsedRows.reduce((max, row) => Math.max(max, row.length), 0);

            const headerCells = parsedRows[0];
            const dataRows = parsedRows.slice(1);

            let html = '<div class="csv-table-wrap"><table>';
            html += '<thead><tr>';
            for (let i = 0; i < Math.max(headerCells.length, maxColumns); i++) {
                html += renderCsvCell(headerCells[i] || '', 'th', false);
            }
            html += '</tr></thead><tbody>';
            for (let r = 0; r < dataRows.length; r++) {
                html += '<tr>';
                for (let c = 0; c < maxColumns; c++) {
                    const val = dataRows[r][c] || '';
                    const isNumeric = /^-?\d+(\.\d+)?$/.test(val.trim());
                    html += renderCsvCell(val, 'td', isNumeric);
                }
                html += '</tr>';
            }
            html += '</tbody></table></div>';

            viewport.innerHTML = html;
        }

        function renderFencedCodeBlock(block) {
            if (block.language === 'mermaid') {
                const cachedSvg = state.mermaidCache.get(block.code);
                if (cachedSvg) {
                    return `<div class="mermaid-block rendered" data-code="${escapeAttribute(block.code)}">${cachedSvg}</div>`;
                }
                return `<div class="mermaid-block" data-code="${escapeAttribute(block.code)}">Rendering...</div>`;
            }
            const langClass = block.language
                ? ` class="language-${escapeAttribute(block.language)}"`
                : '';
            return `<pre><code${langClass}>${escapeHtml(block.code)}</code></pre>`;
        }

        function splitMarkdownTableRow(line) {
            const trimmed = String(line || '').trim();
            if (!trimmed.startsWith('|') || !trimmed.endsWith('|')) return null;

            const body = trimmed.slice(1, -1);
            const cells = [];
            let current = '';
            for (let i = 0; i < body.length; i++) {
                const ch = body[i];
                if (ch === '\\' && body[i + 1] === '|') {
                    current += '|';
                    i++;
                } else if (ch === '|') {
                    cells.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            cells.push(current.trim());
            return cells;
        }

        function isMarkdownTableSeparator(line) {
            const cells = splitMarkdownTableRow(line);
            return !!cells?.length && cells.every(cell => /^:?-{3,}:?$/.test(cell.replace(/\s+/g, '')));
        }

        function tableAlignment(separatorCell) {
            const cell = separatorCell.replace(/\s+/g, '');
            if (cell.startsWith(':') && cell.endsWith(':')) return 'center';
            if (cell.endsWith(':')) return 'right';
            return '';
        }

        function isMarkdownTableStart(lineNumber) {
            if (!state.cache.has(lineNumber) || !state.cache.has(lineNumber + 1)) return false;
            return !!splitMarkdownTableRow(state.cache.get(lineNumber)) &&
                isMarkdownTableSeparator(state.cache.get(lineNumber + 1));
        }

        function collectMarkdownTableBlock(startLine, maxLine) {
            const headerCells = splitMarkdownTableRow(state.cache.get(startLine));
            const separatorCells = splitMarkdownTableRow(state.cache.get(startLine + 1));
            if (!headerCells || !separatorCells || !isMarkdownTableSeparator(state.cache.get(startLine + 1))) {
                return null;
            }

            const bodyRows = [];
            let endLine = startLine + 1;
            for (let line = startLine + 2; line <= maxLine; line++) {
                if (!state.cache.has(line)) {
                    requestLines(line, Math.min(100, maxLine - line + 1));
                    break;
                }
                const cells = splitMarkdownTableRow(state.cache.get(line));
                if (!cells || isMarkdownTableSeparator(state.cache.get(line))) break;
                bodyRows.push(cells);
                endLine = line;
            }

            return {
                headerCells,
                alignments: separatorCells.map(tableAlignment),
                bodyRows,
                endLine
            };
        }

        function renderMarkdownTableCell(content, tag, align) {
            const hasBr = /<br\s*\/?>/i.test(content);
            const style = align ? ` style="text-align:${align}${hasBr ? ';white-space:pre-line' : ''}"` : (hasBr ? ' style="white-space:pre-line"' : '');
            const processed = content.replace(/<br\s*\/?>/gi, '\u0003');
            const rendered = inlineMarkdown(processed).replace(/\u0003/g, '<br>');
            return `<${tag}${style}>${rendered}</${tag}>`;
        }

        function renderMarkdownTableRow(cells, tag, alignments) {
            const maxColumns = Math.max(cells.length, alignments.length);
            const renderedCells = [];
            for (let index = 0; index < maxColumns; index++) {
                renderedCells.push(renderMarkdownTableCell(cells[index] || '', tag, alignments[index] || ''));
            }
            return `<tr>${renderedCells.join('')}</tr>`;
        }

        function renderMarkdownTableBlock(block) {
            const head = renderMarkdownTableRow(block.headerCells, 'th', block.alignments);
            const body = block.bodyRows
                .map(row => renderMarkdownTableRow(row, 'td', block.alignments))
                .join('');
            return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
        }

        function orderedListItemInfo(line) {
            const match = /^(\s*)(\d+)\.\s+(.+)$/.exec(line || '');
            if (!match) return null;
            return {
                indent: match[1].length,
                number: Number.parseInt(match[2], 10),
                content: match[3]
            };
        }

        function leadingWhitespaceLength(line) {
            const match = /^(\s*)/.exec(line || '');
            return match ? match[1].length : 0;
        }

        function isMarkdownOrderedListStart(lineNumber) {
            if (!state.cache.has(lineNumber)) return false;
            const current = orderedListItemInfo(state.cache.get(lineNumber));
            if (!current) return false;

            const previous = state.cache.get(lineNumber - 1);
            const previousItem = orderedListItemInfo(previous);
            return !previousItem || previousItem.indent !== current.indent;
        }

        function collectMarkdownOrderedListBlock(startLine, maxLine) {
            const first = orderedListItemInfo(state.cache.get(startLine));
            if (!first) return null;

            const items = [];
            let currentItem = null;
            let endLine = startLine;

            for (let lineNumber = startLine; lineNumber <= maxLine; lineNumber++) {
                if (!state.cache.has(lineNumber)) {
                    requestLines(lineNumber, Math.min(100, maxLine - lineNumber + 1));
                    break;
                }

                const line = state.cache.get(lineNumber) || '';
                const item = orderedListItemInfo(line);
                if (item && item.indent === first.indent) {
                    if (currentItem) items.push(currentItem);
                    currentItem = {
                        number: item.number,
                        lines: [item.content],
                        baseIndent: item.indent
                    };
                    endLine = lineNumber;
                    continue;
                }

                if (!currentItem) break;
                if (!line.trim() || leadingWhitespaceLength(line) > first.indent) {
                    currentItem.lines.push(line);
                    endLine = lineNumber;
                    continue;
                }

                break;
            }

            if (currentItem) items.push(currentItem);
            return items.length ? { startNumber: first.number, items, endLine } : null;
        }

        function stripListContinuationIndent(line, baseIndent) {
            const maxStrip = baseIndent + 4;
            let index = 0;
            while (index < line.length && index < maxStrip && line[index] === ' ') {
                index++;
            }
            return line.slice(index);
        }

        function renderListItemContinuation(lines, startIndex, item) {
            const text = stripListContinuationIndent(lines[startIndex], item.baseIndent);
            const fence = fencedCodeInfo(text);
            if (!fence) {
                return {
                    html: text.trim() ? `<p>${inlineMarkdown(text)}</p>` : '',
                    nextIndex: startIndex + 1
                };
            }

            const code = [];
            let index = startIndex + 1;
            for (; index < lines.length; index++) {
                const codeLine = stripListContinuationIndent(lines[index], item.baseIndent);
                if (isFencedCodeClose(codeLine, fence)) {
                    return {
                        html: renderFencedCodeBlock({
                            code: code.join('\n'),
                            language: fence.language
                        }),
                        nextIndex: index + 1
                    };
                }
                code.push(codeLine);
            }

            return {
                html: renderFencedCodeBlock({
                    code: code.join('\n'),
                    language: fence.language
                }),
                nextIndex: index
            };
        }

        function renderMarkdownOrderedListItem(item) {
            const chunks = [`<p>${inlineMarkdown(item.lines[0])}</p>`];
            for (let index = 1; index < item.lines.length;) {
                const rendered = renderListItemContinuation(item.lines, index, item);
                if (rendered.html) chunks.push(rendered.html);
                index = rendered.nextIndex;
            }
            return `<li>${chunks.join('')}</li>`;
        }

        function renderMarkdownOrderedListBlock(block) {
            const start = block.startNumber !== 1 ? ` start="${block.startNumber}"` : '';
            return `<ol${start}>${block.items.map(renderMarkdownOrderedListItem).join('')}</ol>`;
        }

        function renderMarkdownLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return '';
            if (isSingleLineHtmlBlock(trimmed)) return sanitizeHtml(line);

            const heading = /^(#{1,6})\s+(.+)$/.exec(line);
            if (heading) {
                const level = Math.min(6, heading[1].length);
                return `<h${level}>${inlineMarkdown(heading[2])}</h${level}>`;
            }
            if (/^>\s?/.test(line)) return `<blockquote>${inlineMarkdown(line.replace(/^>\s?/, ''))}</blockquote>`;
            const task = /^(\s*)[-*]\s+\[( |x|X)\]\s+(.+)$/.exec(line);
            if (task) {
                const indent = Math.floor(task[1].length / 2);
                const checked = task[2].toLowerCase() === 'x' ? ' checked' : '';
                const nest = '  '.repeat(indent);
                return `${nest}<p style="margin-left:${indent * 20}px"><input type="checkbox" disabled${checked}> ${inlineMarkdown(task[3])}</p>`;
            }
            const ul = /^(\s*)[-*+]\s+(.+)$/.exec(line);
            if (ul) {
                const indent = Math.floor(ul[1].length / 2);
                const nest = '  '.repeat(indent);
                return `${nest}<ul><li style="margin-left:${indent * 20}px">${inlineMarkdown(ul[2])}</li></ul>`;
            }
            const ol = /^(\s*)\d+\.\s+(.+)$/.exec(line);
            if (ol) {
                const indent = Math.floor(ol[1].length / 2);
                const nest = '  '.repeat(indent);
                return `${nest}<ol><li style="margin-left:${indent * 20}px">${inlineMarkdown(ol[2])}</li></ol>`;
            }
            if (/^\*{3,}\s*$/.test(trimmed) || /^-{3,}\s*$/.test(trimmed) || /^_{3,}\s*$/.test(trimmed)) return '<hr>';
            if (/^\$\$[\s\S]*\$\$$/.test(trimmed)) return renderLatexLine(trimmed);
            if (/^\\\[[\s\S]*\\\]$/.test(trimmed)) return renderLatexLine(trimmed);
            if (/^<\/?[A-Za-z][A-Za-z0-9:-]*(?:\s+[^<>]*?)?\s*\/?>/.test(trimmed)) {
                return inlineMarkdown(line);
            }
            return `<p>${inlineMarkdown(line)}</p>`;
        }

        function renderLine(line) {
            if (state.mode === 'html') return sanitizeHtml(line || '');
            if (state.mode === 'latex') return renderLatexLine(line || '');
            if (state.mode === 'aozora') return renderAozoraLine(line || '');
            return renderMarkdownLine(line || '');
        }

        function applyTheme(message) {
            const theme = message.theme || 'Dark';
            const previewBg = message.previewCustomBackgroundColor || message.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const previewFg = message.previewCustomForegroundColor || message.customForegroundColor || (theme === 'Light' ? '#1a1a1a' : '#d4d4d4');
            document.documentElement.style.setProperty('--bg', previewBg);
            document.documentElement.style.setProperty('--fg', previewFg);
            document.documentElement.style.setProperty('--code-bg', theme === 'Light' ? '#f3f5f7' : '#2d2d2d');
            document.documentElement.style.setProperty('--border', theme === 'Light' ? '#d8dee4' : '#3e3e3e');
            document.documentElement.style.setProperty('--muted', theme === 'Light' ? '#667085' : '#9aa0a6');
            document.documentElement.style.setProperty('--font', message.previewFontFamily || message.uiFontFamily || '"Segoe UI", "Malgun Gothic", Arial, sans-serif');
            var previewSize = message.previewFontSize || 15;
            document.documentElement.style.setProperty('--font-size', previewSize + 'px');

            state.theme = theme;
            if (typeof mermaid !== 'undefined') {
                const mermaidTheme = theme === 'Light' ? 'default' : 'dark';
                mermaid.initialize({
                    startOnLoad: false,
                    theme: mermaidTheme,
                    securityLevel: 'loose'
                });

                if (state.mermaidCache) {
                    state.mermaidCache.clear();
                }

                const blocks = viewport.querySelectorAll('.mermaid-block');
                blocks.forEach(block => {
                    block.classList.remove('rendered', 'rendering');
                    block.innerHTML = 'Rendering...';
                });
                if (blocks.length > 0) {
                    renderMermaidBlocks();
                }
            }
        }

        function setupVirtualHeight() {
            spacer.style.height = `${totalVirtualHeight()}px`;
        }

        function rowHeightFor(lineNumber) {
            return state.rowHeights.has(lineNumber) ? state.rowHeights.get(lineNumber) : state.rowHeight;
        }

        function totalVirtualHeight() {
            let total = Math.max(1, state.lineCount) * state.rowHeight;
            for (const height of state.rowHeights.values()) {
                total += Math.max(0, height) - state.rowHeight;
            }
            return Math.max(1, total);
        }

        function rowTop(lineNumber) {
            let top = (Math.max(1, lineNumber) - 1) * state.rowHeight;
            for (const [line, height] of state.rowHeights.entries()) {
                if (line < lineNumber) {
                    top += Math.max(0, height) - state.rowHeight;
                }
            }
            return top;
        }

        function lineAt(scrollTop) {
            let line = Math.min(state.lineCount, Math.max(1, Math.floor(scrollTop / state.rowHeight) + 1));
            while (line < state.lineCount && rowTop(line + 1) <= scrollTop) line++;
            while (line > 1 && rowTop(line) > scrollTop) line--;
            return line;
        }

        function initVirtualPreview(message) {
            const preserveScrollTop = scroll.scrollTop;
            const nextMode = message.mode || 'markdown';
            const nextWordWrap = message.wordWrap !== false;
            const canReuseMeasuredHeights = state.mode === nextMode && state.wordWrap === nextWordWrap;
            state.mode = nextMode;
            setPreviewBaseHref(message.baseHref || '');
            state.wordWrap = nextWordWrap;
            state.lineCount = Math.max(1, Number(message.lineCount || 1));
            state.scrollSyncEnabled = message.scrollSyncEnabled !== false;
            state.cache.clear();
            state.pending.clear();
            if (canReuseMeasuredHeights) {
                trimRowHeights();
            } else {
                state.rowHeights.clear();
            }
            state.cacheVersion++;
            state.lastRangeKey = '';
            setHtmlMode(false);
            document.body.classList.remove('csv-mode');
            document.body.classList.toggle('wrap-enabled', state.wordWrap);
            applyTheme(message);
            setupVirtualHeight();
            receiveLineBlock(message.initialStartLine || 1, message.initialLines || []);
            const maxScrollTop = Math.max(0, totalVirtualHeight() - scroll.clientHeight);
            setPreviewScrollTopSilently(Math.min(preserveScrollTop, maxScrollTop));
            queueRender(true);
        }

        function visibleRange() {
            const viewHeight = Math.max(scroll.clientHeight, state.rowHeight);
            const firstVisible = lineAt(scroll.scrollTop);
            const lastVisible = lineAt(scroll.scrollTop + viewHeight);
            const start = Math.max(1, firstVisible - state.overscan);
            const end = Math.min(state.lineCount, lastVisible + state.overscan);
            return { start, end, count: Math.max(0, end - start + 1) };
        }

        function contiguousCachedScanStart(lineNumber, maxBacktrack = 800) {
            let start = Math.max(1, lineNumber);
            const floor = Math.max(1, lineNumber - maxBacktrack);
            while (start > floor && state.cache.has(start - 1)) {
                start--;
            }
            return start;
        }

        function findOpenFencedBlockStart(lineNumber) {
            let active = null;
            const scanStart = contiguousCachedScanStart(lineNumber);
            for (let line = scanStart; line < lineNumber; line++) {
                const text = state.cache.get(line) || '';
                if (active) {
                    if (isFencedCodeClose(text, active.fence)) {
                        active = null;
                    }
                    continue;
                }

                const fence = fencedCodeInfo(text);
                if (fence) {
                    active = { startLine: line, fence };
                }
            }
            return active?.startLine || 0;
        }

        function findOpenHtmlBlockStart(lineNumber) {
            const scanStart = contiguousCachedScanStart(lineNumber);
            let active = null;
            for (let line = scanStart; line < lineNumber; line++) {
                const text = state.cache.get(line) || '';
                if (active) {
                    const closePattern = new RegExp(`</${active.tag}\\s*>`, 'i');
                    if (closePattern.test(text)) {
                        active = null;
                    }
                    continue;
                }

                const tag = htmlBlockTagName(text);
                if (tag) {
                    const closePattern = new RegExp(`</${tag}\\s*>`, 'i');
                    active = closePattern.test(text) ? null : { startLine: line, tag };
                }
            }
            return active?.startLine || 0;
        }

        function findOpenDisplayMathBlockStart(lineNumber) {
            const scanStart = contiguousCachedScanStart(lineNumber);
            let opener = '';
            let startLine = 0;
            for (let line = scanStart; line < lineNumber; line++) {
                const text = state.cache.get(line) || '';
                if (opener) {
                    if (isDisplayMathClose(text, opener)) {
                        opener = '';
                        startLine = 0;
                    }
                    continue;
                }

                if (isDisplayMathFence(text)) {
                    opener = text.trim();
                    startLine = line;
                }
            }
            return startLine;
        }

        function findMarkdownTableBlockStart(lineNumber) {
            if (!splitMarkdownTableRow(state.cache.get(lineNumber))) return 0;

            let firstRow = lineNumber;
            while (firstRow > 1 && splitMarkdownTableRow(state.cache.get(firstRow - 1))) {
                firstRow--;
            }

            for (let line = firstRow; line < lineNumber; line++) {
                if (isMarkdownTableStart(line)) {
                    return line;
                }
            }
            return 0;
        }

        function findMarkdownOrderedListBlockStart(lineNumber) {
            const scanStart = contiguousCachedScanStart(lineNumber);
            let currentStart = 0;
            let currentIndent = 0;

            for (let line = scanStart; line <= lineNumber; line++) {
                const text = state.cache.get(line) || '';
                const item = orderedListItemInfo(text);
                if (item) {
                    if (!currentStart || item.indent < currentIndent) {
                        currentStart = line;
                        currentIndent = item.indent;
                    }
                    continue;
                }

                if (!text.trim()) {
                    continue;
                }

                if (currentStart && leadingWhitespaceLength(text) > currentIndent) {
                    continue;
                }

                currentStart = 0;
                currentIndent = 0;
            }

            return currentStart && currentStart < lineNumber ? currentStart : 0;
        }

        function expandedMarkdownRangeStart(startLine) {
            if (state.mode !== 'markdown') return startLine;
            return Math.min(
                startLine,
                findOpenFencedBlockStart(startLine) || startLine,
                findOpenHtmlBlockStart(startLine) || startLine,
                findOpenDisplayMathBlockStart(startLine) || startLine,
                findMarkdownTableBlockStart(startLine) || startLine,
                findMarkdownOrderedListBlockStart(startLine) || startLine
            );
        }

        function requestLines(start, count) {
            if (count <= 0) return;
            const key = `${start}:${count}`;
            if (state.pending.has(key)) return;
            state.pending.add(key);
            post({
                type: 'previewRequestLines',
                requestId: state.requestSeq++,
                startLine: start,
                count
            });
        }

        function requestMissingLines(start, end) {
            let missingStart = 0;
            let missingCount = 0;
            for (let line = start; line <= end; line++) {
                if (!state.cache.has(line)) {
                    if (missingStart === 0) {
                        missingStart = line;
                        missingCount = 1;
                    } else {
                        missingCount++;
                    }
                } else if (missingStart !== 0) {
                    requestLines(missingStart, missingCount);
                    missingStart = 0;
                    missingCount = 0;
                }
            }
            if (missingStart !== 0) requestLines(missingStart, missingCount);
        }

        function queueRender(force = false) {
            if (force) state.lastRangeKey = '';
            if (state.renderQueued) return;
            state.renderQueued = true;
            requestAnimationFrame(() => {
                state.renderQueued = false;
                render();
            });
        }

        function render() {
            if (state.mode === 'csv') return;
            const visible = visibleRange();
            const contextStart = state.mode === 'markdown'
                ? Math.max(1, visible.start - state.blockContextLines)
                : visible.start;
            requestMissingLines(contextStart, visible.end);
            const range = {
                start: expandedMarkdownRangeStart(visible.start),
                end: visible.end
            };
            requestMissingLines(range.start, range.end);
            const key = `${visible.start}:${visible.end}:${range.start}:${range.end}:${state.lineCount}:${state.mode}:${scroll.clientWidth}:${totalVirtualHeight()}:${state.cacheVersion}`;
            if (key === state.lastRangeKey) return;
            state.lastRangeKey = key;
            viewport.style.transform = `translateY(${rowTop(range.start)}px)`;

            const rows = [];
            let skipUntilLine = 0;
            for (let lineNumber = range.start; lineNumber <= range.end; lineNumber++) {
                if (!state.cache.has(lineNumber)) {
                    rows.push(renderPreviewRow(lineNumber, '로딩 중...', 'loading'));
                    continue;
                }

                const line = state.cache.get(lineNumber) || '';
                let rendered;
                if (lineNumber <= skipUntilLine) {
                    rows.push(renderPreviewRow(lineNumber, '', 'skipped'));
                    continue;
                } else if (state.mode === 'markdown' && isFencedCodeStart(line)) {
                    const block = collectFencedCodeBlock(lineNumber, state.lineCount);
                    if (block) {
                        rendered = renderFencedCodeBlock(block);
                        skipUntilLine = block.endLine;
                        range.end = Math.max(range.end, skipUntilLine);
                    } else {
                        rendered = '';
                    }
                } else if (state.mode === 'markdown' && isHtmlBlockStart(line)) {
                    const block = collectHtmlBlock(lineNumber, state.lineCount);
                    if (block) {
                        rendered = sanitizeHtml(block.html);
                        skipUntilLine = block.endLine;
                        range.end = Math.max(range.end, skipUntilLine);
                    } else {
                        rendered = '';
                    }
                } else if (state.mode === 'markdown' && isDisplayMathFence(line)) {
                    const block = collectDisplayMathBlock(lineNumber, state.lineCount);
                    if (block) {
                        rendered = renderLatexLine(block.text);
                        skipUntilLine = block.endLine;
                        range.end = Math.max(range.end, skipUntilLine);
                    } else {
                        rendered = '';
                    }
                } else if (state.mode === 'markdown' && isMarkdownOrderedListStart(lineNumber)) {
                    const block = collectMarkdownOrderedListBlock(lineNumber, state.lineCount);
                    if (block) {
                        rendered = renderMarkdownOrderedListBlock(block);
                        skipUntilLine = block.endLine;
                        range.end = Math.max(range.end, skipUntilLine);
                    } else {
                        rendered = '';
                    }
                } else if (state.mode === 'markdown' && isMarkdownTableStart(lineNumber)) {
                    const block = collectMarkdownTableBlock(lineNumber, state.lineCount);
                    if (block) {
                        rendered = renderMarkdownTableBlock(block);
                        skipUntilLine = block.endLine;
                        range.end = Math.max(range.end, skipUntilLine);
                    } else {
                        rendered = '';
                    }
                } else {
                    rendered = renderLine(line);
                }
                if (rendered !== undefined && rendered !== null) {
                    rows.push(renderPreviewRow(lineNumber, rendered, rendered === '' ? 'empty' : ''));
                }
            }

            viewport.innerHTML = rows.join('');
            watchRenderedImages();
            renderMermaidBlocks();
            measureRenderedRows();
        }

        let mermaidCounter = 0;
        async function renderMermaidBlocks() {
            if (typeof mermaid === 'undefined') return;
            const blocks = viewport.querySelectorAll('.mermaid-block:not(.rendered)');
            if (blocks.length === 0) return;

            for (const block of blocks) {
                if (block.classList.contains('rendering') || block.classList.contains('rendered')) continue;
                block.classList.add('rendering');

                const code = block.dataset.code;
                const id = `mermaid-svg-${++mermaidCounter}`;

                try {
                    const { svg } = await mermaid.render(id, code);
                    block.innerHTML = svg;
                    block.classList.remove('rendering');
                    block.classList.add('rendered');
                    state.mermaidCache.set(code, svg);
                } catch (err) {
                    console.error('Mermaid render error:', err);
                    block.innerHTML = `<pre class="mermaid-error" style="color: #ff6b6b; padding: 10px; border: 1px solid #ff6b6b; border-radius: 4px; background: rgba(255, 107, 107, 0.1); white-space: pre-wrap;">${escapeHtml(err.message || err)}</pre>`;
                    block.classList.remove('rendering');
                    block.classList.add('rendered');

                    const badElement = document.getElementById(id);
                    if (badElement) badElement.remove();
                }
            }

            state.lastRangeKey = '';
            measureRenderedRows();
        }

        function renderPreviewRow(lineNumber, html, extraClass = '') {
            const className = `preview-row${extraClass ? ` ${extraClass}` : ''}`;
            return `<div class="${className}" data-line="${lineNumber}">${html}</div>`;
        }

        function watchRenderedImages() {
            viewport.querySelectorAll('img').forEach(img => {
                const update = () => {
                    state.lastRangeKey = '';
                    measureRenderedRows();
                };
                if (img.complete) {
                    requestAnimationFrame(update);
                } else {
                    img.addEventListener('load', update, { once: true });
                    img.addEventListener('error', update, { once: true });
                }
            });
        }

        function fencedCodeInfo(line) {
            const match = /^( {0,3})(`{3,}|~{3,})(.*)$/.exec(line || '');
            if (!match) return null;

            const info = (match[3] || '').trim();
            if (match[2].startsWith('`') && info.includes('`')) {
                return null;
            }

            return {
                marker: match[2][0],
                length: match[2].length,
                language: sanitizeLanguageName(info.split(/\s+/)[0] || '')
            };
        }

        function sanitizeLanguageName(value) {
            return String(value || '').replace(/[^A-Za-z0-9_+-]/g, '');
        }

        function isFencedCodeStart(line) {
            return fencedCodeInfo(line) !== null;
        }

        function isFencedCodeClose(line, fence) {
            const trimmed = (line || '').trim();
            if (!trimmed || !trimmed.startsWith(fence.marker.repeat(fence.length))) {
                return false;
            }

            for (const ch of trimmed) {
                if (ch !== fence.marker) return false;
            }
            return trimmed.length >= fence.length;
        }

        function collectFencedCodeBlock(startLine, maxLine) {
            const fence = fencedCodeInfo(state.cache.get(startLine));
            if (!fence) return null;

            const parts = [];
            for (let line = startLine + 1; line <= maxLine; line++) {
                if (!state.cache.has(line)) {
                    requestLines(line, Math.min(100, maxLine - line + 1));
                    return {
                        code: parts.join('\n'),
                        language: fence.language,
                        endLine: line - 1
                    };
                }
                const text = state.cache.get(line) || '';
                if (isFencedCodeClose(text, fence)) {
                    return {
                        code: parts.join('\n'),
                        language: fence.language,
                        endLine: line
                    };
                }
                parts.push(text);
            }
            return {
                code: parts.join('\n'),
                language: fence.language,
                endLine: maxLine
            };
        }

        function isDisplayMathFence(line) {
            const trimmed = (line || '').trim();
            return trimmed === '$$' || trimmed === '\\[';
        }

        function isSingleLineHtmlBlock(line) {
            const trimmed = (line || '').trim();
            const match = /^<([A-Za-z][A-Za-z0-9:-]*)(?:\s[^<>]*?)?>[\s\S]*<\/\1\s*>$/.exec(trimmed);
            if (!match) return false;

            const tag = match[1].toLowerCase();
            return [
                'h1', 'h2', 'h3', 'h4', 'h5', 'h6',
                'p', 'div', 'span', 'strong', 'em', 'b', 'i', 'u', 'big', 'small', 'center',
                'ol', 'ul', 'li', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'pre', 'code'
            ].includes(tag);
        }

        function htmlBlockTagName(line) {
            const trimmed = (line || '').trim();
            const match = /^<([A-Za-z][A-Za-z0-9:-]*)(?:\s[^<>]*?)?>\s*$/.exec(trimmed);
            if (!match || /\/>\s*$/.test(trimmed)) return '';

            const tag = match[1].toLowerCase();
            return [
                'h1', 'h2', 'h3', 'h4', 'h5', 'h6',
                'p', 'div', 'center', 'figure', 'figcaption',
                'ol', 'ul', 'li', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'pre', 'code'
            ].includes(tag) ? tag : '';
        }

        function isHtmlBlockStart(line) {
            return htmlBlockTagName(line) !== '';
        }

        function collectHtmlBlock(startLine, maxLine) {
            const tag = htmlBlockTagName(state.cache.get(startLine));
            if (!tag) return null;

            const closePattern = new RegExp(`</${tag}\\s*>`, 'i');
            const parts = [];
            for (let line = startLine; line <= maxLine; line++) {
                if (!state.cache.has(line)) {
                    requestLines(line, Math.min(100, maxLine - line + 1));
                    return {
                        html: parts.join('\n'),
                        endLine: line - 1
                    };
                }
                const text = state.cache.get(line) || '';
                parts.push(text);
                if (closePattern.test(text)) {
                    return {
                        html: parts.join('\n'),
                        endLine: line
                    };
                }
            }
            return {
                html: parts.join('\n'),
                endLine: maxLine
            };
        }

        function isDisplayMathClose(line, opener) {
            const trimmed = (line || '').trim();
            return opener === '$$' ? trimmed === '$$' : trimmed === '\\]';
        }

        function collectDisplayMathBlock(startLine, maxLine) {
            const opener = (state.cache.get(startLine) || '').trim();
            const parts = [];
            for (let line = startLine + 1; line <= maxLine; line++) {
                if (!state.cache.has(line)) {
                    requestLines(line, Math.min(100, maxLine - line + 1));
                    return {
                        text: parts.join('\n'),
                        endLine: line - 1
                    };
                }
                const text = state.cache.get(line) || '';
                if (isDisplayMathClose(text, opener)) {
                    return {
                        text: parts.join('\n'),
                        endLine: line
                    };
                }
                parts.push(text);
            }
            return {
                text: parts.join('\n'),
                endLine: maxLine
            };
        }

        function measureRenderedRows() {
            let changed = false;
            const rows = viewport.querySelectorAll('.preview-row');
            rows.forEach(row => {
                const lineNumber = Number(row.dataset.line || 0);
                if (!lineNumber) return;

                const measured = row.classList.contains('skipped')
                    ? 0
                    : Math.max(0, Math.ceil(row.getBoundingClientRect().height || row.scrollHeight || 0));
                const previous = rowHeightFor(lineNumber);
                if (Math.abs(previous - measured) > 1) {
                    state.rowHeights.set(lineNumber, measured);
                    changed = true;
                }
            });

            if (changed) {
                setupVirtualHeight();
                state.lastRangeKey = '';
                requestAnimationFrame(() => render());
            }
        }

        function receiveLineBlock(startLine, lines) {
            const start = Number(startLine || 1);
            const safeLines = Array.isArray(lines) ? lines : [];
            for (let i = 0; i < safeLines.length; i++) {
                state.cache.set(start + i, safeLines[i] ?? '');
            }
            state.cacheVersion++;
            for (const key of [...state.pending]) {
                const [pendingStart, pendingCount] = key.split(':').map(Number);
                const pendingEnd = pendingStart + pendingCount - 1;
                const receivedEnd = start + safeLines.length - 1;
                if (start <= pendingStart && (safeLines.length === 0 || receivedEnd >= pendingEnd || receivedEnd >= state.lineCount)) {
                    state.pending.delete(key);
                }
            }
            return safeLines.length;
        }

        function receiveLines(message) {
            receiveLineBlock(message.startLine || 1, message.lines || []);
            queueRender(true);
        }

        function renderFullFallback(message) {
            const preserveScrollTop = scroll.scrollTop;
            const nextMode = message.mode || 'markdown';
            const nextWordWrap = message.wordWrap !== false;
            const canReuseMeasuredHeights = state.mode === nextMode && state.wordWrap === nextWordWrap;
            state.mode = nextMode;
            state.scrollSyncEnabled = message.scrollSyncEnabled !== false;
            setPreviewBaseHref(message.baseHref || '');
            if (state.mode === 'html') {
                renderHtmlPreview(message);
                return;
            }
            state.wordWrap = nextWordWrap;
            applyTheme(message);
            const lines = String(message.text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            state.lineCount = Math.max(1, lines.length);
            state.cache.clear();
            if (canReuseMeasuredHeights) {
                trimRowHeights();
            } else {
                state.rowHeights.clear();
            }
            lines.forEach((line, index) => state.cache.set(index + 1, line));
            state.cacheVersion++;
            setHtmlMode(false);
            document.body.classList.remove('csv-mode');
            document.body.classList.toggle('wrap-enabled', state.wordWrap);
            setupVirtualHeight();
            const maxScrollTop = Math.max(0, totalVirtualHeight() - scroll.clientHeight);
            setPreviewScrollTopSilently(Math.min(preserveScrollTop, maxScrollTop));
            queueRender(true);
        }

        scroll.addEventListener('scroll', () => {
            queueRender();
            if (state.scrollSyncEnabled && !isSyncingScroll && !suppressPreviewScrollEvents) {
                const firstVisible = lineAt(scroll.scrollTop);
                const offset = scroll.scrollTop - rowTop(firstVisible);
                post({
                    type: 'previewScroll',
                    firstLine: firstVisible,
                    offset: offset
                });
            }
        });
        window.addEventListener('resize', () => queueRender(true));
        window.addEventListener('dragover', event => event.preventDefault(), false);
        window.addEventListener('drop', event => event.preventDefault(), false);

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (message.action === 'initVirtualPreview') initVirtualPreview(message);
                else if (message.action === 'previewLines') receiveLines(message);
                else if (message.action === 'renderHtmlPreview') renderHtmlPreview(message);
                else if (message.action === 'renderCsvPreview') renderCsvPreview(message);
                else if (message.action === 'render') renderFullFallback(message);
                else if (message.action === 'scrollSyncChanged') {
                    state.scrollSyncEnabled = !!message.enabled;
                }
                else if (message.action === 'syncScroll') {
                    if (state.scrollSyncEnabled && message.firstLine) {
                        isSyncingScroll = true;
                        const targetScrollTop = rowTop(message.firstLine) + (message.offset || 0);
                        setPreviewScrollTopSilently(targetScrollTop);
                        requestAnimationFrame(() => {
                            isSyncingScroll = false;
                        });
                    }
                }
            });
        }

        function handleKeyDown(event) {
            if (event.key === 'F9') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f9' });
                return;
            }
            if (event.key === 'F10') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f10' });
                return;
            }
            if (event.key === 'F12') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'f12' });
                return;
            }
            const ctrl = event.ctrlKey || event.metaKey;
            const key = event.key ? event.key.toLowerCase() : '';
            if (ctrl && key === 'f') {
                event.preventDefault();
                post({ type: 'shortcut', name: 'find' });
            }
        }

        document.addEventListener('keydown', handleKeyDown);
        htmlPreview.addEventListener('load', () => {
            try {
                htmlPreview.contentWindow.addEventListener('keydown', handleKeyDown);
            } catch (e) {
                // Ignore cross-origin errors
            }
        });
    </script>
</body>

</html>
