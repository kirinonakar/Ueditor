<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Standalone Editor</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --selection: #264f78;
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 1.45;
            --wrap: pre-wrap;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
        }

        #host {
            display: grid;
            grid-template-columns: 64px 1fr;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-family);
            font-size: var(--font-size);
        }

        #gutter {
            overflow: hidden;
            padding: 12px 8px 12px 0;
            background: var(--gutter-bg);
            color: var(--gutter-fg);
            border-right: 1px solid rgba(127, 127, 127, 0.2);
            text-align: right;
            line-height: var(--line-height);
            user-select: none;
            white-space: pre;
        }

        #editor-shell {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        #highlight,
        #editor {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            padding: 12px 14px;
            overflow: auto;
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
            white-space: var(--wrap);
            tab-size: 4;
        }

        #highlight {
            margin: 0;
            pointer-events: none;
            color: var(--fg);
            background: var(--bg);
            overflow: hidden;
        }

        #editor {
            outline: 0;
            resize: none;
            background: transparent;
            color: transparent;
            -webkit-text-fill-color: transparent;
            caret-color: var(--fg);
        }

        #editor::selection {
            background: var(--selection);
        }

        .tok-keyword { color: #569cd6; }
        .tok-type { color: #4ec9b0; }
        .tok-string { color: #ce9178; }
        .tok-number { color: #b5cea8; }
        .tok-comment { color: #6a9955; font-style: italic; }
        .tok-operator { color: #d4d4d4; }
        .tok-tag { color: #569cd6; }
        .tok-attr { color: #9cdcfe; }
        .tok-md { color: #d7ba7d; font-weight: 600; }
    </style>
</head>
<body>
    <div id="host">
        <div id="gutter">1</div>
        <div id="editor-shell">
            <pre id="highlight" aria-hidden="true"></pre>
            <textarea id="editor" spellcheck="false"></textarea>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const highlight = document.getElementById('highlight');
        const gutter = document.getElementById('gutter');
        let isProgrammaticChange = false;
        let tabSize = 4;
        let currentLanguage = 'plaintext';

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function lineCount() {
            return Math.max(1, editor.value.split(/\r\n|\r|\n/).length);
        }

        function updateGutter() {
            const count = lineCount();
            let text = "";
            for (let i = 1; i <= count; i++) {
                text += i + (i === count ? "" : "\n");
            }
            gutter.textContent = text;
            gutter.scrollTop = editor.scrollTop;
        }

        function escapeHtml(value) {
            return (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function tokenSpan(className, value) {
            return `<span class="${className}">${escapeHtml(value)}</span>`;
        }

        function highlightPlain(text) {
            return escapeHtml(text);
        }

        function highlightCodeLike(text) {
            const pattern = /(\/\/.*?$|\/\*[\s\S]*?\*\/|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`|\b(?:class|interface|struct|enum|namespace|using|public|private|protected|internal|static|readonly|async|await|return|if|else|switch|case|break|continue|for|foreach|while|do|try|catch|finally|throw|new|var|let|const|function|import|export|from|extends|implements|void|null|true|false|this|base|get|set|record|sealed|override|virtual)\b|\b(?:string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)\b|\b\d+(?:\.\d+)?\b)/gim;
            let html = '';
            let lastIndex = 0;
            for (const matchResult of text.matchAll(pattern)) {
                const match = matchResult[0];
                html += escapeHtml(text.slice(lastIndex, matchResult.index));
                if (match.startsWith('//') || match.startsWith('/*')) html += tokenSpan('tok-comment', match);
                else if (/^["'`]/.test(match)) html += tokenSpan('tok-string', match);
                else if (/^\d/.test(match)) html += tokenSpan('tok-number', match);
                else if (/^(string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)$/.test(match)) html += tokenSpan('tok-type', match);
                else html += tokenSpan('tok-keyword', match);
                lastIndex = matchResult.index + match.length;
            }
            html += escapeHtml(text.slice(lastIndex));
            return html;
        }

        function highlightJson(text) {
            return escapeHtml(text)
                .replace(/(&quot;[^&]*?&quot;)(\s*:)?/g, (_, key, colon) => colon ? `${tokenSpan('tok-attr', key.replace(/&quot;/g, '"'))}${colon}` : tokenSpan('tok-string', key.replace(/&quot;/g, '"')))
                .replace(/\b(true|false|null)\b/g, '<span class="tok-keyword">$1</span>')
                .replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
        }

        function highlightMarkup(text) {
            return escapeHtml(text).replace(/(&lt;\/?)([\w:-]+)([^&]*?)(&gt;)/g, (_, open, tag, attrs, close) => {
                const highlightedAttrs = attrs.replace(/([\w:-]+)(=)(&quot;.*?&quot;|'.*?')/g, '<span class="tok-attr">$1</span>$2<span class="tok-string">$3</span>');
                return `${open}<span class="tok-tag">${tag}</span>${highlightedAttrs}${close}`;
            });
        }

        function highlightMarkdown(text) {
            return escapeHtml(text)
                .replace(/^((?:#{1,6}|>|[-*]|\d+\.)\s.*)$/gm, '<span class="tok-md">$1</span>')
                .replace(/(`[^`]+`)/g, '<span class="tok-string">$1</span>')
                .replace(/(\*\*[^*]+\*\*|\*[^*]+\*|==[^=]+==|~~[^~]+~~)/g, '<span class="tok-md">$1</span>');
        }

        function updateHighlight() {
            const text = editor.value || ' ';
            let html;
            if (currentLanguage === 'html' || currentLanguage === 'xml') {
                html = highlightMarkup(text);
            } else if (currentLanguage === 'json') {
                html = highlightJson(text);
            } else if (currentLanguage === 'markdown' || currentLanguage === 'latex') {
                html = highlightMarkdown(text);
            } else if (currentLanguage === 'plaintext') {
                html = highlightPlain(text);
            } else {
                html = highlightCodeLike(text);
            }

            highlight.innerHTML = html + (text.endsWith('\n') ? ' ' : '');
            syncHighlightScroll();
        }

        function syncHighlightScroll() {
            gutter.scrollTop = editor.scrollTop;
            highlight.style.transform = `translate(${-editor.scrollLeft}px, ${-editor.scrollTop}px)`;
        }

        function reportCursorAndSelection() {
            const pos = editor.selectionStart || 0;
            const before = editor.value.slice(0, pos);
            const lines = before.split(/\r\n|\r|\n/);
            post({ type: 'cursorChanged', line: lines.length, column: lines[lines.length - 1].length + 1 });
            post({ type: 'selectionResult', text: editor.value.substring(editor.selectionStart, editor.selectionEnd) });
        }

        function notifyContentChanged() {
            if (isProgrammaticChange) return;
            updateGutter();
            updateHighlight();
            post({ type: 'contentChanged', content: editor.value });
        }

        function selectedText() {
            return editor.value.substring(editor.selectionStart, editor.selectionEnd);
        }

        function replaceSelection(text, selectStartOffset = null, selectEndOffset = null) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.setRangeText(text, start, end, 'end');

            if (selectStartOffset !== null && selectEndOffset !== null) {
                editor.selectionStart = start + selectStartOffset;
                editor.selectionEnd = start + selectEndOffset;
            }

            editor.focus();
            notifyContentChanged();
            reportCursorAndSelection();
        }

        function wrapSelection(prefix, suffix, placeholder) {
            const current = selectedText() || placeholder;
            const text = `${prefix}${current}${suffix}`;
            replaceSelection(text, prefix.length, prefix.length + current.length);
        }

        function applyMarkdownCommand(command) {
            const current = selectedText();
            switch (command) {
                case 'bold':
                    wrapSelection('**', '**', '굵은 텍스트');
                    break;
                case 'italic':
                    wrapSelection('*', '*', '기울임 텍스트');
                    break;
                case 'underline':
                    wrapSelection('<u>', '</u>', '밑줄 텍스트');
                    break;
                case 'highlight':
                    wrapSelection('==', '==', '강조 텍스트');
                    break;
                case 'inlineCode':
                    wrapSelection('`', '`', 'code');
                    break;
                case 'codeBlock':
                    wrapSelection('```\n', '\n```', current || 'code');
                    break;
                case 'heading':
                    replaceSelection(`# ${current || '제목'}`, 2, 2 + (current || '제목').length);
                    break;
                case 'link':
                    wrapSelection('[', '](https://example.com)', current || '링크 텍스트');
                    break;
                case 'quote':
                    replaceSelection((current || '인용문').split(/\r?\n/).map(line => `> ${line}`).join('\n'));
                    break;
                case 'ul':
                    replaceSelection((current || '목록 항목').split(/\r?\n/).map(line => `- ${line}`).join('\n'));
                    break;
                case 'ol':
                    replaceSelection((current || '목록 항목').split(/\r?\n/).map((line, idx) => `${idx + 1}. ${line}`).join('\n'));
                    break;
                case 'task':
                    replaceSelection((current || '할 일').split(/\r?\n/).map(line => `- [ ] ${line}`).join('\n'));
                    break;
                case 'table':
                    replaceSelection('| 항목 | 값 |\n| --- | --- |\n| A | B |');
                    break;
                case 'math':
                    wrapSelection('$$\n', '\n$$', current || 'E = mc^2');
                    break;
                case 'arrow':
                    replaceSelection(current ? `${current} → ` : '→ ');
                    break;
                case 'fontIncrease':
                    wrapSelection('<span style="font-size:1.2em">', '</span>', current || '큰 글자');
                    break;
                case 'fontDecrease':
                    wrapSelection('<span style="font-size:0.85em">', '</span>', current || '작은 글자');
                    break;
                case 'textColor':
                    wrapSelection('<span style="color:#E53935">', '</span>', current || '색상 텍스트');
                    break;
                case 'cutLine':
                    wrapSelection('~~', '~~', current || '취소선 텍스트');
                    break;
            }
        }

        function handleCsharpMessage(msg) {
            switch (msg.action) {
                case 'setText':
                    isProgrammaticChange = true;
                    editor.value = msg.text || "";
                    isProgrammaticChange = false;
                    updateGutter();
                    updateHighlight();
                    reportCursorAndSelection();
                    break;
                case 'setLanguage':
                    currentLanguage = msg.language || 'plaintext';
                    updateHighlight();
                    break;
                case 'updateOptions':
                    const theme = msg.theme || 'Dark';
                    const bg = msg.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
                    const fg = msg.customForegroundColor || (theme === 'Light' ? '#111111' : '#d4d4d4');
                    document.documentElement.style.setProperty('--bg', bg);
                    document.documentElement.style.setProperty('--fg', fg);
                    document.documentElement.style.setProperty('--gutter-bg', theme === 'Light' ? '#f3f3f3' : '#252526');
                    document.documentElement.style.setProperty('--gutter-fg', theme === 'Light' ? '#6b6b6b' : '#858585');
                    document.documentElement.style.setProperty('--font-size', `${msg.fontSize || 14}px`);
                    document.documentElement.style.setProperty('--font-family', msg.fontFamily || 'Consolas, "Courier New", monospace');
                    document.documentElement.style.setProperty('--wrap', msg.wordWrap ? 'pre-wrap' : 'pre');
                    editor.style.overflowWrap = msg.wordWrap ? 'break-word' : 'normal';
                    editor.readOnly = !!msg.readOnly;
                    tabSize = msg.tabSize || 4;
                    editor.style.tabSize = tabSize;
                    highlight.style.tabSize = tabSize;
                    updateHighlight();
                    break;
                case 'triggerFind':
                    editor.focus();
                    document.execCommand('find');
                    break;
                case 'getSelection':
                    post({ type: 'selectionResult', text: selectedText() });
                    break;
                case 'insertText':
                    replaceSelection(msg.text || "");
                    break;
                case 'markdownCommand':
                    applyMarkdownCommand(msg.command);
                    break;
                case 'revealLine':
                    const lines = editor.value.split(/\r\n|\r|\n/);
                    let offset = 0;
                    for (let i = 0; i < Math.min((msg.lineNumber || 1) - 1, lines.length); i++) {
                        offset += lines[i].length + 1;
                    }
                    editor.selectionStart = editor.selectionEnd = offset;
                    editor.focus();
                    reportCursorAndSelection();
                    break;
                case 'focus':
                    editor.focus();
                    break;
            }
        }

        editor.addEventListener('input', notifyContentChanged);
        editor.addEventListener('scroll', syncHighlightScroll);
        editor.addEventListener('keyup', reportCursorAndSelection);
        editor.addEventListener('click', reportCursorAndSelection);
        editor.addEventListener('select', reportCursorAndSelection);
        editor.addEventListener('keydown', event => {
            if (event.key === 'Tab') {
                event.preventDefault();
                replaceSelection(' '.repeat(tabSize));
            }
        });

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                handleCsharpMessage(msg);
            });
        }

        updateGutter();
        post({ type: 'ready', standalone: true });
    </script>
</body>
</html>
