<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Virtual Editor</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --row-hover: rgba(127, 127, 127, 0.12);
            --selection: rgba(0, 120, 212, 0.38);
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 22px;
            --gutter-width: 56px;
            --wrap: pre;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-family);
            font-size: var(--font-size);
        }

        ::selection {
            background: var(--selection);
        }

        body.selecting ::selection,
        body.custom-selection-active ::selection {
            background: transparent !important;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }

        #editor-host {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        #scroll-container {
            position: absolute;
            inset: 0;
            overflow: auto;
            background: var(--bg);
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
        }

        #virtual-spacer {
            width: 1px;
            height: var(--line-height);
            pointer-events: none;
        }

        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            min-width: 100%;
            will-change: transform;
        }

        #viewport::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: var(--gutter-width);
            background: var(--gutter-bg);
            border-right: 1px solid rgba(127, 127, 127, 0.22);
            pointer-events: none;
        }

        body:not(.wrap-enabled) #viewport {
            right: auto;
            width: max-content;
        }

        .line-row {
            position: relative;
            display: grid;
            grid-template-columns: var(--gutter-width) max-content;
            min-width: 100%;
            min-height: var(--line-height);
            line-height: var(--line-height);
            contain: layout style paint;
        }

        body.wrap-enabled .line-row {
            grid-template-columns: var(--gutter-width) minmax(0, 1fr);
            width: 100%;
        }

        body:not(.wrap-enabled) .line-row {
            width: max-content;
        }

        .line-row:hover {
            background: var(--row-hover);
        }

        .line-row.selected-empty-row .line-text {
            background: var(--selection);
        }

        .line-number {
            align-self: stretch;
            min-height: var(--line-height);
            padding: 0 8px 0 8px;
            overflow: hidden;
            color: var(--gutter-fg);
            font-size: 12px;
            text-align: right;
            user-select: none;
        }

        .line-text {
            min-width: calc(100vw - var(--gutter-width));
            min-height: var(--line-height);
            padding: 0 14px;
            overflow: hidden;
            outline: none;
            color: var(--fg);
            white-space: var(--wrap);
            overflow-wrap: normal;
            tab-size: 4;
            caret-color: var(--fg);
            user-select: text;
            -webkit-user-select: text;
        }

        body:not(.wrap-enabled) .line-text {
            width: max-content;
            min-width: calc(100vw - var(--gutter-width));
            overflow: visible;
        }

        body.wrap-enabled .line-text {
            min-width: 0;
            width: 100%;
            overflow: visible;
            overflow-wrap: anywhere;
        }

        .line-text[contenteditable="true"]:focus {
            background: color-mix(in srgb, var(--fg) 8%, transparent);
        }

        .line-text.loading {
            color: var(--gutter-fg);
            font-style: italic;
        }

        .line-text.long-line {
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            cursor: not-allowed;
        }

        mark.search-match {
            background: #ffd43b;
            color: #212529;
            border-radius: 2px;
            padding: 0 1px;
        }

        mark.active-match {
            background: #fd7e14;
            color: #ffffff;
            box-shadow: 0 0 3px rgba(253, 126, 20, 0.6);
        }

        .selection-fragment {
            background: var(--selection);
            color: inherit;
        }

        .editable-selection-overlay {
            position: absolute;
            z-index: 3;
            pointer-events: none;
            background: var(--selection);
        }

        .column-cursor {
            border-left: 2px solid #0078d4; /* Premium Windows Blue Caret */
            margin-left: -2px;
            position: relative;
            z-index: 2;
        }

        #find-panel {
            position: absolute;
            top: 10px;
            right: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 12px;
        }

        #find-panel[hidden] {
            display: none;
        }

        #context-menu {
            position: fixed;
            z-index: 50;
            min-width: 156px;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 13px;
        }

        #context-menu[hidden] {
            display: none;
        }

        .context-menu-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 28px;
            padding: 0 10px;
            border: 0;
            border-radius: 3px;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
        }

        .context-menu-button:hover:not(:disabled) {
            background: rgba(127, 127, 127, 0.16);
        }

        .context-menu-button:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .context-menu-separator {
            height: 1px;
            margin: 4px 2px;
            background: rgba(127, 127, 127, 0.28);
        }

        /* Context Menu Submenus */
        .context-menu-item {
            position: relative;
        }

        .context-menu-button .arrow {
            font-size: 9px;
            opacity: 0.6;
            margin-left: auto;
            pointer-events: none;
        }

        .submenu {
            display: none;
            position: absolute;
            top: -4px;
            left: 100%;
            min-width: 176px;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            z-index: 60;
        }

        .context-menu-item:hover>.submenu {
            display: block;
        }

        .context-menu-item:hover>.context-menu-button:not(:disabled) {
            background: rgba(127, 127, 127, 0.16);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--gutter-fg);
            font-family: system-ui, sans-serif;
            font-size: 15px;
            transition: opacity 0.3s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .autocomplete-popup {
            position: fixed;
            z-index: 60;
            min-width: 180px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 6px;
            background: color-mix(in srgb, var(--gutter-bg) 85%, transparent);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--fg);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            font-family: var(--font-family);
            font-size: 13px;
        }

        .autocomplete-popup[hidden] {
            display: none;
        }

        .autocomplete-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            min-height: 30px;
            padding: 4px 10px;
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background 0.1s, transform 0.1s;
        }

        .autocomplete-label {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .autocomplete-detail {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 11px;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: var(--selection);
            color: #ffffff;
            transform: translateX(2px);
        }

        .autocomplete-item:hover .autocomplete-detail,
        .autocomplete-item.active .autocomplete-detail {
            color: rgba(255, 255, 255, 0.82);
        }

        #find-input,
        #replace-input {
            width: 180px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.45);
            border-radius: 3px;
            padding: 4px 8px;
            outline: 0;
            background: var(--bg);
            color: var(--fg);
            flex: 1;
        }

        .find-option-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--fg);
            opacity: 0.5;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            transition: opacity 0.1s, background-color 0.1s, border-color 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
        }

        .find-option-btn:hover {
            opacity: 0.8;
            background: rgba(127, 127, 127, 0.16);
        }

        .find-option-btn.active {
            background: rgba(0, 120, 212, 0.25) !important;
            opacity: 1 !important;
            border: 1px solid rgba(0, 120, 212, 0.4) !important;
            color: var(--fg) !important;
        }

        .find-button {
            min-width: 28px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.28);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            cursor: pointer;
        }

        .find-button:hover {
            background: rgba(127, 127, 127, 0.16);
        }

        /* Syntax Highlighting Tokens */
        .token-comment {
            color: var(--token-comment);
            font-style: italic;
        }

        .token-keyword {
            color: var(--token-keyword);
            font-weight: bold;
        }

        .token-control {
            color: var(--token-control);
            font-weight: bold;
        }

        .token-string {
            color: var(--token-string);
        }

        .token-number {
            color: var(--token-number);
        }

        .token-type {
            color: var(--token-type);
        }

        .token-function {
            color: var(--token-function);
        }

        .token-variable {
            color: var(--token-variable);
        }

        .token-operator {
            color: var(--token-operator);
        }

        .token-punctuation {
            color: var(--token-punctuation);
        }

        .token-tag {
            color: var(--token-tag);
        }

        .token-attr {
            color: var(--token-attr);
        }

        .bracket-depth-0 { color: var(--bracket-depth-0); }
        .bracket-depth-1 { color: var(--bracket-depth-1); }
        .bracket-depth-2 { color: var(--bracket-depth-2); }
        .bracket-depth-3 { color: var(--bracket-depth-3); }
        .bracket-depth-4 { color: var(--bracket-depth-4); }
        .bracket-depth-5 { color: var(--bracket-depth-5); }

        @media print {

            html,
            body {
                background: #fff !important;
                color: #000 !important;
                overflow: visible !important;
            }

            #print-container {
                background: #fff !important;
                color: #000 !important;
                position: relative !important;
                inset: auto !important;
                padding: 0 !important;
                overflow: visible !important;
            }

            .line-number {
                display: none !important;
            }

            .line-row {
                grid-template-columns: minmax(0, 1fr) !important;
            }

            .line-text {
                color: #000 !important;
            }

            #find-panel {
                display: none !important;
            }

            #editor-host {
                height: auto !important;
                overflow: visible !important;
            }

            #scroll-container {
                overflow: visible !important;
                height: auto !important;
                position: relative !important;
            }

            #viewport {
                position: relative !important;
                transform: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="editor-host">
        <div id="loading-overlay">로딩 중...</div>
        <div id="scroll-container">
            <div id="virtual-spacer"></div>
            <div id="viewport"></div>
        </div>
        <div id="find-panel" hidden>
            <div style="display: flex; gap: 8px; width: 100%;">
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <div style="position: relative; display: flex; align-items: center; width: 100%;">
                        <input id="find-input" type="text" placeholder="찾기" autocomplete="off" spellcheck="false"
                            style="width: 100%; padding-right: 60px;">
                        <div style="position: absolute; right: 5px; display: flex; gap: 2px; z-index: 10;">
                            <button id="find-match-case" class="find-option-btn" type="button" title="대소문자 구분 (Aa)">Aa</button>
                            <button id="find-regex" class="find-option-btn" type="button" title="정규식 사용 (.*)">.*</button>
                        </div>
                    </div>
                    <div id="replace-row" style="display: flex; width: 100%;">
                        <input id="replace-input" type="text" placeholder="바꾸기" autocomplete="off" spellcheck="false"
                            style="width: 100%;">
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
                    <div style="display: flex; gap: 6px; height: 28px; align-items: center;">
                        <button id="find-prev" class="find-button" type="button" title="이전">↑</button>
                        <button id="find-next" class="find-button" type="button" title="다음">↓</button>
                        <button id="find-close" class="find-button" type="button" title="닫기">×</button>
                    </div>
                    <div id="replace-actions-row" style="display: flex; gap: 6px; height: 28px; align-items: center;">
                        <button id="replace-btn" class="find-button" type="button" style="min-width: 52px;"
                            title="바꾸기">바꾸기</button>
                        <button id="replace-all-btn" class="find-button" type="button" style="min-width: 64px;"
                            title="모두 바꾸기">모두 바꾸기</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="context-menu" hidden>
            <button class="context-menu-button" type="button" data-action="cut" data-requires-edit="true">잘라내기</button>
            <button class="context-menu-button" type="button" data-action="copy">복사</button>
            <button class="context-menu-button" type="button" data-action="paste"
                data-requires-edit="true">붙여넣기</button>
            <button class="context-menu-button" type="button" data-action="delete" data-requires-edit="true">삭제</button>
            <button class="context-menu-button" type="button" data-action="selectAll">모두 선택</button>
            <div class="context-menu-separator" role="separator"></div>
            <button class="context-menu-button" type="button" data-action="toggleComment" data-requires-edit="true">주석
                토글</button>
            <button class="context-menu-button" type="button" data-action="indentLines"
                data-requires-edit="true">들여쓰기</button>
            <button class="context-menu-button" type="button" data-action="outdentLines"
                data-requires-edit="true">내여쓰기</button>
            <div class="context-menu-item has-submenu">
                <button class="context-menu-button" type="button">
                    <span data-label="lineCleanup">줄 정리</span>
                    <span class="arrow">▶</span>
                </button>
                <div class="submenu">
                    <button class="context-menu-button" type="button" data-action="sortAsc"
                        data-requires-edit="true">오름차순 정렬</button>
                    <button class="context-menu-button" type="button" data-action="sortDesc"
                        data-requires-edit="true">내림차순 정렬</button>
                    <button class="context-menu-button" type="button" data-action="removeDuplicates"
                        data-requires-edit="true">중복 줄 제거</button>
                    <button class="context-menu-button" type="button" data-action="removeEmptyLines"
                        data-requires-edit="true">빈 줄 제거</button>
                    <button class="context-menu-button" type="button" data-action="collapseConsecutiveEmptyLines"
                        data-requires-edit="true">연속 빈줄 하나로 줄이기</button>
                    <button class="context-menu-button" type="button" data-action="trimSpaces"
                        data-requires-edit="true">앞뒤 공백 제거</button>
                </div>
            </div>
            <div class="context-menu-item has-submenu">
                <button class="context-menu-button" type="button">
                    <span data-label="convert">변환</span>
                    <span class="arrow">▶</span>
                </button>
                <div class="submenu">
                    <button class="context-menu-button" type="button" data-action="toUpperCase"
                        data-requires-edit="true">대문자로</button>
                    <button class="context-menu-button" type="button" data-action="toLowerCase"
                        data-requires-edit="true">소문자로</button>
                    <button class="context-menu-button" type="button" data-action="toSentenceCase"
                        data-requires-edit="true">Sentence case</button>
                    <button class="context-menu-button" type="button" data-action="toTitleCase"
                        data-requires-edit="true">Title case</button>
                    <button class="context-menu-button" type="button" data-action="urlEncode"
                        data-requires-edit="true">URL Encode</button>
                    <button class="context-menu-button" type="button" data-action="urlDecode"
                        data-requires-edit="true">URL Decode</button>
                    <button class="context-menu-button" type="button" data-action="base64Encode"
                        data-requires-edit="true">Base64 Encode</button>
                    <button class="context-menu-button" type="button" data-action="base64Decode"
                        data-requires-edit="true">Base64 Decode</button>
                    <button class="context-menu-button" type="button" data-action="hexToDec"
                        data-requires-edit="true">HEX → DEC</button>
                    <button class="context-menu-button" type="button" data-action="decToHex"
                        data-requires-edit="true">DEC → HEX</button>
                </div>
            </div>
            <button class="context-menu-button" type="button" data-action="formatText" data-requires-edit="true">Format
                text</button>
            <div class="context-menu-separator" role="separator"></div>
            <button class="context-menu-button" type="button" data-action="toggleScrollSync">✓ 스크롤 동기화</button>
        </div>
        <div id="autocomplete-popup" class="autocomplete-popup" hidden></div>
    </div>

    <script src="hangul-autocomplete.js"></script>
    <script>
        console.log("HangulAutocomplete is:", typeof HangulAutocomplete !== 'undefined' ? 'Loaded' : 'NOT loaded');
        const scrollContainer = document.getElementById('scroll-container');
        const virtualSpacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('viewport');
        const findPanel = document.getElementById('find-panel');
        const findInput = document.getElementById('find-input');
        const findPrev = document.getElementById('find-prev');
        const findNextButton = document.getElementById('find-next');
        const findClose = document.getElementById('find-close');
        const contextMenu = document.getElementById('context-menu');
        const replaceInput = document.getElementById('replace-input');
        const replaceBtn = document.getElementById('replace-btn');
        const replaceAllBtn = document.getElementById('replace-all-btn');

        const MAX_RENDER_CHARS = 20000;
        const state = {
            lineCount: 1,
            lineHeight: 22,
            overscan: 12,
            cache: new Map(),
            pending: new Set(),
            lineHeights: new Map(),
            requestSeq: 1,
            currentLine: 1,
            currentColumn: 1,
            readOnly: false,
            wordWrap: false,
            language: 'plaintext',
            tabSize: 4,
            searchQuery: '',
            searchMatches: [],
            searchIndex: -1,
            activeSearch: null,
            findMatchCase: false,
            findRegex: false,
            selection: null,
            selectionAnchor: null,
            isSelecting: false,
            isLineSelecting: false,
            initialized: false,
            lastRangeKey: '',
            cacheVersion: 0,
            renderQueued: false,
            clipboardRequests: new Map(),
            pendingLineActions: [],
            autocompleteOnEnter: true,
            autocompleteOnTab: true,
            snippets: [],
            scrollSyncEnabled: true,
            dragStartPosition: null,
            isComposing: false,
            compositionLine: null,
            columnComposition: null,
            pendingImeSelectionCollapse: null,
            suppressNextBeforeInputType: null,
            lastManualDeleteAt: 0,
            editingLine: null,
            lastDeleteKeyDown: null,
            repeatEdit: {
                lastRunAt: 0,
                timer: 0,
                pending: null,
                intervalMs: 28,
                lineBoundaryHoldMs: 65,
                lineBoundaryUntil: 0,
                suppressBeforeInputUntil: 0,
                suppressBeforeInputTypes: new Set()
            }
        };

        state.lineEndStacks = new Map();

        const originalSet = state.cache.set;
        state.cache.set = function(key, value) {
            originalSet.call(state.cache, key, value);
            invalidateLineEndStacks(key);
            return this;
        };
        const originalDelete = state.cache.delete;
        state.cache.delete = function(key) {
            const res = originalDelete.call(state.cache, key);
            invalidateLineEndStacks(key);
            return res;
        };
        const originalClear = state.cache.clear;
        state.cache.clear = function() {
            originalClear.call(state.cache);
            if (state.lineEndStacks) state.lineEndStacks.clear();
        };

        function invalidateLineEndStacks(startLine) {
            if (!state.lineEndStacks) return;
            for (let l = startLine; l <= state.lineCount + 5; l++) {
                state.lineEndStacks.delete(l);
            }
        }

        function cleanLineForBrackets(text) {
            let clean = text.replace(/\/\/.*/g, '');

        function parseHexColor(value) {
            if (!value || typeof value !== 'string') return null;
            const match = value.trim().match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);

            let hex = match[1];
            if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),

        function colorToHex(color) {

        function relativeLuminance(color) {

        function resolveReadableColor(backgroundValue, foregroundValue, fallbackForeground) {

            if (!background) return foregroundValue || fallbackForeground;
            if (foreground && contrastRatio(background, foreground) >= 4.5) return colorToHex(foreground);

        function receiveLineBlock(startLine, lines) {
            const start = Number(startLine || 1);
            const safeLines = Array.isArray(lines) ? lines : [];
            let changed = false;
            for (let i = 0; i < safeLines.length; i++) {
                const lineNumber = start + i;
                // 분할 뷰에서 한글 IME 조합 중일 때 호스트가 보내는 이전 줄 내용으로
                // 현재 조합 중인 DOM/캐시를 덮어쓰면 직전 자소가 사라진다.
                // 조합 중인 줄은 compositionend에서 최종 문자열을 커밋하므로 여기서는 보호한다.
                if ((state.isComposing && (!state.compositionLine || state.compositionLine === lineNumber)) ||
                    (state.isComposing && isLineInColumnComposition(lineNumber)) ||
                    (state.editingLine === lineNumber && document.activeElement?.closest?.('.line-text')?.dataset.line === String(lineNumber))) {
                    continue;
                }
                state.cache.set(lineNumber, safeLines[i] ?? '');
                changed = true;
            }
            if (changed) {
                state.cacheVersion++;
            }
            for (const key of [...state.pending]) {
                const [pendingStart, pendingCount] = key.split(':').map(Number);
                const pendingEnd = pendingStart + pendingCount - 1;
                const receivedEnd = start + safeLines.length - 1;
                if (start <= pendingStart && (safeLines.length === 0 || receivedEnd >= pendingEnd || receivedEnd >= state.lineCount)) {
                    state.pending.delete(key);
                }
            }
            return safeLines.length;
        }


        function updateLineFromHost(lineNumber, text, isComposing = false) {

            if ((state.isComposing && (!state.compositionLine || state.compositionLine === line)) ||
                (state.isComposing && isLineInColumnComposition(line))) {
                return false;
            }

            const activeLineElement = document.activeElement?.closest?.('.line-text');
            if (state.editingLine === line && activeLineElement?.dataset.line === String(line)) {
                return false;
            }

            const nextText = String(text ?? '');
            state.cache.set(line, nextText);
            state.cacheVersion++;

            const element = viewport.querySelector(`.line-text[data-line="${line}"]`);
            if (element && element.getAttribute('contenteditable') === 'true') {

        function requestLines(start, count) {

                const isLong = hasLine && text.length > MAX_RENDER_CHARS;

                const renderPlainForEditableSelection = hasCustomSelection() &&

                    !isLong &&
                    (line === activeLine || line === state.editingLine);
                const lineContent = renderLineContent(line, displayText, renderPlainForEditableSelection);
                rows.push(
                    `<div class="line-row${isInSelection ? ' selected-row' : ''}${isSelectedEmptyLine ? ' selected-empty-row' : ''}" data-line="${line}">` +

        function drawEditableSelectionOverlays() {
            viewport.querySelectorAll('.editable-selection-overlay').forEach(el => el.remove());

            const selection = normalizeSelection();
            if (!selection || !hasCustomSelection()) return;

            const activeElement = document.activeElement?.closest?.('.line-text') || null;
            for (const element of viewport.querySelectorAll('.line-text[contenteditable="true"]')) {
                const lineNumber = Number(element.dataset.line || 0);

                if (state.editingLine !== lineNumber && activeElement !== element) continue;

            const length = textNode.textContent.length;

            range.setEnd(textNode, safeEnd);

            const endBoundary = caretBoundaryRect(textNode, safeEnd, true);

                if (sameVisualRow(rect, startBoundary)) {
                    left = Math.max(left, startBoundary.left);
                }
                if (sameVisualRow(rect, endBoundary)) {
                    right = Math.min(right, endBoundary.left);
                }

                    appendEditableSelectionOverlay(row, left - rowRect.left, rect.top - rowRect.top, right - left, rect.height);

        function caretBoundaryRect(textNode, offset, preferPrevious = false) {

                    range.setEnd(textNode, safeOffset);

                    range.setEnd(textNode, safeOffset + 1);

                    }

                workingText = workingText.replace(/\b(if|then|elseif|else|end|for|while|repeat|until|do|break|return|goto|in)\b/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));

                workingText = workingText.replace(/\b(function|local|nil|true|false|and|or|not|require|print|pairs|ipairs|string|table|math|io|os|coroutine)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 6. Functions
                workingText = workingText.replace(/\b([a-zA-Z_]\w*)(?=\s*\()/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
            }
            else if (isLatex) {
                // 1. Comments
                workingText = workingText.replace(/%.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Commands
                workingText = workingText.replace(/\\[a-zA-Z@]+|\\./g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 3. Environments and references
                workingText = workingText.replace(/\{(?:document|figure|table|itemize|enumerate|align|equation|array|tabular|section|subsection|subsubsection)\}/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 4. Math delimiters
                workingText = workingText.replace(/\$\$?|\[|\]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
                // 5. Braces
                workingText = workingText.replace(/[{}]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
            }
            else if (isDataConfig) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Section headers and keys
                workingText = workingText.replace(/^\s*\[[^\]]+\]/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/^\s*[-?]?\s*[a-zA-Z0-9_.-]+(?=\s*[:=])/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 4. Scalars
                workingText = workingText.replace(/\b(true|false|null|yes|no|on|off)\b/gi, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\b-?\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 5. Punctuation
                workingText = workingText.replace(/[:=\[\]{}.,-]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
            }
            else if (isDiff) {
                if (/^(diff --git|index |@@|\+\+\+|---)/.test(workingText)) {
                    workingText = stash(`<span class="token-keyword">${escapeHtml(workingText)}</span>`);
                } else if (workingText.startsWith('+')) {
                    workingText = stash(`<span class="token-string">${escapeHtml(workingText)}</span>`);
                } else if (workingText.startsWith('-')) {
                    workingText = stash(`<span class="token-comment">${escapeHtml(workingText)}</span>`);
                }
            }
            else if (isDockerfile) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Instructions
                workingText = workingText.replace(/^\s*(FROM|RUN|CMD|LABEL|MAINTAINER|EXPOSE|ENV|ADD|COPY|ENTRYPOINT|VOLUME|USER|WORKDIR|ARG|ONBUILD|STOPSIGNAL|HEALTHCHECK|SHELL)\b/gi, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 4. Variables
                workingText = workingText.replace(/\$[a-zA-Z_]\w*|\$\{[a-zA-Z_]\w*\}/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
            }
            else if (isMakefile) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Targets and variables
                workingText = workingText.replace(/^[^\s:=#][^:=#]*(?=\s*:)/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/^[A-Za-z_][A-Za-z0-9_]*(?=\s*[:+?]?=)/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\$\([^)]+\)|\$\{[^}]+\}/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
                // 3. Directives
                workingText = workingText.replace(/\b(ifdef|ifndef|ifeq|ifneq|else|endif|include|define|endef|export|override|private|vpath)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
            }
            else if (isFsharp) {
                // 1. Comments
                workingText = workingText.replace(/\(\*[\s\S]*?\*\)/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\/\/.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/@"[^"]*"|"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Numbers
                workingText = workingText.replace(/\b\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 4. Control Flow / keywords
                workingText = workingText.replace(/\b(if|then|else|match|with|for|while|do|done|try|finally|return|yield|async|let|use|fun|function|member|type|module|namespace|open|interface|abstract|override|static|mutable|rec|and|or|not|in|of|as|new)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 5. Types and functions
                workingText = workingText.replace(/\b(unit|bool|string|int|int64|float|double|decimal|list|array|seq|option|Result|Some|None|Ok|Error|true|false|null)\b/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\b([a-zA-Z_]\w*)(?=\s*\()/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
            }
            else if (isVb) {
                // 1. Comments
                workingText = workingText.replace(/'.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:[^"]|"")*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Numbers
                workingText = workingText.replace(/\b\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 4. Control Flow / keywords
                workingText = workingText.replace(/\b(If|Then|Else|ElseIf|End|For|Each|Next|While|Do|Loop|Select|Case|Try|Catch|Finally|Throw|Return|Exit|Continue|Imports|Namespace|Class|Module|Structure|Interface|Enum|Public|Private|Protected|Friend|Shared|Overrides|Overridable|MustOverride|Sub|Function|Property|Dim|Const|Static|New|In|As|Is|And|Or|Not|ByVal|ByRef)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 5. Types / builtins
                workingText = workingText.replace(/\b(Boolean|Byte|Char|Date|Decimal|Double|Integer|Long|Object|Short|Single|String|True|False|Nothing|Console|Math)\b/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\b([a-zA-Z_]\w*)(?=\s*\()/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
            }
            else if (isReg) {
                // 1. Comments (semicolons) - must be first
                if (/^\s*;/.test(workingText)) {
                    return `<span class="token-comment">${escapeHtml(workingText)}</span>`;
                }
                // 2. Registry header line
                if (/^Windows Registry Editor/i.test(workingText)) {
                    return `<span class="token-keyword">${escapeHtml(workingText)}</span>`;
                }
                // 3. Section headers [HKEY_...] (full line is the section)
                if (/^\[/.test(workingText)) {
                    const cls = /^\[-/.test(workingText) ? 'token-comment' : 'token-type';
                    return `<span class="${cls}">${escapeHtml(workingText)}</span>`;
                }
                // 4. Value assignment lines: "Name"=data or @=data
                const assignMatch = workingText.match(/^(@|"(?:[^"\\]|\\.)*")(=)(.*)/);
                if (assignMatch) {
                    const namePart  = `<span class="token-variable">${escapeHtml(assignMatch[1])}</span>`;
                    const eqPart    = `<span class="token-operator">=</span>`;
                    let   valuePart = assignMatch[3];

                    // dword:XXXXXXXX
                    const dwordM = valuePart.match(/^(dword:)([0-9a-fA-F]+)(.*)/i);
                    if (dwordM) {
                        valuePart = `<span class="token-keyword">${escapeHtml(dwordM[1])}</span><span class="token-number">${escapeHtml(dwordM[2])}</span>${escapeHtml(dwordM[3])}`;
                    }
                    // hex(N): or hex:
                    else if (/^hex[:(]/i.test(valuePart)) {
                        const hexTypeM = valuePart.match(/^(hex(?:\(\d+\))?:)(.*)/i);
                        if (hexTypeM) {
                            valuePart = `<span class="token-keyword">${escapeHtml(hexTypeM[1])}</span><span class="token-number">${escapeHtml(hexTypeM[2])}</span>`;
                        } else {
                            valuePart = escapeHtml(valuePart);
                        }
                    }
                    // String value "..."
                    else if (/^"/.test(valuePart)) {
                        valuePart = `<span class="token-string">${escapeHtml(valuePart)}</span>`;
                    }
                    // Delete value (-)
                    else if (valuePart === '-') {
                        valuePart = `<span class="token-comment">-</span>`;
                    }
                    else {
                        valuePart = escapeHtml(valuePart);
                    }

                    return namePart + eqPart + valuePart;
                }
                // 5. Continuation hex lines (  xx,xx,xx,\\ )
                if (/^\s+[0-9a-fA-F]{2}/.test(workingText)) {
                    return workingText.replace(/[0-9a-fA-F]{2}/g, m => `<span class="token-number">${escapeHtml(m)}</span>`);
                }
            }
            else if (isClike) {
                // 1. Multi-line comments
                workingText = workingText.replace(/\/\*[\s\S]*?\*\//g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Single-line comments
                workingText = workingText.replace(/\/\/.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 3. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/`(?:\\.|[^`\\])*`/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 4. Numbers
                workingText = workingText.replace(/\b0x[0-9a-fA-F]+\b|\b\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 5. Control Flow
                workingText = workingText.replace(/\b(if|else|return|for|while|do|switch|case|default|break|continue|goto|throw|try|catch|finally|yield|await|async)\b/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 6. Keywords
                workingText = workingText.replace(/\b(class|struct|interface|enum|public|private|protected|internal|static|readonly|volatile|virtual|override|abstract|sealed|extern|unsafe|fixed|lock|typeof|sizeof|new|delete|var|let|const|function|fn|pub|use|mod|impl|trait|type|package|import|export|namespace|using|as|is|in|out|ref|params|base|this|void|int|float|double|char|string|bool|boolean|long|short|byte|sbyte|uint|ulong|ushort|decimal|object|dynamic)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 7. Types / Builtins
                workingText = workingText.replace(/\b(true|false|null|undefined|Console|Math|System|String|Object|Array|window|document|process|global|require|self)\b/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 8. Functions
                workingText = workingText.replace(/\b([a-zA-Z_]\w*)(?=\s*\()/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
                // 9. Operators
                workingText = workingText.replace(/&&|\|\||===|==|!==|!=|=>|\+=|-=|\*=|\/=|<=|>=|[+\-*\/=<>!%&|^~?:]/g, m => stash(`<span class="token-operator">${escapeHtml(m)}</span>`));
                // 10. Punctuation
                workingText = workingText.replace(/[{}()\[\].;,]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
            }

            // Default escaping of the remaining text (plain parts) and restoring placeholders
            let escapedText = escapeHtml(workingText);

            // Bracket pair colorization: colorize bracket characters in stashed tokens in sequential occurrence order
            const matchingBrackets = { ')': '(', '}': '{', ']': '[' };
            function colorizeBrackets(html, stack) {
                if (html.includes('token-comment') || html.includes('token-string')) {
                    return html;
                }
                const opening = { '(': '(', '{': '{', '[': '[' };
                const closing = { ')': '(', '}': '{', ']': '[' };
                return html.replace(/[(){}\[\]]/g, ch => {
                    if (opening[ch]) {
                        const depth = stack.length;
                        stack.push(ch);
                        const cls = `bracket-depth-${depth % 6}`;
                        return `<span class="${cls}">${ch}</span>`;
                    }
                    if (closing[ch]) {
                        const target = matchingBrackets[ch];
                        if (stack.length > 0 && stack[stack.length - 1] === target) {
                            stack.pop();
                        } else {
                            stack.pop();
                        }
                        const depth = stack.length;
                        const cls = `bracket-depth-${depth % 6}`;
                        return `<span class="${cls}">${ch}</span>`;
                    }
                    return ch;
                });
            }

            while (escapedText.includes('\u0002_TOKEN_')) {
                escapedText = escapedText.replace(/\u0002_TOKEN_(\d+)_\u0002/g, (match, idx) => {
                    let tokenHtml = tokens[Number(idx)];
                    if (state.bracketPairColorization && lineNumber !== null) {
                        tokenHtml = colorizeBrackets(tokenHtml, currentLineStack);
                    }
                    return tokenHtml;
                });
            }

            return escapedText;
        }

        function renderLineContent(lineNumber, text, forcePlainText = false) {
            // IME 조합 중인 줄은 beforeinput/compositionstart 핸들러가 이미 DOM을 평탄화하지만
            // render()가 IME 조합 중에는 실행되지 않아 이 줄이 renderLineContent()를 거치지 않는다.
            // 만에 하나 조합 중에 도달하면 plain text로 렌더링한다.
            // 선택 드래그가 시작된 활성 contenteditable 줄도 plain text로 렌더링하고,
            // 실제 선택 음영은 overlay에서 정확한 문자 경계로 그린다.
            if (forcePlainText || (state.isComposing && state.compositionLine === lineNumber)) {
                return escapeHtml(text);
            }

            const selectionBounds = selectionBoundsForLine(lineNumber, text.length);
            if (selectionBounds) {
                const { start, end } = selectionBounds;
                const selection = normalizeSelection();

                if (start === end) {
                    if (selection && selection.isColumn) {
                        if (start < text.length) {
                            return highlightLine(text.slice(0, start), state.language, lineNumber, 0) +
                                `<span class="column-cursor">${escapeHtml(text[start])}</span>` +
                                highlightLine(text.slice(start + 1), state.language, lineNumber, start + 1);
                        } else {
                            return highlightLine(text, state.language, lineNumber, 0) + `<span class="column-cursor">&nbsp;</span>`;
                        }
                    }
                    return highlightLine(text, state.language, lineNumber, 0);
                }

                const selected = text.slice(start, end);
                const selectedHtml = selected.length > 0 ? highlightLine(selected, state.language, lineNumber, start) : '&nbsp;';
                return highlightLine(text.slice(0, start), state.language, lineNumber, 0) +
                    `<span class="selection-fragment">${selectedHtml}</span>` +
                    highlightLine(text.slice(end), state.language, lineNumber, end);
            }

            if (state.searchQuery && state.searchMatches.length > 0) {
                const active = state.activeSearch;
                const activeMatchOnLine = active && active.lineNumber === lineNumber
                    ? active
                    : null;
                const matchesOnLine = state.searchMatches.filter(m => m.lineNumber === lineNumber);
                return renderSearchMatchesForLine(lineNumber, text, matchesOnLine, activeMatchOnLine);
            }

            return highlightLine(text, state.language, lineNumber, 0);
        }

        function normalizeSelection(selection = state.selection) {
            if (!selection) return null;
            const a = selection.start;
            const b = selection.end;
            if (a.line < b.line || (a.line === b.line && a.column <= b.column)) {
                return { start: a, end: b, isColumn: !!selection.isColumn };
            }
            return { start: b, end: a, isColumn: !!selection.isColumn };
        }

        function hasCustomSelection() {
            const normalized = normalizeSelection();
            return !!normalized &&
                (normalized.start.line !== normalized.end.line ||
                    normalized.start.column !== normalized.end.column);
        }

        function activeColumnSelection() {
            const selection = normalizeSelection();
            return selection && selection.isColumn && hasCustomSelection() ? selection : null;
        }

        function cloneEditorSelection(selection) {
            if (!selection) return null;
            return {
                start: { line: selection.start.line, column: selection.start.column },
                end: { line: selection.end.line, column: selection.end.column },
                isColumn: !!selection.isColumn
            };
        }

        function isPlainTextKey(event) {
            if (!event || event.ctrlKey || event.metaKey || event.altKey) return false;
            if (event.isComposing || state.isComposing || event.key === 'Process' || event.keyCode === 229) return false;
            // 한글 IME 자모/완성형은 keydown에서 모델 입력으로 직접 넣으면
            // 브라우저 조합기가 개입하지 못해 "ㄱㅏㅇ"처럼 자소가 분리된다.
            // 한글은 beforeinput/composition/native input 경로에 맡긴다.
            if (containsHangulInputText(event.key)) return false;
            return typeof event.key === 'string' && event.key.length === 1;
        }

        function containsHangulInputText(value) {
            return /[\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uD7B0-\uD7FF\uAC00-\uD7A3]/.test(String(value ?? ''));
        }

        function isHangulImeKeyEvent(event) {
            if (!event || event.ctrlKey || event.metaKey || event.altKey) return false;
            return !!(event.isComposing || state.isComposing ||
                event.key === 'Process' || event.keyCode === 229 ||
                containsHangulInputText(event.key));
        }

        function syncCustomSelectionClass() {
            document.body.classList.toggle('custom-selection-active', hasCustomSelection());
        }

        function clearCustomSelectionVisuals() {
            // 커스텀 선택 상태를 모델에서 지운 직후에는 render()가 아직 돌지 않았거나,
            // IME 조합 중이라 render()가 일부러 막혀 있을 수 있다.
            // 이때 이전 선택 overlay/span이 화면에 남지 않도록 DOM 표시만 즉시 정리한다.
            viewport.querySelectorAll('.editable-selection-overlay').forEach(el => el.remove());
            viewport.querySelectorAll('.line-row.selected-row, .line-row.selected-empty-row').forEach(row => {
                row.classList.remove('selected-row', 'selected-empty-row');
            });
            viewport.querySelectorAll('.selection-fragment').forEach(fragment => {
                fragment.replaceWith(document.createTextNode(fragment.textContent || ''));
            });
        }

        function syncRenderedRowsAfterCompositionSelectionCollapse(startLine, endLine, nextText, caretColumn, preferredElement = null) {
            const removedLineCount = Math.max(0, Number(endLine || startLine) - Number(startLine || 1));
            const start = Number(startLine || 1);
            const end = Number(endLine || start);
            const preferredRow = preferredElement?.closest?.('.line-row') || null;
            const preferredLine = Number(preferredElement?.dataset?.line || preferredRow?.dataset?.line || 0);
            const rowInfos = [...viewport.querySelectorAll('.line-row')].map(row => ({
                row,
                line: Number(row.dataset.line || 0)
            }));

            let targetRow = null;
            if (preferredRow && preferredLine >= start && preferredLine <= end) {
                // compositionstart가 이미 특정 contenteditable에 붙은 뒤 그 노드를 삭제하면
                // 첫 한글 자소가 유실될 수 있다. 그래서 가능하면 이벤트가 붙은 행을 살려서
                // 선택 시작 행으로 재사용한다.
                targetRow = preferredRow;
            } else {
                targetRow = viewport.querySelector(`.line-row[data-line="${start}"]`);
            }

            // Capture the exact vertical position of targetRow relative to the viewport before any DOM changes
            const oldTargetRect = targetRow ? targetRow.getBoundingClientRect() : null;

            const startRow = viewport.querySelector(`.line-row[data-line="${start}"]`);
            if (targetRow && startRow && targetRow !== startRow) {
                viewport.insertBefore(targetRow, startRow);
            }

            for (const info of rowInfos) {
                if (!info.line) continue;
                if (info.row === targetRow) continue;
                if (info.line >= start && info.line <= end) {
                    info.row.remove();
                }
            }

            if (targetRow) {
                targetRow.dataset.line = String(start);
                targetRow.classList.remove('selected-row', 'selected-empty-row');
                const numberElement = targetRow.querySelector('.line-number');
                if (numberElement) numberElement.textContent = String(start);
                const textElement = targetRow.querySelector('.line-text');
                if (textElement) {
                    textElement.dataset.line = String(start);
                    if (textElement.childNodes.length === 1 && textElement.firstChild?.nodeType === Node.TEXT_NODE) {
                        textElement.firstChild.nodeValue = String(nextText ?? '');
                    } else {
                        textElement.textContent = String(nextText ?? '');
                    }
                    const column = Math.max(0, Math.min(Number(caretColumn || 0), textElement.textContent.length));
                    const textNode = textElement.firstChild;
                    textElement.focus({ preventScroll: true });
                    const range = document.createRange();
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        range.setStart(textNode, column);
                    } else {
                        range.setStart(textElement, 0);
                    }
                    range.collapse(true);
                    const selection = window.getSelection();
                    if (selection) {
                        selection.removeAllRanges();
                        selection.addRange(range);
                    }
                }
            }

            if (removedLineCount > 0) {
                for (const info of rowInfos) {
                    if (!info.line || info.row === targetRow || !info.row.isConnected) continue;
                    if (info.line > end) {
                        const newLine = info.line - removedLineCount;
                        info.row.dataset.line = String(newLine);
                        info.row.classList.remove('selected-row', 'selected-empty-row');
                        const numberElement = info.row.querySelector('.line-number');
                        if (numberElement) numberElement.textContent = String(newLine);
                        const textElement = info.row.querySelector('.line-text');
                        if (textElement) {
                            textElement.dataset.line = String(newLine);
                            if (state.cache.has(newLine)) {
                                textElement.textContent = state.cache.get(newLine) || '';
                            }
                        }
                    }
                }
            }

            clearCustomSelectionVisuals();
            if (state.wordWrap) {
                measureRenderedRows(false);
            }

            // Adjust scrollTop to preserve the exact visual screen position of targetRow

                lineNumber,
                beforeText: baseLines.get(lineNumber) ?? lineTextFromElement(element),
                caretColumn: getCaretOffset(element),
                baseLines,
                lastPreviewLines: new Map()
            };
            return true;
        }

        function finishColumnComposition(element, lineNumber) {
            const pending = state.columnComposition;
            if (!pending || !pending.selection || !element || element.getAttribute('contenteditable') !== 'true') {
                state.columnComposition = null;
                return false;
            }

            const targetLine = Number(lineNumber || element.dataset.line || pending.lineNumber || state.currentLine || 1);
            if (targetLine !== pending.lineNumber) {
                restoreColumnCompositionBase(pending, true, element);
                state.columnComposition = null;
                return false;
            }

            const finalText = lineTextFromElement(element);
            const insertedText = changedTextBetween(pending.beforeText, finalText);
            const originalSelection = cloneEditorSelection(pending.selection);
            const changed = insertedText.length > 0 || finalText !== pending.beforeText;

            // 조합 preview를 매 input마다 cache/host에 반영했으므로, 확정 적용 전에
            // 반드시 시작 시점의 base line으로 되돌린다. 그렇지 않으면 최종 문자열이
            // 컬럼 범위에 한 번 더 삽입된다.
            restoreColumnCompositionBase(pending, !changed, element);
            state.columnComposition = null;

            if (changed) {
                replaceColumnSelectionWith(originalSelection, insertedText);
            } else {
                state.selection = originalSelection;
                state.selectionAnchor = originalSelection.start;
                syncCustomSelectionClass();
                queueRender(true);
                setTimeout(() => focusLine(state.currentLine, Math.max(0, state.currentColumn - 1)), 0);
            }

            return true;
        }

        function replaceSelectionWith(selection, text, editSelection = null) {
            if (selection.isColumn) {
                replaceColumnSelectionWith(selection, text);
                return;
            }
            const { start, end } = selection;
            const prefix = (state.cache.get(start.line) || '').slice(0, start.column);
            const suffix = (state.cache.get(end.line) || '').slice(end.column);
            const linesToRemove = end.line - start.line;
            const replacementText = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const parts = replacementText.split('\n');
            const newLines = [];

            if (parts.length === 1) {
                newLines.push(prefix + parts[0] + suffix);
            } else {
                newLines.push(prefix + parts[0]);
                for (let i = 1; i < parts.length - 1; i++) {
                    newLines.push(parts[i]);
                }
                newLines.push(parts[parts.length - 1] + suffix);
            }

            const netLines = newLines.length - 1 - linesToRemove;
            const shiftAmount = newLines.length - (linesToRemove + 1);

            state.cache.set(start.line, newLines[0]);
            for (let i = start.line + 1; i <= end.line; i++) {
                state.cache.delete(i);
            }
            if (shiftAmount !== 0) {
                shiftCachedLines(end.line + 1, shiftAmount);
            }
            for (let i = 1; i < newLines.length; i++) {
                state.cache.set(start.line + i, newLines[i]);
            }

            state.lineCount = Math.max(1, state.lineCount + netLines);
            setupVirtualHeight();
            post({ type: 'lineChanged', lineNumber: start.line, text: newLines[0] });
            for (let i = end.line; i > start.line; i--) {
                post({ type: 'deleteLine', lineNumber: i });
            }
            for (let i = 1; i < newLines.length; i++) {
                post({ type: 'insertLine', lineNumber: start.line + i, text: newLines[i] });
            }
            post({ type: 'contentChanged' });
            if (editSelection) {
                const positionFromOffset = offset => {
                    const safeOffset = Math.max(0, Math.min(offset, replacementText.length));
                    const before = replacementText.slice(0, safeOffset).split('\n');
                    if (before.length === 1) {
                        return { line: start.line, column: start.column + before[0].length };
                    }
                    return { line: start.line + before.length - 1, column: before[before.length - 1].length };
                };
                const selectionStart = positionFromOffset(editSelection.startOffset ?? 0);
                const selectionEnd = positionFromOffset(editSelection.endOffset ?? editSelection.startOffset ?? 0);
                state.selectionAnchor = selectionStart;
                state.selection = editSelection.startOffset === editSelection.endOffset
                    ? null
                    : { start: selectionStart, end: selectionEnd };
                state.currentLine = selectionEnd.line;
                state.currentColumn = selectionEnd.column + 1;
            } else {
                state.selection = null;
                syncCustomSelectionClass();
                clearCustomSelectionVisuals();
                const endLine = start.line + parts.length - 1;
                const endColumn = parts.length === 1 ? start.column + parts[0].length : parts[parts.length - 1].length;
                state.currentLine = endLine;
                state.currentColumn = endColumn + 1;
            }
            if (!editSelection) {
                const immediateLine = state.currentLine;
                const immediateColumn = Math.max(0, state.currentColumn - 1);
                const immediateElement = viewport.querySelector(`.line-text[data-line="${immediateLine}"]`);
                if (immediateElement && immediateElement.getAttribute('contenteditable') === 'true') {
                    immediateElement.textContent = state.cache.get(immediateLine) || '';
                    setCaret(immediateElement, immediateColumn);
                }
            }

            queueRender(true);
            setTimeout(() => {
                if (editSelection) {
                    const targetLine = state.currentLine;
                    const targetColumn = Math.max(0, state.currentColumn - 1);
                    focusLine(targetLine, targetColumn);
                    reportCursorAndSelection();
                } else {
                    focusLine(state.currentLine, Math.max(0, state.currentColumn - 1));
                }
            }, 0);
        }

        function deleteCurrentLine(element) {
            const lineNumber = Number(element.dataset.line || 1);
            if (state.lineCount <= 1) return;

            const nextText = state.cache.get(lineNumber + 1);
            if (nextText !== undefined) {
                const current = lineTextFromElement(element);
                if (state.cache.get(lineNumber) !== current) {
                    post({ type: 'lineChanged', lineNumber, text: current });
                }
                shiftCachedLines(lineNumber + 1, -1);
                state.cache.set(lineNumber, current + nextText);
                state.lineCount = Math.max(1, state.lineCount - 1);
                setupVirtualHeight();
                post({ type: 'mergeLineWithPrevious', lineNumber: lineNumber + 1 });
                post({ type: 'contentChanged' });
                queueRender(true);
                setTimeout(() => focusLine(lineNumber, current.length), 0);
            } else if (lineNumber > 1) {
                mergeLineBackward(element);
            }
        }

        function comparePositions(a, b) {
            if (a.line !== b.line) return a.line - b.line;
            return a.column - b.column;
        }

        function orderedRange(range) {
            return comparePositions(range.start, range.end) <= 0
                ? range
                : { start: range.end, end: range.start };
        }

        function offsetFromNode(element, node, offset) {
            try {
                const range = document.createRange();
                range.selectNodeContents(element);
                range.setEnd(node, offset);
                return range.toString().replace(/\r\n/g, '\n').replace(/\r/g, '\n').length;
            } catch {
                return getCaretOffset(element);
            }
        }

        function activeMarkdownRange() {
            if (hasCustomSelection()) return normalizeSelection();

            const element = activeEditableElement();
            const line = Number(element?.dataset.line || state.currentLine || 1);
            const text = state.cache.get(line) ?? (element ? lineTextFromElement(element) : '');
            const fallbackColumn = Math.max(0, Math.min((state.currentColumn || 1) - 1, text.length));
            if (!element) {
                return { start: { line, column: fallbackColumn }, end: { line, column: fallbackColumn } };
            }

            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0 || !element.contains(selection.anchorNode)) {
                const caret = Math.max(0, Math.min(getCaretOffset(element), text.length));
                return { start: { line, column: caret }, end: { line, column: caret } };
            }

            const anchor = Math.max(0, Math.min(offsetFromNode(element, selection.anchorNode, selection.anchorOffset), text.length));
            const focus = Math.max(0, Math.min(offsetFromNode(element, selection.focusNode, selection.focusOffset), text.length));
            return orderedRange({ start: { line, column: anchor }, end: { line, column: focus } });
        }

        function rangeIsCollapsed(range) {
            return range.start.line === range.end.line && range.start.column === range.end.column;
        }

        function textInRange(range) {
            const safeRange = orderedRange(range);
            const parts = [];
            for (let line = safeRange.start.line; line <= safeRange.end.line; line++) {
                const text = state.cache.get(line) ?? '';
                const start = line === safeRange.start.line ? safeRange.start.column : 0;
                const end = line === safeRange.end.line ? safeRange.end.column : text.length;
                parts.push(text.slice(Math.max(0, start), Math.max(0, end)));
            }
            return parts.join('\n');
        }

        function replaceMarkdownRange(range, replacement, startOffset = 0, endOffset = startOffset) {
            replaceSelectionWith(orderedRange(range), replacement, { startOffset, endOffset });
        }

        function setSelectionAfterLineEdits(start, end) {
            state.selectionAnchor = start;
            state.selection = comparePositions(start, end) === 0 ? null : { start, end };
            state.currentLine = end.line;
            state.currentColumn = end.column + 1;
            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => {
                focusLine(end.line, end.column);
                reportCursorAndSelection();
            }, 0);
        }

        function applyLineText(lineNumber, text) {
            state.cache.set(lineNumber, text);
            post({ type: 'lineChanged', lineNumber, text });
        }

        function hasTextAt(text, index, value) {
            return index >= 0 && index + value.length <= text.length && text.slice(index, index + value.length) === value;
        }

        function isStandaloneDelimiter(text, index, delimiter) {
            if (!hasTextAt(text, index, delimiter)) return false;
            if (delimiter.length === 1) {
                const marker = delimiter[0];
                if (index > 0 && text[index - 1] === marker) return false;
                if (index + 1 < text.length && text[index + 1] === marker) return false;
            }
            return true;
        }

        function wrapSelection(opening, closing = opening) {
            const range = activeMarkdownRange();
            const selected = textInRange(range);
            replaceMarkdownRange(
                range,
                opening + selected + closing,
                opening.length,
                opening.length + selected.length
            );
        }

        function toggleWrappedSelection(opening, closing = opening) {
            const range = activeMarkdownRange();
            const selected = textInRange(range);
            const sameDelimiter = opening === closing;
            const selectedStartsWrapped = selected.length >= opening.length + closing.length &&
                selected.startsWith(opening) &&
                selected.endsWith(closing);
            if (selectedStartsWrapped) {
                const inner = selected.slice(opening.length, selected.length - closing.length);
                replaceMarkdownRange(range, inner, 0, inner.length);
                return;
            }

            if (range.start.line === range.end.line) {
                const line = state.cache.get(range.start.line) ?? '';
                const openingStart = range.start.column - opening.length;
                const hasSurrounding = hasTextAt(line, openingStart, opening) &&
                    hasTextAt(line, range.end.column, closing) &&
                    (
                        rangeIsCollapsed(range) ||
                        !sameDelimiter ||
                        (
                            isStandaloneDelimiter(line, openingStart, opening) &&
                            isStandaloneDelimiter(line, range.end.column, closing)
                        )
                    );
                if (hasSurrounding) {
                    const surroundingRange = {
                        start: { line: range.start.line, column: openingStart },
                        end: { line: range.end.line, column: range.end.column + closing.length }
                    };
                    replaceMarkdownRange(surroundingRange, selected, 0, selected.length);
                    return;
                }
            }

            wrapSelection(opening, closing);
        }

        function selectedMarkdownLineRange(range = activeMarkdownRange()) {
            const safeRange = orderedRange(range);
            const endLine = safeRange.end.column === 0 && safeRange.end.line > safeRange.start.line
                ? safeRange.end.line - 1
                : safeRange.end.line;
            return { range: safeRange, startLine: safeRange.start.line, endLine: Math.max(safeRange.start.line, endLine) };
        }

        function toggleLinePrefix(prefix) {
            const { range, startLine, endLine } = selectedMarkdownLineRange();
            const shouldRemove = Array.from({ length: endLine - startLine + 1 }, (_, i) => state.cache.get(startLine + i) ?? '')
                .every(line => line.startsWith(prefix));

            for (let line = startLine; line <= endLine; line++) {
                const original = state.cache.get(line) ?? '';
                applyLineText(line, shouldRemove ? original.slice(prefix.length) : prefix + original);
            }

            if (rangeIsCollapsed(range)) {
                const nextColumn = shouldRemove
                    ? Math.max(0, range.start.column - Math.min(prefix.length, range.start.column))
                    : range.start.column + prefix.length;
                setSelectionAfterLineEdits({ line: range.start.line, column: nextColumn }, { line: range.start.line, column: nextColumn });
            } else {
                const endText = state.cache.get(endLine) ?? '';
                setSelectionAfterLineEdits({ line: startLine, column: 0 }, { line: endLine, column: endText.length });
            }
        }

        function headingPrefix(line) {
            const match = line.match(/^(#{1,6})(?: |$)/);
            if (!match) return null;
            return {
                level: match[1].length,
                length: match[0].length
            };
        }

        function cycleHeadingLine(line) {
            const prefix = headingPrefix(line);
            if (!prefix) return '# ' + line;
            if (prefix.level < 6) return '#' + line;
            return line.slice(prefix.length);
        }

        function cycleHeadingPrefix() {
            const { range, startLine, endLine } = selectedMarkdownLineRange();
            const originalFirstLine = state.cache.get(startLine) ?? '';
            const firstPrefix = headingPrefix(originalFirstLine);
            for (let line = startLine; line <= endLine; line++) {
                applyLineText(line, cycleHeadingLine(state.cache.get(line) ?? ''));
            }

            if (rangeIsCollapsed(range)) {
                const delta = !firstPrefix
                    ? 2
                    : firstPrefix.level < 6
                        ? 1
                        : -Math.min(firstPrefix.length, range.start.column);
                const nextColumn = Math.max(0, range.start.column + delta);
                setSelectionAfterLineEdits({ line: range.start.line, column: nextColumn }, { line: range.start.line, column: nextColumn });
            } else {
                const endText = state.cache.get(endLine) ?? '';
                setSelectionAfterLineEdits({ line: startLine, column: 0 }, { line: endLine, column: endText.length });
            }
        }

        function findInlineCodeRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            const selected = textInRange(range);
            if (selected.length >= 2 && selected.startsWith('`') && selected.endsWith('`')) {
                return {
                    range,
                    content: selected.slice(1, -1)
                };
            }

            const opening = line.lastIndexOf('`', Math.max(0, range.start.column - 1));
            const closing = line.indexOf('`', range.end.column);
            if (opening >= 0 && closing >= range.end.column &&
                isStandaloneDelimiter(line, opening, '`') &&
                isStandaloneDelimiter(line, closing, '`')) {
                return {
                    range: {
                        start: { line: range.start.line, column: opening },
                        end: { line: range.end.line, column: closing + 1 }
                    },
                    content: line.slice(opening + 1, closing)
                };
            }
            return null;
        }

        function findCodeBlockRange(range) {
            const selected = textInRange(range);
            if (selected.startsWith('```\n') && selected.endsWith('\n```')) {
                return { range, content: selected.slice(4, -4) };
            }

            let openingLine = -1;
            for (let line = range.start.line; line >= 1; line--) {
                const text = state.cache.get(line);
                if (text === undefined) break;
                if (text.trim() === '```') {
                    openingLine = line;
                    break;
                }
            }
            if (openingLine < 0) return null;

            let closingLine = -1;
            for (let line = openingLine + 1; line <= state.lineCount; line++) {
                const text = state.cache.get(line);
                if (text === undefined) break;
                if (text.trim() === '```') {
                    closingLine = line;
                    break;
                }
            }
            if (closingLine < 0 || range.end.line > closingLine) return null;

            const contentLines = [];
            for (let line = openingLine + 1; line < closingLine; line++) {
                contentLines.push(state.cache.get(line) ?? '');
            }
            return {
                range: {
                    start: { line: openingLine, column: 0 },
                    end: { line: closingLine, column: (state.cache.get(closingLine) ?? '').length }
                },
                content: contentLines.join('\n')
            };
        }

        function cycleCodeFormatting() {
            const range = activeMarkdownRange();
            const codeBlock = findCodeBlockRange(range);
            if (codeBlock) {
                replaceMarkdownRange(codeBlock.range, codeBlock.content, 0, codeBlock.content.length);
                return;
            }

            const inlineCode = findInlineCodeRange(range);
            if (inlineCode) {
