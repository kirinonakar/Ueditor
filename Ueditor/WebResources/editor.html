<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Virtual Editor</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --row-hover: rgba(127, 127, 127, 0.12);
            --selection: rgba(0, 120, 212, 0.38);
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 22px;
            --gutter-width: 72px;
            --wrap: pre;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-family);
            font-size: var(--font-size);
        }

        ::selection {
            background: var(--selection);
        }

        body.selecting ::selection {
            background: transparent !important;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }

        #editor-host {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        #scroll-container {
            position: absolute;
            inset: 0;
            overflow: auto;
            background: var(--bg);
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
        }

        #virtual-spacer {
            width: 1px;
            height: var(--line-height);
            pointer-events: none;
        }

        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            min-width: 100%;
            will-change: transform;
        }

        body:not(.wrap-enabled) #viewport {
            right: auto;
            width: max-content;
        }

        .line-row {
            display: grid;
            grid-template-columns: var(--gutter-width) max-content;
            min-width: 100%;
            min-height: var(--line-height);
            line-height: var(--line-height);
            contain: layout style paint;
        }

        body.wrap-enabled .line-row {
            grid-template-columns: var(--gutter-width) minmax(0, 1fr);
            width: 100%;
        }

        body:not(.wrap-enabled) .line-row {
            width: max-content;
        }

        .line-row:hover {
            background: var(--row-hover);
        }

        .line-row.selected-empty-row .line-text {
            background: var(--selection);
        }

        .line-number {
            align-self: stretch;
            min-height: var(--line-height);
            padding: 0 12px 0 8px;
            overflow: hidden;
            border-right: 1px solid rgba(127, 127, 127, 0.22);
            background: var(--gutter-bg);
            color: var(--gutter-fg);
            font-size: 12px;
            text-align: right;
            user-select: none;
        }

        .line-text {
            min-width: calc(100vw - var(--gutter-width));
            min-height: var(--line-height);
            padding: 0 14px;
            overflow: hidden;
            outline: none;
            color: var(--fg);
            white-space: var(--wrap);
            overflow-wrap: normal;
            tab-size: 4;
            caret-color: var(--fg);
            user-select: text;
            -webkit-user-select: text;
        }

        body:not(.wrap-enabled) .line-text {
            width: max-content;
            min-width: calc(100vw - var(--gutter-width));
            overflow: visible;
        }

        body.wrap-enabled .line-text {
            min-width: 0;
            width: 100%;
            overflow: visible;
            overflow-wrap: anywhere;
        }

        .line-text[contenteditable="true"]:focus {
            background: color-mix(in srgb, var(--fg) 8%, transparent);
        }

        .line-text.loading {
            color: var(--gutter-fg);
            font-style: italic;
        }

        .line-text.long-line {
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            cursor: not-allowed;
        }

        mark.search-match {
            background: #ffd43b;
            color: #212529;
            border-radius: 2px;
            padding: 0 1px;
        }

        mark.active-match {
            background: #fd7e14;
            color: #ffffff;
            box-shadow: 0 0 3px rgba(253, 126, 20, 0.6);
        }

        .selection-fragment {
            background: var(--selection);
            color: inherit;
        }

        #find-panel {
            position: absolute;
            top: 10px;
            right: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 12px;
        }

        #find-panel[hidden] {
            display: none;
        }

        #context-menu {
            position: fixed;
            z-index: 50;
            min-width: 156px;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 13px;
        }

        #context-menu[hidden] {
            display: none;
        }

        .context-menu-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 28px;
            padding: 0 10px;
            border: 0;
            border-radius: 3px;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
        }

        .context-menu-button:hover:not(:disabled) {
            background: rgba(127, 127, 127, 0.16);
        }

        .context-menu-button:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .context-menu-separator {
            height: 1px;
            margin: 4px 2px;
            background: rgba(127, 127, 127, 0.28);
        }

        /* Context Menu Submenus */
        .context-menu-item {
            position: relative;
        }

        .context-menu-button .arrow {
            font-size: 9px;
            opacity: 0.6;
            margin-left: auto;
            pointer-events: none;
        }

        .submenu {
            display: none;
            position: absolute;
            top: -4px;
            left: 100%;
            min-width: 176px;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            z-index: 60;
        }

        .context-menu-item:hover>.submenu {
            display: block;
        }

        .context-menu-item:hover>.context-menu-button:not(:disabled) {
            background: rgba(127, 127, 127, 0.16);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--gutter-fg);
            font-family: system-ui, sans-serif;
            font-size: 15px;
            transition: opacity 0.3s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .autocomplete-popup {
            position: fixed;
            z-index: 60;
            min-width: 180px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 6px;
            background: color-mix(in srgb, var(--gutter-bg) 85%, transparent);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--fg);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            font-family: var(--font-family);
            font-size: 13px;
        }

        .autocomplete-popup[hidden] {
            display: none;
        }

        .autocomplete-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            min-height: 30px;
            padding: 4px 10px;
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background 0.1s, transform 0.1s;
        }

        .autocomplete-label {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        .autocomplete-detail {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 11px;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: var(--selection);
            color: #ffffff;
            transform: translateX(2px);
        }

        .autocomplete-item:hover .autocomplete-detail,
        .autocomplete-item.active .autocomplete-detail {
            color: rgba(255, 255, 255, 0.82);
        }

        #find-input,
        #replace-input {
            width: 180px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.45);
            border-radius: 3px;
            padding: 4px 8px;
            outline: 0;
            background: var(--bg);
            color: var(--fg);
            flex: 1;
        }

        .find-option-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--fg);
            opacity: 0.5;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            transition: opacity 0.1s, background-color 0.1s, border-color 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
        }

        .find-option-btn:hover {
            opacity: 0.8;
            background: rgba(127, 127, 127, 0.16);
        }

        .find-option-btn.active {
            background: rgba(0, 120, 212, 0.25) !important;
            opacity: 1 !important;
            border: 1px solid rgba(0, 120, 212, 0.4) !important;
            color: var(--fg) !important;
        }

        .find-button {
            min-width: 28px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.28);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            cursor: pointer;
        }

        .find-button:hover {
            background: rgba(127, 127, 127, 0.16);
        }

        /* Syntax Highlighting Tokens */
        .token-comment {
            color: var(--token-comment);
            font-style: italic;
        }

        .token-keyword {
            color: var(--token-keyword);
            font-weight: bold;
        }

        .token-control {
            color: var(--token-control);
            font-weight: bold;
        }

        .token-string {
            color: var(--token-string);
        }

        .token-number {
            color: var(--token-number);
        }

        .token-type {
            color: var(--token-type);
        }

        .token-function {
            color: var(--token-function);
        }

        .token-variable {
            color: var(--token-variable);
        }

        .token-operator {
            color: var(--token-operator);
        }

        .token-punctuation {
            color: var(--token-punctuation);
        }

        .token-tag {
            color: var(--token-tag);
        }

        .token-attr {
            color: var(--token-attr);
        }

        @media print {

            html,
            body {
                background: #fff !important;
                color: #000 !important;
                overflow: visible !important;
            }

            #print-container {
                background: #fff !important;
                color: #000 !important;
                position: relative !important;
                inset: auto !important;
                padding: 0 !important;
                overflow: visible !important;
            }

            .line-number {
                display: none !important;
            }

            .line-row {
                grid-template-columns: minmax(0, 1fr) !important;
            }

            .line-text {
                color: #000 !important;
            }

            #find-panel {
                display: none !important;
            }

            #editor-host {
                height: auto !important;
                overflow: visible !important;
            }

            #scroll-container {
                overflow: visible !important;
                height: auto !important;
                position: relative !important;
            }

            #viewport {
                position: relative !important;
                transform: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="editor-host">
        <div id="loading-overlay">로딩 중...</div>
        <div id="scroll-container">
            <div id="virtual-spacer"></div>
            <div id="viewport"></div>
        </div>
        <div id="find-panel" hidden>
            <div style="display: flex; gap: 8px; width: 100%;">
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <div style="position: relative; display: flex; align-items: center; width: 100%;">
                        <input id="find-input" type="text" placeholder="찾기" autocomplete="off" spellcheck="false"
                            style="width: 100%; padding-right: 60px;">
                        <div style="position: absolute; right: 5px; display: flex; gap: 2px; z-index: 10;">
                            <button id="find-match-case" class="find-option-btn" type="button" title="대소문자 구분 (Aa)">Aa</button>
                            <button id="find-regex" class="find-option-btn" type="button" title="정규식 사용 (.*)">.*</button>
                        </div>
                    </div>
                    <div id="replace-row" style="display: flex; width: 100%;">
                        <input id="replace-input" type="text" placeholder="바꾸기" autocomplete="off" spellcheck="false"
                            style="width: 100%;">
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
                    <div style="display: flex; gap: 6px; height: 28px; align-items: center;">
                        <button id="find-prev" class="find-button" type="button" title="이전">↑</button>
                        <button id="find-next" class="find-button" type="button" title="다음">↓</button>
                        <button id="find-close" class="find-button" type="button" title="닫기">×</button>
                    </div>
                    <div id="replace-actions-row" style="display: flex; gap: 6px; height: 28px; align-items: center;">
                        <button id="replace-btn" class="find-button" type="button" style="min-width: 52px;"
                            title="바꾸기">바꾸기</button>
                        <button id="replace-all-btn" class="find-button" type="button" style="min-width: 64px;"
                            title="모두 바꾸기">모두 바꾸기</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="context-menu" hidden>
            <button class="context-menu-button" type="button" data-action="cut" data-requires-edit="true">잘라내기</button>
            <button class="context-menu-button" type="button" data-action="copy">복사</button>
            <button class="context-menu-button" type="button" data-action="paste"
                data-requires-edit="true">붙여넣기</button>
            <button class="context-menu-button" type="button" data-action="delete" data-requires-edit="true">삭제</button>
            <button class="context-menu-button" type="button" data-action="selectAll">모두 선택</button>
            <div class="context-menu-separator" role="separator"></div>
            <button class="context-menu-button" type="button" data-action="toggleComment" data-requires-edit="true">주석
                토글</button>
            <button class="context-menu-button" type="button" data-action="indentLines"
                data-requires-edit="true">들여쓰기</button>
            <button class="context-menu-button" type="button" data-action="outdentLines"
                data-requires-edit="true">내여쓰기</button>
            <div class="context-menu-item has-submenu">
                <button class="context-menu-button" type="button">
                    <span>줄 정리</span>
                    <span class="arrow">▶</span>
                </button>
                <div class="submenu">
                    <button class="context-menu-button" type="button" data-action="sortAsc"
                        data-requires-edit="true">오름차순 정렬</button>
                    <button class="context-menu-button" type="button" data-action="sortDesc"
                        data-requires-edit="true">내림차순 정렬</button>
                    <button class="context-menu-button" type="button" data-action="removeDuplicates"
                        data-requires-edit="true">중복 줄 제거</button>
                    <button class="context-menu-button" type="button" data-action="removeEmptyLines"
                        data-requires-edit="true">빈 줄 제거</button>
                    <button class="context-menu-button" type="button" data-action="collapseConsecutiveEmptyLines"
                        data-requires-edit="true">연속 빈줄 하나로 줄이기</button>
                    <button class="context-menu-button" type="button" data-action="trimSpaces"
                        data-requires-edit="true">앞뒤 공백 제거</button>
                </div>
            </div>
            <div class="context-menu-item has-submenu">
                <button class="context-menu-button" type="button">
                    <span>변환</span>
                    <span class="arrow">▶</span>
                </button>
                <div class="submenu">
                    <button class="context-menu-button" type="button" data-action="toUpperCase"
                        data-requires-edit="true">대문자로</button>
                    <button class="context-menu-button" type="button" data-action="toLowerCase"
                        data-requires-edit="true">소문자로</button>
                    <button class="context-menu-button" type="button" data-action="toSentenceCase"
                        data-requires-edit="true">Sentence case</button>
                    <button class="context-menu-button" type="button" data-action="toTitleCase"
                        data-requires-edit="true">Title case</button>
                    <button class="context-menu-button" type="button" data-action="urlEncode"
                        data-requires-edit="true">URL Encode</button>
                    <button class="context-menu-button" type="button" data-action="urlDecode"
                        data-requires-edit="true">URL Decode</button>
                    <button class="context-menu-button" type="button" data-action="base64Encode"
                        data-requires-edit="true">Base64 Encode</button>
                    <button class="context-menu-button" type="button" data-action="base64Decode"
                        data-requires-edit="true">Base64 Decode</button>
                    <button class="context-menu-button" type="button" data-action="hexToDec"
                        data-requires-edit="true">HEX → DEC</button>
                    <button class="context-menu-button" type="button" data-action="decToHex"
                        data-requires-edit="true">DEC → HEX</button>
                </div>
            </div>
            <button class="context-menu-button" type="button" data-action="formatText" data-requires-edit="true">Format
                text</button>
            <div class="context-menu-separator" role="separator"></div>
            <button class="context-menu-button" type="button" data-action="toggleScrollSync">✓ 스크롤 동기화</button>
        </div>
        <div id="autocomplete-popup" class="autocomplete-popup" hidden></div>
    </div>

    <script>
        const scrollContainer = document.getElementById('scroll-container');
        const virtualSpacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('viewport');
        const findPanel = document.getElementById('find-panel');
        const findInput = document.getElementById('find-input');
        const findPrev = document.getElementById('find-prev');
        const findNextButton = document.getElementById('find-next');
        const findClose = document.getElementById('find-close');
        const contextMenu = document.getElementById('context-menu');
        const replaceInput = document.getElementById('replace-input');
        const replaceBtn = document.getElementById('replace-btn');
        const replaceAllBtn = document.getElementById('replace-all-btn');

        const MAX_RENDER_CHARS = 20000;
        const state = {
            lineCount: 1,
            lineHeight: 22,
            overscan: 12,
            cache: new Map(),
            pending: new Set(),
            lineHeights: new Map(),
            requestSeq: 1,
            currentLine: 1,
            currentColumn: 1,
            readOnly: false,
            wordWrap: false,
            language: 'plaintext',
            tabSize: 4,
            searchQuery: '',
            searchMatches: [],
            searchIndex: -1,
            activeSearch: null,
            findMatchCase: false,
            findRegex: false,
            selection: null,
            selectionAnchor: null,
            isSelecting: false,
            isLineSelecting: false,
            initialized: false,
            lastRangeKey: '',
            cacheVersion: 0,
            renderQueued: false,
            clipboardRequests: new Map(),
            pendingLineActions: [],
            autocompleteEnabled: true,
            snippets: [],
            scrollSyncEnabled: true,
            dragStartPosition: null,
            isComposing: false,
            compositionLine: null
        };

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function parseHexColor(value) {
            if (!value || typeof value !== 'string') return null;
            const match = value.trim().match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (!match) return null;
            let hex = match[1];
            if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function colorToHex(color) {
            const part = value => value.toString(16).padStart(2, '0');
            return `#${part(color.r)}${part(color.g)}${part(color.b)}`;
        }

        function relativeLuminance(color) {
            const normalize = value => {
                const channel = value / 255;
                return channel <= 0.03928 ? channel / 12.92 : Math.pow((channel + 0.055) / 1.055, 2.4);
            };
            return 0.2126 * normalize(color.r) + 0.7152 * normalize(color.g) + 0.0722 * normalize(color.b);
        }

        function contrastRatio(a, b) {
            const l1 = relativeLuminance(a);
            const l2 = relativeLuminance(b);
            return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
        }

        function readableForegroundFor(background) {
            const white = { r: 255, g: 255, b: 255 };
            const black = { r: 17, g: 17, b: 17 };
            return contrastRatio(background, white) >= contrastRatio(background, black) ? '#ffffff' : '#111111';
        }

        function resolveReadableColor(backgroundValue, foregroundValue, fallbackForeground) {
            const background = parseHexColor(backgroundValue);
            const foreground = parseHexColor(foregroundValue);
            const fallback = parseHexColor(fallbackForeground) || { r: 212, g: 212, b: 212 };
            if (!background) return foregroundValue || fallbackForeground;
            if (foreground && contrastRatio(background, foreground) >= 4.5) return colorToHex(foreground);
            if (contrastRatio(background, fallback) >= 4.5) return colorToHex(fallback);
            return readableForegroundFor(background);
        }

        function applyOptions(msg) {
            const theme = msg.theme || 'Dark';
            const bg = msg.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const preferredFg = msg.customForegroundColor || (theme === 'Light' ? '#111111' : '#d4d4d4');
            const fg = resolveReadableColor(bg, preferredFg, theme === 'Light' ? '#111111' : '#d4d4d4');
            const fontSize = Number(msg.fontSize || 14);
            state.lineHeight = Math.max(18, Math.ceil(fontSize + 8));
            state.tabSize = Number(msg.tabSize || 4);
            state.readOnly = !!msg.readOnly;
            state.wordWrap = !!msg.wordWrap;
            state.autocompleteEnabled = msg.hasOwnProperty('autocompleteEnabled') ? !!msg.autocompleteEnabled : true;
            if (!state.autocompleteEnabled) {
                hideAutocomplete();
            }

            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--fg', fg);
            document.documentElement.style.setProperty('--gutter-bg', theme === 'Light' ? '#f3f3f3' : '#252526');
            document.documentElement.style.setProperty('--gutter-fg', theme === 'Light' ? '#6b6b6b' : '#858585');
            document.documentElement.style.setProperty('--selection', theme === 'Light' ? 'rgba(0, 95, 184, 0.28)' : 'rgba(0, 120, 212, 0.38)');
            document.documentElement.style.setProperty('--font-size', `${fontSize}px`);
            document.documentElement.style.setProperty('--font-family', msg.fontFamily || 'Consolas, "Courier New", monospace');
            document.documentElement.style.setProperty('--line-height', `${state.lineHeight}px`);
            document.documentElement.style.setProperty('--wrap', state.wordWrap ? 'pre-wrap' : 'pre');
            document.body.classList.toggle('wrap-enabled', state.wordWrap);

            const replaceRow = document.getElementById('replace-row');
            if (replaceRow) {
                replaceRow.style.display = state.readOnly ? 'none' : 'flex';
            }
            const replaceActionsRow = document.getElementById('replace-actions-row');
            if (replaceActionsRow) {
                replaceActionsRow.style.display = state.readOnly ? 'none' : 'flex';
            }

            // Update syntax highlighting token variables dynamically based on Light / Dark theme
            if (theme === 'Light') {
                document.documentElement.style.setProperty('--token-comment', '#008000');
                document.documentElement.style.setProperty('--token-keyword', '#0000ff');
                document.documentElement.style.setProperty('--token-control', '#af00db');
                document.documentElement.style.setProperty('--token-string', '#a31515');
                document.documentElement.style.setProperty('--token-number', '#098658');
                document.documentElement.style.setProperty('--token-type', '#267f99');
                document.documentElement.style.setProperty('--token-function', '#795e26');
                document.documentElement.style.setProperty('--token-variable', '#001080');
                document.documentElement.style.setProperty('--token-operator', '#111111');
                document.documentElement.style.setProperty('--token-punctuation', '#3b3b3b');
                document.documentElement.style.setProperty('--token-tag', '#800000');
                document.documentElement.style.setProperty('--token-attr', '#ff0000');
            } else {
                document.documentElement.style.setProperty('--token-comment', '#6a9955');
                document.documentElement.style.setProperty('--token-keyword', '#569cd6');
                document.documentElement.style.setProperty('--token-control', '#c586c0');
                document.documentElement.style.setProperty('--token-string', '#ce9178');
                document.documentElement.style.setProperty('--token-number', '#b5cea8');
                document.documentElement.style.setProperty('--token-type', '#4ec9b0');
                document.documentElement.style.setProperty('--token-function', '#dcdcaa');
                document.documentElement.style.setProperty('--token-variable', '#9cdcfe');
                document.documentElement.style.setProperty('--token-operator', '#d4d4d4');
                document.documentElement.style.setProperty('--token-punctuation', '#808080');
                document.documentElement.style.setProperty('--token-tag', '#569cd6');
                document.documentElement.style.setProperty('--token-attr', '#9cdcfe');
            }

            if (!state.wordWrap) {
                state.lineHeights.clear();
            }

            // Apply localized strings for Find & Replace panel if present
            if (msg.findPlaceholder !== undefined) {
                const el = document.getElementById('find-input');
                if (el) el.placeholder = msg.findPlaceholder;
            }
            if (msg.replacePlaceholder !== undefined) {
                const el = document.getElementById('replace-input');
                if (el) el.placeholder = msg.replacePlaceholder;
            }
            if (msg.replaceButton !== undefined) {
                const el = document.getElementById('replace-btn');
                if (el) {
                    el.textContent = msg.replaceButton;
                    el.title = msg.replaceButton;
                }
            }
            if (msg.replaceAllButton !== undefined) {
                const el = document.getElementById('replace-all-btn');
                if (el) {
                    el.textContent = msg.replaceAllButton;
                    el.title = msg.replaceAllButton;
                }
            }
            if (msg.findPrevTooltip !== undefined) {
                const el = document.getElementById('find-prev');
                if (el) el.title = msg.findPrevTooltip;
            }
            if (msg.findNextTooltip !== undefined) {
                const el = document.getElementById('find-next');
                if (el) el.title = msg.findNextTooltip;
            }
            if (msg.findCloseTooltip !== undefined) {
                const el = document.getElementById('find-close');
                if (el) el.title = msg.findCloseTooltip;
            }

            setupVirtualHeight();
            queueRender(true);
        }

        function setupModel(lineCount) {
            state.lineCount = Math.max(1, Number(lineCount || 1));
            state.cache.clear();
            state.pending.clear();
            state.lineHeights.clear();
            state.cacheVersion++;
            state.lastRangeKey = '';
            setupVirtualHeight();
            queueRender(true);
        }

        function receiveLineBlock(startLine, lines) {
            const start = Number(startLine || 1);
            const safeLines = Array.isArray(lines) ? lines : [];
            for (let i = 0; i < safeLines.length; i++) {
                state.cache.set(start + i, safeLines[i] ?? '');
            }
            state.cacheVersion++;
            for (const key of [...state.pending]) {
                const [pendingStart, pendingCount] = key.split(':').map(Number);
                const pendingEnd = pendingStart + pendingCount - 1;
                const receivedEnd = start + safeLines.length - 1;
                if (start <= pendingStart && (safeLines.length === 0 || receivedEnd >= pendingEnd || receivedEnd >= state.lineCount)) {
                    state.pending.delete(key);
                }
            }
            return safeLines.length;
        }

        function setupVirtualHeight() {
            virtualSpacer.style.height = `${totalVirtualHeight()}px`;
        }

        function lineHeightFor(lineNumber) {
            return state.wordWrap ? (state.lineHeights.get(lineNumber) || state.lineHeight) : state.lineHeight;
        }

        function totalVirtualHeight() {
            let total = Math.max(1, state.lineCount) * state.lineHeight;
            if (state.wordWrap) {
                for (const height of state.lineHeights.values()) {
                    total += Math.max(0, height - state.lineHeight);
                }
            }
            return total;
        }

        function lineTop(lineNumber) {
            let top = (Math.max(1, lineNumber) - 1) * state.lineHeight;
            if (state.wordWrap) {
                for (const [line, height] of state.lineHeights.entries()) {
                    if (line < lineNumber) {
                        top += Math.max(0, height - state.lineHeight);
                    }
                }
            }
            return top;
        }

        function lineAt(scrollTop) {
            let line = Math.min(state.lineCount, Math.max(1, Math.floor(scrollTop / state.lineHeight) + 1));
            while (line < state.lineCount && lineTop(line + 1) <= scrollTop) {
                line++;
            }
            while (line > 1 && lineTop(line) > scrollTop) {
                line--;
            }
            return line;
        }

        function visibleRange() {
            const viewHeight = Math.max(scrollContainer.clientHeight, state.lineHeight);
            const firstVisible = lineAt(scrollContainer.scrollTop);
            const lastVisible = lineAt(scrollContainer.scrollTop + viewHeight);
            const start = Math.max(1, firstVisible - state.overscan);
            const end = Math.min(state.lineCount, lastVisible + state.overscan);
            return { start, end, count: Math.max(0, end - start + 1) };
        }

        function requestLines(start, count) {
            if (count <= 0) return;
            const key = `${start}:${count}`;
            if (state.pending.has(key)) return;
            state.pending.add(key);
            post({
                type: 'requestLines',
                requestId: state.requestSeq++,
                startLine: start,
                count
            });
        }

        function requestMissingLines(start, end) {
            let missingStart = 0;
            let missingCount = 0;
            for (let line = start; line <= end; line++) {
                if (!state.cache.has(line)) {
                    if (missingStart === 0) {
                        missingStart = line;
                        missingCount = 1;
                    } else {
                        missingCount++;
                    }
                } else if (missingStart !== 0) {
                    requestLines(missingStart, missingCount);
                    missingStart = 0;
                    missingCount = 0;
                }
            }
            if (missingStart !== 0) {
                requestLines(missingStart, missingCount);
            }
        }

        function queueRender(force = false) {
            if (force) {
                state.lastRangeKey = '';
            }
            if (state.renderQueued) return;
            state.renderQueued = true;
            requestAnimationFrame(() => {
                state.renderQueued = false;
                render();
            });
        }

        function render() {
            if (!state.initialized) return;

            const printContainer = document.getElementById('print-container');
            if (printContainer && printContainer.style.display === 'block') {
                return;
            }

            const range = visibleRange();
            const rangeKey = `${range.start}:${range.end}:${state.lineCount}:${scrollContainer.clientWidth}:${state.wordWrap}:${totalVirtualHeight()}:${state.cacheVersion}`;
            requestMissingLines(range.start, range.end);
            if (rangeKey === state.lastRangeKey) return;
            state.lastRangeKey = rangeKey;

            const offsetY = lineTop(range.start);
            viewport.style.transform = `translateY(${offsetY}px)`;
            const rows = [];
            for (let line = range.start; line <= range.end; line++) {
                const hasLine = state.cache.has(line);
                const text = hasLine ? state.cache.get(line) : '로딩 중...';
                const isLong = hasLine && text.length > MAX_RENDER_CHARS;
                const displayText = isLong
                    ? `${text.slice(0, MAX_RENDER_CHARS)} ... [긴 줄: ${text.length.toLocaleString()}자, 렌더링 보호]`
                    : text;
                const contentEditable = !state.readOnly && hasLine && !isLong ? 'true' : 'false';
                const selectionBounds = selectionBoundsForLine(line, displayText.length);
                const isInSelection = !!selectionBounds;
                const isSelectedEmptyLine = isInSelection && displayText.length === 0 && hasCustomSelection();
                const textClass = `line-text${hasLine ? '' : ' loading'}${isLong ? ' long-line' : ''}`;
                rows.push(
                    `<div class="line-row${isInSelection ? ' selected-row' : ''}${isSelectedEmptyLine ? ' selected-empty-row' : ''}" data-line="${line}">` +
                    `<div class="line-number">${line}</div>` +
                    `<div class="${textClass}" contenteditable="${contentEditable}" spellcheck="false" data-line="${line}">${renderLineContent(line, displayText)}</div>` +
                    `</div>`
                );
            }

            viewport.innerHTML = rows.join('');
            measureRenderedRows();
        }

        function measureRenderedRows() {
            if (!state.wordWrap) return;

            let changed = false;
            for (const row of viewport.querySelectorAll('.line-row')) {
                const lineNumber = Number(row.dataset.line || 0);
                if (!lineNumber) continue;
                const measured = Math.max(state.lineHeight, Math.ceil(row.scrollHeight / state.lineHeight) * state.lineHeight);
                if (state.lineHeights.get(lineNumber) !== measured) {
                    state.lineHeights.set(lineNumber, measured);
                    changed = true;
                }
            }

            if (changed) {
                setupVirtualHeight();
                state.lastRangeKey = '';
                requestAnimationFrame(() => render());
            }
        }

        function highlightLine(text, language) {
            if (!language || language === 'plaintext') {
                return escapeHtml(text);
            }

            const tokens = [];
            function stash(html) {
                const placeholder = `\u0002_TOKEN_${tokens.length}_\u0002`;
                tokens.push(html);
                return placeholder;
            }

            let workingText = text;

            // Check language category
            const isClike = ['csharp', 'javascript', 'typescript', 'cpp', 'java', 'go', 'rust', 'php', 'swift', 'dart', 'kotlin'].includes(language);
            const isPython = language === 'python';
            const isHtml = ['html', 'xml', 'xaml'].includes(language);
            const isCss = ['css', 'scss', 'less'].includes(language);
            const isJson = language === 'json';
            const isSql = language === 'sql';
            const isShell = ['shell', 'bash', 'powershell'].includes(language);
            const isMarkdown = ['markdown', 'md'].includes(language);
            const isR = language === 'r';
            const isRuby = language === 'ruby';
            const isLua = language === 'lua';
            const isLatex = language === 'latex';
            const isDataConfig = ['yaml', 'toml', 'ini'].includes(language);
            const isDiff = language === 'diff';
            const isDockerfile = language === 'dockerfile';
            const isMakefile = language === 'makefile';
            const isFsharp = language === 'fsharp';
            const isVb = ['vb', 'vbscript'].includes(language);
            const isReg = language === 'reg';

            if (isHtml) {
                // 1. Comments
                workingText = workingText.replace(/<!--[\s\S]*?-->/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                    // 2. CDATA / DOCTYPE
                    workingText = workingText.replace(/<!DOCTYPE[^>]*>|<!\[CDATA\[.*?\]\]>/gi, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
                // 3. Tags
                workingText = workingText.replace(/<([^>]+)>/g, (match, tagContent) => {
                    let tagHtml = "";
                    let remainder = tagContent;
                    const tagNameMatch = /^([^\s/]+)/.exec(remainder);
                    if (tagNameMatch) {
                        const tagName = tagNameMatch[1];
                        tagHtml += `<span class="token-tag">${escapeHtml(tagName)}</span>`;
                        remainder = remainder.slice(tagName.length);
                    }
                    remainder = remainder.replace(/([a-zA-Z0-9:-]+)(\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+))?/g, (attrMatch, attrName, attrVal) => {
                        let attrHtml = `<span class="token-attr">${escapeHtml(attrName)}</span>`;
                        if (attrVal) {
                            const eqIndex = attrVal.indexOf('=');
                            const valPart = attrVal.slice(eqIndex + 1);
                            attrHtml += `<span class="token-operator">=</span><span class="token-string">${escapeHtml(valPart)}</span>`;
                        }
                        return ' ' + attrHtml;
                    });
                    tagHtml += remainder;
                    return stash(`<span class="token-punctuation">&lt;</span>${tagHtml}<span class="token-punctuation">&gt;</span>`);
                });
            }
            else if (isCss) {
                // 1. Comments
                workingText = workingText.replace(/\/\*[\s\S]*?\*\//g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\/\/.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Selectors
                workingText = workingText.replace(/\b([a-zA-Z0-9._#-]+)(?=\s*\{)/g, m => stash(`<span class="token-tag">${escapeHtml(m)}</span>`));
                // 4. Variables
                workingText = workingText.replace(/--[a-zA-Z0-9_-]+/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
                // 5. Hex Colors
                workingText = workingText.replace(/#[0-9a-fA-F]{3,8}/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 6. Properties
                workingText = workingText.replace(/\b(margin|padding|background|color|width|height|border|display|position|top|left|right|bottom|font-size|font-family|font-weight|line-height|overflow|align-items|justify-content|grid-template-columns|inset|pointer-events|inset|will-change|contain|align-self|box-sizing|border-radius|box-shadow|z-index|gap|transition|animation|transform|cursor|outline|white-space|overflow-wrap|tab-size|caret-color|content)\b(?=\s*:)/gi, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 7. Numbers
                workingText = workingText.replace(/\b\d+(?:px|em|rem|%|vh|vw|ms|s|deg)?\b/gi, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 8. Punctuation
                workingText = workingText.replace(/[{}:;]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
            }
            else if (isJson) {
                // 1. Keys (strings followed by :)
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"(?=\s*:)/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 2. Values (strings)
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Numbers
                workingText = workingText.replace(/\b-?\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 4. Builtins
                workingText = workingText.replace(/\b(true|false|null)\b/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 5. Punctuation
                workingText = workingText.replace(/[{}()\[\]:,]/g, m => stash(`<span class="token-punctuation">${escapeHtml(m)}</span>`));
            }
            else if (isSql) {
                // 1. Comments
                workingText = workingText.replace(/--.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\/\*[\s\S]*?\*\//g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/'(?:''|[^'])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Keywords
                workingText = workingText.replace(/\b(SELECT|FROM|WHERE|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|TABLE|INDEX|VIEW|JOIN|INNER|LEFT|RIGHT|OUTER|ON|AND|OR|NOT|IN|LIKE|IS|NULL|ORDER|BY|GROUP|HAVING|LIMIT|OFFSET|UNION|ALL|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|INTO|VALUES|SET|DEFAULT|PRIMARY|KEY|FOREIGN|REFERENCES|CONSTRAINT|INDEX|DATABASE|TRIGGER|PROCEDURE|FUNCTION)\b/gi, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 4. Types
                workingText = workingText.replace(/\b(INT|VARCHAR|CHAR|TEXT|DATE|TIME|TIMESTAMP|BOOLEAN|FLOAT|DOUBLE|DECIMAL|NUMERIC)\b/gi, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 5. Numbers
                workingText = workingText.replace(/\b\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
            }
            else if (isMarkdown) {
                // 1. Code ticks / fenced code block indicators
                workingText = workingText.replace(/^```.*/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 2. Inline Code
                workingText = workingText.replace(/`[^`]+`/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Headers
                workingText = workingText.replace(/^#{1,6}\s+.*/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 4. Lists
                workingText = workingText.replace(/^\s*[-*+]\s+|^\s*\d+\.\s+/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 5. Blockquotes
                workingText = workingText.replace(/^\s*>\s+/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 6. Bold/Italic
                workingText = workingText.replace(/\*\*[^*]+\*\*/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/\*[^*]+\*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 7. Links
                workingText = workingText.replace(/!?\[[^\]]*\]\([^)]*\)/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
            }
            else if (isShell) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Variables
                workingText = workingText.replace(/\$[a-zA-Z_]\w*|\$\{[a-zA-Z_]\w*\}/g, m => stash(`<span class="token-variable">${escapeHtml(m)}</span>`));
                // 4. Control Flow
                workingText = workingText.replace(/\b(if|then|else|elif|fi|case|esac|for|while|until|do|done|in)\b/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 5. Keywords
                workingText = workingText.replace(/\b(function|return|exit|local|export|alias|echo|set|param|Write-Host|Get-ChildItem)\b/gi, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
            }
            else if (isPython) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Tripled Strings
                workingText = workingText.replace(/"""[\s\S]*?"""|'''[\s\S]*?'''/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Normal Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 4. Numbers
                workingText = workingText.replace(/\b\d+(?:\.\d+)?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 5. Control Flow
                workingText = workingText.replace(/\b(if|elif|else|return|for|while|break|continue|try|except|finally|raise|yield|pass|assert|with|as)\b/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 6. Keywords
                workingText = workingText.replace(/\b(def|class|import|from|global|nonlocal|lambda|in|is|and|or|not|del)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));
                // 7. Builtins
                workingText = workingText.replace(/\b(True|False|None|self|print|len|range|str|int|float|list|dict|set|tuple|object|open|enumerate|zip)\b/g, m => stash(`<span class="token-type">${escapeHtml(m)}</span>`));
                // 8. Functions
                workingText = workingText.replace(/\b([a-zA-Z_]\w*)(?=\s*\()/g, m => stash(`<span class="token-function">${escapeHtml(m)}</span>`));
            }
            else if (isR) {
                // 1. Comments
                workingText = workingText.replace(/#.*/g, m => stash(`<span class="token-comment">${escapeHtml(m)}</span>`));
                // 2. Strings
                workingText = workingText.replace(/"(?:\\.|[^"\\])*"/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                workingText = workingText.replace(/'(?:\\.|[^'\\])*'/g, m => stash(`<span class="token-string">${escapeHtml(m)}</span>`));
                // 3. Numbers
                workingText = workingText.replace(/\b(?:Inf|NaN|NA|NULL|TRUE|FALSE|T|F)\b|\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?[iL]?\b/g, m => stash(`<span class="token-number">${escapeHtml(m)}</span>`));
                // 4. Control Flow
                workingText = workingText.replace(/\b(if|else|for|while|repeat|break|next|return|in)\b/g, m => stash(`<span class="token-control">${escapeHtml(m)}</span>`));
                // 5. Keywords and builtins
                workingText = workingText.replace(/\b(function|library|require|source|setwd|getwd|data|print|cat|paste|paste0|c|list|matrix|data\.frame|tibble|factor|length|nrow|ncol|names|colnames|rownames|apply|lapply|sapply|tapply|aggregate|subset|merge|read\.csv|read\.table|write\.csv|ggplot|aes|mutate|filter|select|summarise|arrange|group_by)\b/g, m => stash(`<span class="token-keyword">${escapeHtml(m)}</span>`));

        function renderLineContent(lineNumber, text) {
            const selectionBounds = selectionBoundsForLine(lineNumber, text.length);
            if (selectionBounds) {
                const { start, end } = selectionBounds;
                if (start === end) {
                    return escapeHtml(text);
                }

                const selected = text.slice(start, end);
                const selectedHtml = selected.length > 0 ? escapeHtml(selected) : '&nbsp;';
                return escapeHtml(text.slice(0, start)) +
                    `<span class="selection-fragment">${selectedHtml}</span>` +
                    escapeHtml(text.slice(end));
            }

            if (state.searchQuery && state.searchMatches.length > 0) {
                const active = state.activeSearch;
                const activeMatchOnLine = active && active.lineNumber === lineNumber
                    ? active
                    : null;
                const matchesOnLine = state.searchMatches.filter(m => m.lineNumber === lineNumber);
                return renderSearchMatchesForLine(lineNumber, text, matchesOnLine, activeMatchOnLine);
            }

            return highlightLine(text, state.language);
        }

        function normalizeSelection(selection = state.selection) {
            if (!selection) return null;
            const a = selection.start;
            const b = selection.end;
            if (a.line < b.line || (a.line === b.line && a.column <= b.column)) {
                return { start: a, end: b, isColumn: !!selection.isColumn };
            }
            return { start: b, end: a, isColumn: !!selection.isColumn };
        }

        function hasCustomSelection() {
            const normalized = normalizeSelection();
            return !!normalized &&
                (normalized.start.line !== normalized.end.line ||
                    normalized.start.column !== normalized.end.column);
        }

        function selectAll() {
            const lastLine = state.lineCount;
            const lastText = state.cache.get(lastLine) || '';
            const endColumn = lastText.length;
            state.selectionAnchor = { line: 1, column: 0 };
            state.selection = { start: { line: 1, column: 0 }, end: { line: lastLine, column: endColumn } };
            state.currentLine = lastLine;
            state.currentColumn = endColumn + 1;
            queueRender(true);
            setTimeout(() => focusLine(lastLine, endColumn), 0);
            reportCursorAndSelection();
        }

        function selectionBoundsForLine(lineNumber, textLength) {
            const selection = normalizeSelection();
            if (!selection || lineNumber < selection.start.line || lineNumber > selection.end.line) {
                return null;
            }

            if (selection.isColumn) {
                const start = Math.min(selection.start.column, selection.end.column);
                const end = Math.max(selection.start.column, selection.end.column);
                return {
                    start: Math.max(0, Math.min(start, textLength)),
                    end: Math.max(0, Math.min(end, textLength))
                };
            }

            const start = lineNumber === selection.start.line ? selection.start.column : 0;
            const end = lineNumber === selection.end.line ? selection.end.column : textLength;
            return {
                start: Math.max(0, Math.min(start, textLength)),
                end: Math.max(0, Math.min(end, textLength))
            };
        }

        function lineElementFromEvent(event) {
            const target = event.target;
            if (target?.closest) {
                return target.closest('.line-text');
            }
            return target?.parentElement?.closest?.('.line-text') || null;
        }

        function lineTextFromElement(element) {
            return (element.textContent || '').replace(/\u00a0/g, ' ');
        }

        function getCaretOffset(element) {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return 0;
            const range = selection.getRangeAt(0);
            if (!element.contains(range.startContainer)) return 0;
            const before = range.cloneRange();
            before.selectNodeContents(element);
            before.setEnd(range.startContainer, range.startOffset);
            return before.toString().length;
        }

        function getCaretOffsetFromPoint(element, clientX, clientY) {
            let range = null;
            if (document.caretRangeFromPoint) {
                range = document.caretRangeFromPoint(clientX, clientY);
            } else if (document.caretPositionFromPoint) {
                const position = document.caretPositionFromPoint(clientX, clientY);
                if (position) {
                    range = document.createRange();
                    range.setStart(position.offsetNode, position.offset);
                }
            }

            if (range && element.contains(range.startContainer)) {
                const before = range.cloneRange();
                before.selectNodeContents(element);
                before.setEnd(range.startContainer, range.startOffset);
                return before.toString().length;
            }

            const rect = element.getBoundingClientRect();
            const textLength = lineTextFromElement(element).length;
            if (clientX <= rect.left) return 0;
            if (clientX >= rect.right) return textLength;
            return Math.round(((clientX - rect.left) / Math.max(1, rect.width)) * textLength);
        }

        function positionFromPointer(event) {
            let element = lineElementFromEvent(event);
            if (!element) {
                const hit = document.elementFromPoint(event.clientX, event.clientY);
                const row = hit?.closest?.('.line-row');
                if (row) {
                    element = row.querySelector('.line-text');
                }
                if (!element) {
                    const rows = viewport.querySelectorAll('.line-row');
                    if (rows.length === 0) return null;
                    const y = event.clientY + scrollContainer.scrollTop - (viewport.getBoundingClientRect().top + scrollContainer.scrollTop - scrollContainer.scrollTop);
                    let bestRow = rows[0];
                    let bestDist = Infinity;
                    for (const r of rows) {
                        const rect = r.getBoundingClientRect();
                        const mid = rect.top + rect.height / 2;
                        const dist = Math.abs(event.clientY - mid);
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestRow = r;
                        }
                    }
                    element = bestRow.querySelector('.line-text');
                }
            }
            if (!element) return null;
            const line = Number(element.dataset.line || 1);
            const textLength = lineTextFromElement(element).length;
            const column = Math.max(0, Math.min(getCaretOffsetFromPoint(element, event.clientX, event.clientY), textLength));
            return { line, column, element };
        }

        function isWordCharacter(char) {
            return /[\p{L}\p{N}_-]/u.test(char || '');
        }

        function wordRangeAtColumn(text, column) {
            const value = String(text ?? '');
            if (!value) return null;

            let index = Math.max(0, Math.min(column, value.length - 1));
            if (!isWordCharacter(value[index]) && index > 0 && isWordCharacter(value[index - 1])) {
                index--;
            }
            if (!isWordCharacter(value[index])) return null;

            let start = index;
            let end = index + 1;
            while (start > 0 && isWordCharacter(value[start - 1])) start--;
            while (end < value.length && isWordCharacter(value[end])) end++;
            return start < end ? { start, end } : null;
        }

        function selectWordAtPointer(event) {
            const position = positionFromPointer(event);
            if (!position || position.element.getAttribute('contenteditable') !== 'true') return false;

            const text = state.cache.get(position.line) ?? lineTextFromElement(position.element);
            const wordRange = wordRangeAtColumn(text, position.column);
            if (!wordRange) return false;

            state.selectionAnchor = { line: position.line, column: wordRange.start };
            state.selection = {
                start: { line: position.line, column: wordRange.start },
                end: { line: position.line, column: wordRange.end }
            };
            state.currentLine = position.line;
            state.currentColumn = wordRange.end + 1;
            queueRender(true);
            setTimeout(() => focusLine(position.line, wordRange.end), 0);
            reportCursorAndSelection(position.element);
            return true;
        }

            const firstPrefix = headingPrefix(originalFirstLine);
            for (let line = startLine; line <= endLine; line++) {
                applyLineText(line, cycleHeadingLine(state.cache.get(line) ?? ''));
            }

            if (rangeIsCollapsed(range)) {
                const delta = !firstPrefix
                    ? 2
                    : firstPrefix.level < 6
                        ? 1
                        : -Math.min(firstPrefix.length, range.start.column);
                const nextColumn = Math.max(0, range.start.column + delta);
                setSelectionAfterLineEdits({ line: range.start.line, column: nextColumn }, { line: range.start.line, column: nextColumn });
            } else {
                const endText = state.cache.get(endLine) ?? '';
                setSelectionAfterLineEdits({ line: startLine, column: 0 }, { line: endLine, column: endText.length });
            }
        }

        function findInlineCodeRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            const selected = textInRange(range);
            if (selected.length >= 2 && selected.startsWith('`') && selected.endsWith('`')) {
                return {
                    range,
                    content: selected.slice(1, -1)
                };
            }

            const opening = line.lastIndexOf('`', Math.max(0, range.start.column - 1));
            const closing = line.indexOf('`', range.end.column);
            if (opening >= 0 && closing >= range.end.column &&
                isStandaloneDelimiter(line, opening, '`') &&
                isStandaloneDelimiter(line, closing, '`')) {
                return {
                    range: {
                        start: { line: range.start.line, column: opening },
                        end: { line: range.end.line, column: closing + 1 }
                    },
                    content: line.slice(opening + 1, closing)
                };
            }
            return null;
        }

        function findCodeBlockRange(range) {
            const selected = textInRange(range);
            if (selected.startsWith('```\n') && selected.endsWith('\n```')) {
                return { range, content: selected.slice(4, -4) };
            }

            let openingLine = -1;
            for (let line = range.start.line; line >= 1; line--) {
                const text = state.cache.get(line);
                if (text === undefined) break;
                if (text.trim() === '```') {
                    openingLine = line;
                    break;
                }
            }
            if (openingLine < 0) return null;

            let closingLine = -1;
            for (let line = openingLine + 1; line <= state.lineCount; line++) {
                const text = state.cache.get(line);
                if (text === undefined) break;
                if (text.trim() === '```') {
                    closingLine = line;
                    break;
                }
            }
            if (closingLine < 0 || range.end.line > closingLine) return null;

            const contentLines = [];
            for (let line = openingLine + 1; line < closingLine; line++) {
                contentLines.push(state.cache.get(line) ?? '');
            }
            return {
                range: {
                    start: { line: openingLine, column: 0 },
                    end: { line: closingLine, column: (state.cache.get(closingLine) ?? '').length }
                },
                content: contentLines.join('\n')
            };
        }

        function cycleCodeFormatting() {
            const range = activeMarkdownRange();
            const codeBlock = findCodeBlockRange(range);
            if (codeBlock) {
                replaceMarkdownRange(codeBlock.range, codeBlock.content, 0, codeBlock.content.length);
                return;
            }

            const inlineCode = findInlineCodeRange(range);
            if (inlineCode) {
                const replacement = '```\n' + inlineCode.content + '\n```';
                replaceMarkdownRange(inlineCode.range, replacement, 4, 4 + inlineCode.content.length);
                return;
            }

            toggleWrappedSelection('`');
        }

        const markdownTextColorOpeningRegex = /<span\s+style\s*=\s*["']\s*color\s*:\s*#[0-9a-fA-F]{6}\s*;?\s*["']\s*>/ig;

        function findMarkdownTextColorRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            markdownTextColorOpeningRegex.lastIndex = 0;
            let match;
            while ((match = markdownTextColorOpeningRegex.exec(line)) !== null) {
                const contentStart = match.index + match[0].length;
                const closingStart = line.toLowerCase().indexOf('</span>', contentStart);
                if (closingStart < 0) continue;
                const closingEnd = closingStart + 7;
                if (range.start.column >= match.index && range.end.column <= closingEnd) {
                    const colorMatch = /color\s*:\s*(#[0-9a-fA-F]{6})/i.exec(match[0]);
                    return {
                        fullRange: {
                            start: { line: range.start.line, column: match.index },
                            end: { line: range.end.line, column: closingEnd }
                        },
                        openingRange: {
                            start: { line: range.start.line, column: match.index },
                            end: { line: range.end.line, column: contentStart }
                        },
                        content: line.slice(contentStart, closingStart),
                        contentStart,
                        colorHex: colorMatch ? colorMatch[1].toUpperCase() : ''
                    };
                }
            }
            return null;
        }

        function applyMarkdownTextColor(color) {
            const range = activeMarkdownRange();
            const colorHex = color || '#E53935';
            const colorRange = findMarkdownTextColorRange(range);
            if (colorHex.toLowerCase() === '#111111') {
                if (colorRange) {
                    replaceMarkdownRange(colorRange.fullRange, colorRange.content, 0, colorRange.content.length);
                }
                return;
            }

            if (colorRange) {
                if (colorRange.colorHex.toLowerCase() === colorHex.toLowerCase()) {
                    replaceMarkdownRange(colorRange.fullRange, colorRange.content, 0, colorRange.content.length);
                    return;
                }
                const opening = `<span style="color: ${colorHex}">`;
                replaceMarkdownRange(colorRange.openingRange, opening, opening.length, opening.length);
                return;
            }

            toggleWrappedSelection(`<span style="color: ${colorHex}">`, '</span>');
        }

        function parseMarkdownLinkAt(line, openBracketIndex) {
            if (openBracketIndex < 0 || line[openBracketIndex] !== '[') return null;
            const textEnd = line.indexOf('](', openBracketIndex + 1);
            if (textEnd < 0) return null;
            const urlStart = textEnd + 2;
            const fullEnd = line.indexOf(')', urlStart);
            if (fullEnd < 0) return null;
            return {
                fullStart: openBracketIndex,
                textStart: openBracketIndex + 1,
                textEnd,
                urlStart,
                urlEnd: fullEnd,
                fullEnd: fullEnd + 1
            };
        }

        function findMarkdownLinkRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            for (let index = Math.min(range.start.column, line.length - 1); index >= 0; index--) {
                if (line[index] !== '[') continue;
                const link = parseMarkdownLinkAt(line, index);
                if (link && range.start.column >= link.fullStart && range.end.column <= link.fullEnd) {
                    return {
                        range: {
                            start: { line: range.start.line, column: link.fullStart },
                            end: { line: range.end.line, column: link.fullEnd }
                        },
                        text: line.slice(link.textStart, link.textEnd),
                        urlStartOffset: link.urlStart - link.fullStart,
                        urlEndOffset: link.urlEnd - link.fullStart
                    };
                }
            }
            return null;
        }

        function toggleMarkdownLink() {
            const range = activeMarkdownRange();
            const link = findMarkdownLinkRange(range);
            if (link) {
                replaceMarkdownRange(link.range, link.text, 0, link.text.length);
                return;
            }

            const selected = textInRange(range);
            const linkText = selected || '링크';
            const replacement = `[${linkText}](url)`;
            if (selected) {
                const urlStart = linkText.length + 3;
                replaceMarkdownRange(range, replacement, urlStart, urlStart + 3);
            } else {
                replaceMarkdownRange(range, replacement, 1, 1 + linkText.length);
            }
        }

        function nextMarkdownArrow(current) {
            const arrows = ['→', '←', '↑', '↓'];
            const index = arrows.indexOf(current);
            return index >= 0 ? arrows[(index + 1) % arrows.length] : '→';
        }

        function cycleOrInsertArrow() {
            const range = activeMarkdownRange();
            const selected = textInRange(range);
            if (!rangeIsCollapsed(range) && ['→', '←', '↑', '↓'].includes(selected)) {
                const next = nextMarkdownArrow(selected);
                replaceMarkdownRange(range, next, next.length, next.length);
                return;
            }

            if (range.start.line === range.end.line && range.start.column > 0) {
                const line = state.cache.get(range.start.line) ?? '';
                const previous = line.slice(range.start.column - 1, range.start.column);
                if (['→', '←', '↑', '↓'].includes(previous)) {
                    const next = nextMarkdownArrow(previous);
                    replaceMarkdownRange({
                        start: { line: range.start.line, column: range.start.column - 1 },
                        end: { line: range.start.line, column: range.start.column }
                    }, next, next.length, next.length);
                    return;
                }
            }

            replaceMarkdownRange(range, '→', 1, 1);
        }

        function buildMarkdownTable(size) {
            const header = '|' + Array.from({ length: size }, () => '  |').join('');
            const separator = '| ' + Array.from({ length: size }, () => '---').join(' | ') + ' |';
            const bodyRows = Array.from({ length: size - 1 }, () => header);
            return [header, separator, ...bodyRows].join('\n');
        }

        function findGeneratedMarkdownTable(range) {
            for (const size of [3, 2]) {
                const tableLines = buildMarkdownTable(size).split('\n');
                const firstCandidate = Math.max(1, range.start.line - tableLines.length + 1);
                for (let startLine = firstCandidate; startLine <= range.start.line; startLine++) {
                    let matches = true;
                    for (let i = 0; i < tableLines.length; i++) {
                        if ((state.cache.get(startLine + i) ?? '') !== tableLines[i]) {
                            matches = false;
                            break;
                        }
                    }
                    const endLine = startLine + tableLines.length - 1;
                    if (matches && range.end.line <= endLine) {
                        return { startLine, endLine, size };
                    }
                }
            }
            return null;
        }

        function cycleMarkdownTable() {
            const range = activeMarkdownRange();
            const existing = findGeneratedMarkdownTable(range);
            if (existing) {
                if (existing.size === 2) {
                    const existingRange = {
                        start: { line: existing.startLine, column: 0 },
                        end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                    };
                    const table = buildMarkdownTable(3);
                    replaceMarkdownRange(existingRange, table, 2, 2);
                } else {
                    if (existing.endLine < state.lineCount) {
                        replaceMarkdownRange({
                            start: { line: existing.startLine, column: 0 },
                            end: { line: existing.endLine + 1, column: 0 }
                        }, '', 0, 0);
                    } else if (existing.startLine > 1) {
                        const previousText = state.cache.get(existing.startLine - 1) ?? '';
                        replaceMarkdownRange({
                            start: { line: existing.startLine - 1, column: previousText.length },
                            end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                        }, '', 0, 0);
                    } else {
                        replaceMarkdownRange({
                            start: { line: existing.startLine, column: 0 },
                            end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                        }, '', 0, 0);
                    }
                }
                return;
            }

            const endLineText = state.cache.get(range.end.line) ?? '';
            const needsLeadingBreak = range.start.column > 0;
            const needsTrailingBreak = range.end.column < endLineText.length;
            const table = buildMarkdownTable(2);
            const replacement = `${needsLeadingBreak ? '\n' : ''}${table}${needsTrailingBreak ? '\n' : ''}`;
            const firstCellOffset = (needsLeadingBreak ? 1 : 0) + 2;
            replaceMarkdownRange(range, replacement, firstCellOffset, firstCellOffset);
        }

        async function cutCurrentMarkdownLine() {
            const range = activeMarkdownRange();
            const lineNumber = range.start.line;
            const lineText = state.cache.get(lineNumber) ?? '';
            await writeClipboardText(lineText);

            if (state.lineCount <= 1) {
                applyLineText(1, '');
                setSelectionAfterLineEdits({ line: 1, column: 0 }, { line: 1, column: 0 });
                return;
            }

            if (lineNumber < state.lineCount) {
                replaceMarkdownRange({
                    start: { line: lineNumber, column: 0 },
                    end: { line: lineNumber + 1, column: 0 }
                }, '', 0, 0);
            } else {
                const previousText = state.cache.get(lineNumber - 1) ?? '';
                replaceMarkdownRange({
                    start: { line: lineNumber - 1, column: previousText.length },
                    end: { line: lineNumber, column: lineText.length }
                }, '', 0, 0);
            }
        }

        function applyMarkdownCommand(command, color) {
            switch (command) {
                case 'bold': toggleWrappedSelection('**'); break;
                case 'italic': toggleWrappedSelection('*'); break;
                case 'underline': toggleWrappedSelection('<u>', '</u>'); break;
                case 'highlight': toggleWrappedSelection('=='); break;
                case 'inlineCode': cycleCodeFormatting(); break;
                case 'math': toggleWrappedSelection('$$', '$$'); break;
                case 'quote': toggleLinePrefix('> '); break;
