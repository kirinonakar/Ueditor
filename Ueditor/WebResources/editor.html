<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Virtual Editor</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --row-hover: rgba(127, 127, 127, 0.12);
            --selection: rgba(0, 120, 212, 0.38);
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 22px;
            --gutter-width: 72px;
            --wrap: pre;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-family);
            font-size: var(--font-size);
        }

        ::selection {
            background: var(--selection);
        }

        body.selecting ::selection {
            background: transparent !important;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }

        #editor-host {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        #scroll-container {
            position: absolute;
            inset: 0;
            overflow: auto;
            background: var(--bg);
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
        }

        #virtual-spacer {
            width: 1px;
            height: var(--line-height);
            pointer-events: none;
        }

        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            min-width: 100%;
            will-change: transform;
        }

        body:not(.wrap-enabled) #viewport {
            right: auto;
            width: max-content;
        }

        .line-row {
            display: grid;
            grid-template-columns: var(--gutter-width) max-content;
            min-width: 100%;
            min-height: var(--line-height);
            line-height: var(--line-height);
            contain: layout style paint;
        }

        body.wrap-enabled .line-row {
            grid-template-columns: var(--gutter-width) minmax(0, 1fr);
            width: 100%;
        }

        body:not(.wrap-enabled) .line-row {
            width: max-content;
        }

        .line-row:hover {
            background: var(--row-hover);
        }

        .line-number {
            align-self: stretch;
            min-height: var(--line-height);
            padding: 0 12px 0 8px;
            overflow: hidden;
            border-right: 1px solid rgba(127, 127, 127, 0.22);
            background: var(--gutter-bg);
            color: var(--gutter-fg);
            font-size: 12px;
            text-align: right;
            user-select: none;
        }

        .line-text {
            min-width: calc(100vw - var(--gutter-width));
            min-height: var(--line-height);
            padding: 0 14px;
            overflow: hidden;
            outline: none;
            color: var(--fg);
            white-space: var(--wrap);
            overflow-wrap: normal;
            tab-size: 4;
            caret-color: var(--fg);
        }

        body:not(.wrap-enabled) .line-text {
            width: max-content;
            min-width: calc(100vw - var(--gutter-width));
            overflow: visible;
        }

        body.wrap-enabled .line-text {
            min-width: 0;
            width: 100%;
            overflow: visible;
            overflow-wrap: anywhere;
        }

        .line-text[contenteditable="true"]:focus {
            background: color-mix(in srgb, var(--fg) 8%, transparent);
        }

        .line-text.loading {
            color: var(--gutter-fg);
            font-style: italic;
        }

        .line-text.long-line {
            color: color-mix(in srgb, var(--fg) 72%, transparent);
            cursor: not-allowed;
        }

        mark.search-match {
            background: #ffd43b;
            color: #212529;
            border-radius: 2px;
            padding: 0 1px;
        }

        mark.active-match {
            background: #fd7e14;
            color: #ffffff;
            box-shadow: 0 0 3px rgba(253, 126, 20, 0.6);
        }

        .selection-fragment {
            background: var(--selection);
            color: inherit;
        }

        #find-panel {
            position: absolute;
            top: 10px;
            right: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 12px;
        }

        #find-panel[hidden] {
            display: none;
        }

        #find-input {
            width: 220px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.45);
            border-radius: 3px;
            padding: 4px 8px;
            outline: 0;
            background: var(--bg);
            color: var(--fg);
        }

        .find-button {
            min-width: 28px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.28);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            cursor: pointer;
        }

        .find-button:hover {
            background: rgba(127, 127, 127, 0.16);
        }
    </style>
</head>
<body>
    <div id="editor-host">
        <div id="scroll-container">
            <div id="virtual-spacer"></div>
            <div id="viewport"></div>
        </div>
        <div id="find-panel" hidden>
            <input id="find-input" type="text" placeholder="검색" autocomplete="off" spellcheck="false">
            <button id="find-prev" class="find-button" type="button" title="이전">↑</button>
            <button id="find-next" class="find-button" type="button" title="다음">↓</button>
            <button id="find-close" class="find-button" type="button" title="닫기">×</button>
        </div>
    </div>

    <script>
        const scrollContainer = document.getElementById('scroll-container');
        const virtualSpacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('viewport');
        const findPanel = document.getElementById('find-panel');
        const findInput = document.getElementById('find-input');
        const findPrev = document.getElementById('find-prev');
        const findNextButton = document.getElementById('find-next');
        const findClose = document.getElementById('find-close');

        const MAX_RENDER_CHARS = 20000;
        const state = {
            lineCount: 1,
            lineHeight: 22,
            overscan: 12,
            cache: new Map(),
            pending: new Set(),
            lineHeights: new Map(),
            requestSeq: 1,
            currentLine: 1,
            currentColumn: 1,
            readOnly: false,
            wordWrap: false,
            language: 'plaintext',
            tabSize: 4,
            activeSearch: null,
            selection: null,
            selectionAnchor: null,
            isSelecting: false,
            lastRangeKey: '',
            renderQueued: false
        };

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function parseHexColor(value) {
            if (!value || typeof value !== 'string') return null;
            const match = value.trim().match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (!match) return null;
            let hex = match[1];
            if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function colorToHex(color) {
            const part = value => value.toString(16).padStart(2, '0');
            return `#${part(color.r)}${part(color.g)}${part(color.b)}`;
        }

        function relativeLuminance(color) {
            const normalize = value => {
                const channel = value / 255;
                return channel <= 0.03928 ? channel / 12.92 : Math.pow((channel + 0.055) / 1.055, 2.4);
            };
            return 0.2126 * normalize(color.r) + 0.7152 * normalize(color.g) + 0.0722 * normalize(color.b);
        }

        function contrastRatio(a, b) {
            const l1 = relativeLuminance(a);
            const l2 = relativeLuminance(b);
            return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
        }

        function readableForegroundFor(background) {
            const white = { r: 255, g: 255, b: 255 };
            const black = { r: 17, g: 17, b: 17 };
            return contrastRatio(background, white) >= contrastRatio(background, black) ? '#ffffff' : '#111111';
        }

        function resolveReadableColor(backgroundValue, foregroundValue, fallbackForeground) {
            const background = parseHexColor(backgroundValue);
            const foreground = parseHexColor(foregroundValue);
            const fallback = parseHexColor(fallbackForeground) || { r: 212, g: 212, b: 212 };
            if (!background) return foregroundValue || fallbackForeground;
            if (foreground && contrastRatio(background, foreground) >= 4.5) return colorToHex(foreground);
            if (contrastRatio(background, fallback) >= 4.5) return colorToHex(fallback);
            return readableForegroundFor(background);
        }

        function applyOptions(msg) {
            const theme = msg.theme || 'Dark';
            const bg = msg.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const preferredFg = msg.customForegroundColor || (theme === 'Light' ? '#111111' : '#d4d4d4');
            const fg = resolveReadableColor(bg, preferredFg, theme === 'Light' ? '#111111' : '#d4d4d4');
            const fontSize = Number(msg.fontSize || 14);
            state.lineHeight = Math.max(18, Math.ceil(fontSize + 8));
            state.tabSize = Number(msg.tabSize || 4);
            state.readOnly = !!msg.readOnly;
            state.wordWrap = !!msg.wordWrap;

            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--fg', fg);
            document.documentElement.style.setProperty('--gutter-bg', theme === 'Light' ? '#f3f3f3' : '#252526');
            document.documentElement.style.setProperty('--gutter-fg', theme === 'Light' ? '#6b6b6b' : '#858585');
            document.documentElement.style.setProperty('--selection', theme === 'Light' ? 'rgba(0, 95, 184, 0.28)' : 'rgba(0, 120, 212, 0.38)');
            document.documentElement.style.setProperty('--font-size', `${fontSize}px`);
            document.documentElement.style.setProperty('--font-family', msg.fontFamily || 'Consolas, "Courier New", monospace');
            document.documentElement.style.setProperty('--line-height', `${state.lineHeight}px`);
            document.documentElement.style.setProperty('--wrap', state.wordWrap ? 'pre-wrap' : 'pre');
            document.body.classList.toggle('wrap-enabled', state.wordWrap);
            if (!state.wordWrap) {
                state.lineHeights.clear();
            }
            setupVirtualHeight();
            queueRender(true);
        }

        function setupModel(lineCount) {
            state.lineCount = Math.max(1, Number(lineCount || 1));
            state.cache.clear();
            state.pending.clear();
            state.lineHeights.clear();
            state.lastRangeKey = '';
            setupVirtualHeight();
            queueRender(true);
        }

        function setupVirtualHeight() {
            virtualSpacer.style.height = `${totalVirtualHeight()}px`;
        }

        function lineHeightFor(lineNumber) {
            return state.wordWrap ? (state.lineHeights.get(lineNumber) || state.lineHeight) : state.lineHeight;
        }

        function totalVirtualHeight() {
            let total = Math.max(1, state.lineCount) * state.lineHeight;
            if (state.wordWrap) {
                for (const height of state.lineHeights.values()) {
                    total += Math.max(0, height - state.lineHeight);
                }
            }
            return total;
        }

        function lineTop(lineNumber) {
            let top = (Math.max(1, lineNumber) - 1) * state.lineHeight;
            if (state.wordWrap) {
                for (const [line, height] of state.lineHeights.entries()) {
                    if (line < lineNumber) {
                        top += Math.max(0, height - state.lineHeight);
                    }
                }
            }
            return top;
        }

        function lineAt(scrollTop) {
            let line = Math.min(state.lineCount, Math.max(1, Math.floor(scrollTop / state.lineHeight) + 1));
            while (line < state.lineCount && lineTop(line + 1) <= scrollTop) {
                line++;
            }
            while (line > 1 && lineTop(line) > scrollTop) {
                line--;
            }
            return line;
        }

        function visibleRange() {
            const viewHeight = Math.max(scrollContainer.clientHeight, state.lineHeight);
            const firstVisible = lineAt(scrollContainer.scrollTop);
            const lastVisible = lineAt(scrollContainer.scrollTop + viewHeight);
            const start = Math.max(1, firstVisible - state.overscan);
            const end = Math.min(state.lineCount, lastVisible + state.overscan);
            return { start, end, count: Math.max(0, end - start + 1) };
        }

        function requestLines(start, count) {
            if (count <= 0) return;
            const key = `${start}:${count}`;
            if (state.pending.has(key)) return;
            state.pending.add(key);
            post({
                type: 'requestLines',
                requestId: state.requestSeq++,
                startLine: start,
                count
            });
        }

        function requestMissingLines(start, end) {
            let missingStart = 0;
            let missingCount = 0;
            for (let line = start; line <= end; line++) {
                if (!state.cache.has(line)) {
                    if (missingStart === 0) {
                        missingStart = line;
                        missingCount = 1;
                    } else {
                        missingCount++;
                    }
                } else if (missingStart !== 0) {
                    requestLines(missingStart, missingCount);
                    missingStart = 0;
                    missingCount = 0;
                }
            }
            if (missingStart !== 0) {
                requestLines(missingStart, missingCount);
            }
        }

        function queueRender(force = false) {
            if (force) {
                state.lastRangeKey = '';
            }
            if (state.renderQueued) return;
            state.renderQueued = true;
            requestAnimationFrame(() => {
                state.renderQueued = false;
                render();
            });
        }

        function render() {
            const range = visibleRange();
            const rangeKey = `${range.start}:${range.end}:${state.lineCount}:${scrollContainer.clientWidth}:${state.wordWrap}:${totalVirtualHeight()}`;
            requestMissingLines(range.start, range.end);
            if (rangeKey === state.lastRangeKey) return;
            state.lastRangeKey = rangeKey;

            const offsetY = lineTop(range.start);
            viewport.style.transform = `translateY(${offsetY}px)`;
            const rows = [];
            for (let line = range.start; line <= range.end; line++) {
                const hasLine = state.cache.has(line);
                const text = hasLine ? state.cache.get(line) : '로딩 중...';
                const isLong = hasLine && text.length > MAX_RENDER_CHARS;
                const displayText = isLong
                    ? `${text.slice(0, MAX_RENDER_CHARS)} ... [긴 줄: ${text.length.toLocaleString()}자, 렌더링 보호]`
                    : text;
                const contentEditable = !state.readOnly && hasLine && !isLong ? 'true' : 'false';
                const isInSelection = !!selectionBoundsForLine(line, displayText.length);
                const textClass = `line-text${hasLine ? '' : ' loading'}${isLong ? ' long-line' : ''}`;
                rows.push(
                    `<div class="line-row${isInSelection ? ' selected-row' : ''}" data-line="${line}">` +
                    `<div class="line-number">${line}</div>` +
                    `<div class="${textClass}" contenteditable="${contentEditable}" spellcheck="false" data-line="${line}">${renderLineContent(line, displayText)}</div>` +
                    `</div>`
                );
            }

            viewport.innerHTML = rows.join('');
            measureRenderedRows();
        }

        function measureRenderedRows() {
            if (!state.wordWrap) return;

            let changed = false;
            for (const row of viewport.querySelectorAll('.line-row')) {
                const lineNumber = Number(row.dataset.line || 0);
                if (!lineNumber) continue;
                const measured = Math.max(state.lineHeight, Math.ceil(row.scrollHeight / state.lineHeight) * state.lineHeight);
                if (state.lineHeights.get(lineNumber) !== measured) {
                    state.lineHeights.set(lineNumber, measured);
                    changed = true;
                }
            }

            if (changed) {
                setupVirtualHeight();
                state.lastRangeKey = '';
                requestAnimationFrame(() => render());
            }
        }

        function renderLineContent(lineNumber, text) {
            const selectionBounds = selectionBoundsForLine(lineNumber, text.length);
            if (selectionBounds) {
                const { start, end } = selectionBounds;
                if (start === end) {
                    return escapeHtml(text);
                }

                const selected = text.slice(start, end);
                const selectedHtml = selected.length > 0 ? escapeHtml(selected) : '&nbsp;';
                return escapeHtml(text.slice(0, start)) +
                    `<span class="selection-fragment">${selectedHtml}</span>` +
                    escapeHtml(text.slice(end));
            }

            const active = state.activeSearch;
            if (!active || !active.query || lineNumber !== active.lineNumber) {
                return escapeHtml(text);
            }

            const start = Math.max(0, active.indexOfMatch || 0);
            const length = Math.max(0, active.matchLength || active.query.length);
            return escapeHtml(text.slice(0, start)) +
                `<mark class="search-match active-match">${escapeHtml(text.slice(start, start + length))}</mark>` +
                escapeHtml(text.slice(start + length));
        }

        function normalizeSelection(selection = state.selection) {
            if (!selection) return null;
            const a = selection.start;
            const b = selection.end;
            if (a.line < b.line || (a.line === b.line && a.column <= b.column)) {
                return { start: a, end: b };
            }
            return { start: b, end: a };
        }

        function hasCustomSelection() {
            const normalized = normalizeSelection();
            return !!normalized &&
                (normalized.start.line !== normalized.end.line ||
                 normalized.start.column !== normalized.end.column);
        }

        function selectionBoundsForLine(lineNumber, textLength) {
            const selection = normalizeSelection();
            if (!selection || lineNumber < selection.start.line || lineNumber > selection.end.line) {
                return null;
            }

            const start = lineNumber === selection.start.line ? selection.start.column : 0;
            const end = lineNumber === selection.end.line ? selection.end.column : textLength;
            return {
                start: Math.max(0, Math.min(start, textLength)),
                end: Math.max(0, Math.min(end, textLength))
            };
        }

        function lineElementFromEvent(event) {
            return event.target.closest('.line-text');
        }

        function lineTextFromElement(element) {
            return (element.textContent || '').replace(/\u00a0/g, ' ');
        }

        function getCaretOffset(element) {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return 0;
            const range = selection.getRangeAt(0);
            if (!element.contains(range.startContainer)) return 0;
            const before = range.cloneRange();
            before.selectNodeContents(element);
            before.setEnd(range.startContainer, range.startOffset);
            return before.toString().length;
        }

        function getCaretOffsetFromPoint(element, clientX, clientY) {
            let range = null;
            if (document.caretRangeFromPoint) {
                range = document.caretRangeFromPoint(clientX, clientY);
            } else if (document.caretPositionFromPoint) {
                const position = document.caretPositionFromPoint(clientX, clientY);
                if (position) {
                    range = document.createRange();
                    range.setStart(position.offsetNode, position.offset);
                }
            }

            if (range && element.contains(range.startContainer)) {
                const before = range.cloneRange();
                before.selectNodeContents(element);
                before.setEnd(range.startContainer, range.startOffset);
                return before.toString().length;
            }

            const rect = element.getBoundingClientRect();
            const textLength = lineTextFromElement(element).length;
            if (clientX <= rect.left) return 0;
            if (clientX >= rect.right) return textLength;
            return Math.round(((clientX - rect.left) / Math.max(1, rect.width)) * textLength);
        }

        function positionFromPointer(event) {
            const element = lineElementFromEvent(event) ||
                document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.line-text');
            if (!element) return null;
            const line = Number(element.dataset.line || 1);
            const textLength = lineTextFromElement(element).length;
            const column = Math.max(0, Math.min(getCaretOffsetFromPoint(element, event.clientX, event.clientY), textLength));
            return { line, column, element };
        }

        function setCaret(element, offset) {
            element.focus();
            const selection = window.getSelection();
            const range = document.createRange();
            let remaining = Math.max(0, offset);

            function walk(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    if (remaining <= node.textContent.length) {
                        range.setStart(node, remaining);
                        range.collapse(true);
                        return true;
                    }
                    remaining -= node.textContent.length;
                    return false;
                }

                for (const child of node.childNodes) {
                    if (walk(child)) return true;
                }
                return false;
            }

            if (!walk(element)) {
                range.selectNodeContents(element);
                range.collapse(false);
            }

            selection.removeAllRanges();
            selection.addRange(range);
            reportCursorAndSelection(element);
        }

        function commitLine(element) {
            const lineNumber = Number(element.dataset.line || 1);
            const text = lineTextFromElement(element);
            state.cache.set(lineNumber, text);
            state.currentLine = lineNumber;
            state.currentColumn = getCaretOffset(element) + 1;
            post({ type: 'lineChanged', lineNumber, text });
            post({ type: 'contentChanged' });
            reportCursorAndSelection(element);
        }

        function shiftCachedLines(fromLine, delta) {
            shiftLineMap(state.cache, fromLine, delta);
            shiftLineMap(state.lineHeights, fromLine, delta);
        }

        function shiftLineMap(map, fromLine, delta) {
            const entries = [...map.entries()]
                .filter(([line]) => line >= fromLine)
                .sort((a, b) => delta > 0 ? b[0] - a[0] : a[0] - b[0]);
            for (const [line] of entries) {
                map.delete(line);
            }
            for (const [line, value] of entries) {
                const nextLine = line + delta;
                if (nextLine >= 1 && nextLine <= state.lineCount + Math.max(delta, 0)) {
                    map.set(nextLine, value);
                }
            }
        }

        function splitCurrentLine(element) {
            const lineNumber = Number(element.dataset.line || 1);
            const text = lineTextFromElement(element);
            const caret = getCaretOffset(element);
            const before = text.slice(0, caret);
            const after = text.slice(caret);
            state.cache.set(lineNumber, before);
            shiftCachedLines(lineNumber + 1, 1);
            state.cache.set(lineNumber + 1, after);
            state.lineCount++;
            setupVirtualHeight();
            post({ type: 'splitLine', lineNumber, before, after });
            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => focusLine(lineNumber + 1, 0), 0);
        }

        function mergeWithPrevious(element) {
            const lineNumber = Number(element.dataset.line || 1);
            if (lineNumber <= 1) return;
            const current = lineTextFromElement(element);
            const previous = state.cache.get(lineNumber - 1);
            if (previous === undefined) {
                requestLines(lineNumber - 1, 2);
                return;
            }

            state.cache.set(lineNumber - 1, previous + current);
            shiftCachedLines(lineNumber, -1);
            state.lineCount = Math.max(1, state.lineCount - 1);
            setupVirtualHeight();
            post({ type: 'mergeLineWithPrevious', lineNumber });
            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => focusLine(lineNumber - 1, previous.length), 0);
        }

        function focusLine(lineNumber, columnZeroBased = 0) {
            const wrappedTargetTop = lineTop(lineNumber);
            if (wrappedTargetTop < scrollContainer.scrollTop ||
                wrappedTargetTop > scrollContainer.scrollTop + scrollContainer.clientHeight - state.lineHeight) {
                scrollContainer.scrollTop = Math.max(0, wrappedTargetTop - state.lineHeight * state.overscan);
            }

            queueRender(true);
            setTimeout(() => {
                const element = viewport.querySelector(`.line-text[data-line="${lineNumber}"]`);
                if (element && element.getAttribute('contenteditable') === 'true') {
                    setCaret(element, columnZeroBased);
                }
            }, 20);
        }

        function reportCursorAndSelection(element = document.activeElement) {
            const editable = element && element.closest ? element.closest('.line-text') : null;
            if (editable) {
                state.currentLine = Number(editable.dataset.line || state.currentLine);
                state.currentColumn = getCaretOffset(editable) + 1;
            }

            post({ type: 'cursorChanged', line: state.currentLine, column: state.currentColumn });
            post({ type: 'selectionResult', text: selectedText() });
        }

        function selectedText() {
            const selection = normalizeSelection();
            if (selection && hasCustomSelection()) {
                const parts = [];
                for (let line = selection.start.line; line <= selection.end.line; line++) {
                    const text = state.cache.get(line) || '';
                    const start = line === selection.start.line ? selection.start.column : 0;
                    const end = line === selection.end.line ? selection.end.column : text.length;
                    parts.push(text.slice(Math.max(0, start), Math.max(0, end)));
                }
                return parts.join('\n');
            }

            return window.getSelection()?.toString() || '';
        }

        function insertTextAtCaret(text) {
            const element = document.activeElement?.closest?.('.line-text');
            if (!element || element.getAttribute('contenteditable') !== 'true') return;
            const normalized = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            if (normalized.includes('\n')) {
                const lineNumber = Number(element.dataset.line || 1);
                const current = lineTextFromElement(element);
                const caret = getCaretOffset(element);
                const before = current.slice(0, caret);
                const after = current.slice(caret);
                const parts = normalized.split('\n');
                const insertedCount = parts.length - 1;
                const firstLine = before + parts[0];
                const lastLineNumber = lineNumber + insertedCount;

                state.cache.set(lineNumber, firstLine);
                shiftCachedLines(lineNumber + 1, insertedCount);
                post({ type: 'lineChanged', lineNumber, text: firstLine });

                for (let i = 1; i < parts.length; i++) {
                    const nextText = i === parts.length - 1 ? parts[i] + after : parts[i];
                    const nextLineNumber = lineNumber + i;
                    state.cache.set(nextLineNumber, nextText);
                    post({ type: 'insertLine', lineNumber: nextLineNumber, text: nextText });
                }

                state.lineCount += insertedCount;
                setupVirtualHeight();
                post({ type: 'contentChanged' });
                queueRender(true);
                setTimeout(() => focusLine(lastLineNumber, parts[parts.length - 1]?.length || 0), 0);
                return;
            }

            document.execCommand('insertText', false, normalized);
            commitLine(element);
        }

        function wrapSelection(opening, closing = opening) {
            const selection = window.getSelection();
            const element = document.activeElement?.closest?.('.line-text');
            if (!element || element.getAttribute('contenteditable') !== 'true') return;
            if (!selection || selection.rangeCount === 0 || !element.contains(selection.anchorNode)) {
                insertTextAtCaret(opening + closing);
                return;
            }

            const selected = selection.toString();
            document.execCommand('insertText', false, opening + selected + closing);
            commitLine(element);
        }

        function toggleLinePrefix(prefix) {
            const element = document.activeElement?.closest?.('.line-text');
            if (!element || element.getAttribute('contenteditable') !== 'true') return;
            const lineNumber = Number(element.dataset.line || 1);
            const text = lineTextFromElement(element);
            const next = text.startsWith(prefix) ? text.slice(prefix.length) : prefix + text;
            state.cache.set(lineNumber, next);
            element.textContent = next;
            state.selection = null;
            post({ type: 'lineChanged', lineNumber, text: next });
            post({ type: 'contentChanged' });
            setCaret(element, Math.min(next.length, state.currentColumn + prefix.length - 1));
        }

        function applyMarkdownCommand(command, color) {
            switch (command) {
                case 'bold': wrapSelection('**'); break;
                case 'italic': wrapSelection('*'); break;
                case 'underline': wrapSelection('<u>', '</u>'); break;
                case 'highlight': wrapSelection('=='); break;
                case 'inlineCode': wrapSelection('`'); break;
                case 'math': wrapSelection('$$', '$$'); break;
                case 'quote': toggleLinePrefix('> '); break;
                case 'ul': toggleLinePrefix('- '); break;
                case 'task': toggleLinePrefix('- [ ] '); break;
                case 'link': wrapSelection('[', '](https://)'); break;
                case 'textColor': wrapSelection(`<span style="color:${color || '#E53935'}">`, '</span>'); break;
                case 'heading': toggleLinePrefix('# '); break;
                case 'arrow': insertTextAtCaret(' -> '); break;
                case 'fontIncrease': wrapSelection('<big>', '</big>'); break;
                case 'fontDecrease': wrapSelection('<small>', '</small>'); break;
                case 'cutLine':
                    {
                        const element = document.activeElement?.closest?.('.line-text');
                        if (element) {
                            const lineNumber = Number(element.dataset.line || 1);
                            state.cache.set(lineNumber, '');
                            element.textContent = '';
                            post({ type: 'lineChanged', lineNumber, text: '' });
                            post({ type: 'contentChanged' });
                        }
                    }
                    break;
                case 'table':
                    insertTextAtCaret('| Header | Value |\n| --- | --- |\n|  |  |');
                    break;
            }
        }

        function openFindPanel() {
            findPanel.hidden = false;
            const selected = selectedText();
            if (selected && !/[\r\n]/.test(selected)) {
                findInput.value = selected;
            }
            findInput.focus();
            findInput.select();
        }

        function closeFindPanel() {
            findPanel.hidden = true;
            state.activeSearch = null;
            queueRender(true);
            scrollContainer.focus();
        }

        function requestFind(reverse = false) {
            const query = findInput.value;
            if (!query) return;
            post({
                type: 'find',
                query,
                startLine: state.currentLine,
                startColumn: state.currentColumn + (reverse ? -1 : 1),
                reverse,
                matchCase: false
            });
        }

        function handleCsharpMessage(msg) {
            switch (msg.action) {
                case 'initModel':
                    state.language = msg.language || 'plaintext';
                    applyOptions(msg);
                    setupModel(msg.lineCount || 1);
                    break;
                case 'setText':
                    {
                        const text = msg.text || '';
                        const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                        setupModel(Math.max(1, lines.length));
                        lines.forEach((line, index) => state.cache.set(index + 1, line));
                        queueRender(true);
                    }
                    break;
                case 'receiveLines':
                    {
                        const start = Number(msg.startLine || 1);
                        const lines = msg.lines || [];
                        for (let i = 0; i < lines.length; i++) {
                            state.cache.set(start + i, lines[i] ?? '');
                        }
                        for (const key of [...state.pending]) {
                            const [pendingStart, pendingCount] = key.split(':').map(Number);
                            if (start <= pendingStart && start + lines.length >= pendingStart + pendingCount) {
                                state.pending.delete(key);
                            }
                        }
                        queueRender(true);
                    }
                    break;
                case 'lineCountChanged':
                    state.lineCount = Math.max(1, Number(msg.lineCount || 1));
                    setupVirtualHeight();
                    queueRender(true);
                    break;
                case 'setLanguage':
                    state.language = msg.language || 'plaintext';
                    break;
                case 'updateOptions':
                    applyOptions(msg);
                    break;
                case 'triggerFind':
                    openFindPanel();
                    break;
                case 'getSelection':
                    post({ type: 'selectionResult', text: selectedText() });
                    break;
                case 'insertText':
                    insertTextAtCaret(msg.text || '');
                    break;
                case 'markdownCommand':
                    applyMarkdownCommand(msg.command, msg.color);
                    break;
                case 'revealLine':
                    revealLine(msg.lineNumber || 1, msg.indexOfMatch || 0, msg.matchLength || 0, msg.query || '');
                    break;
                case 'findResult':
                    if (msg.found) {
                        revealLine(msg.lineNumber, msg.indexOfMatch || 0, msg.matchLength || 0, msg.query || findInput.value);
                    }
                    break;
                case 'focus':
                    focusLine(state.currentLine, Math.max(0, state.currentColumn - 1));
                    break;
            }
        }

        function revealLine(lineNumber, indexOfMatch = 0, matchLength = 0, query = '') {
            const safeLine = Math.min(Math.max(1, Number(lineNumber || 1)), state.lineCount);
            state.currentLine = safeLine;
            state.currentColumn = Math.max(1, Number(indexOfMatch || 0) + 1);
            state.activeSearch = query
                ? { lineNumber: safeLine, indexOfMatch, matchLength, query }
                : null;
            scrollContainer.scrollTop = Math.max(0, lineTop(safeLine) - state.lineHeight * state.overscan);
            requestLines(Math.max(1, safeLine - state.overscan), state.overscan * 2 + 1);
            queueRender(true);
            setTimeout(() => focusLine(safeLine, Math.max(0, indexOfMatch || 0)), 40);
        }

        viewport.addEventListener('input', event => {
            const element = lineElementFromEvent(event);
            if (element) {
                state.selection = null;
                commitLine(element);
            }
        });

        viewport.addEventListener('pointerdown', event => {
            if (event.button !== 0 || findPanel.contains(event.target)) return;
            const position = positionFromPointer(event);
            if (!position || position.element.getAttribute('contenteditable') !== 'true') return;

            // event.preventDefault(); // Commented out to allow natural focus on click
            viewport.setPointerCapture?.(event.pointerId);

            const hadSelection = hasCustomSelection();
            const anchor = event.shiftKey && state.selectionAnchor
                ? state.selectionAnchor
                : { line: position.line, column: position.column };
            state.selectionAnchor = anchor;
            state.selection = event.shiftKey
                ? { start: anchor, end: { line: position.line, column: position.column } }
                : null;
            state.isSelecting = true;
            document.body.classList.add('selecting');
            state.currentLine = position.line;
            state.currentColumn = position.column + 1;
            setCaret(position.element, position.column);
            if (event.shiftKey || hadSelection) {
                queueRender(true);
                setTimeout(() => focusLine(state.currentLine, Math.max(0, state.currentColumn - 1)), 0);
            }
            reportCursorAndSelection(position.element);
        });

        viewport.addEventListener('pointermove', event => {
            if (!state.isSelecting) return;
            const position = positionFromPointer(event);
            if (!position) return;

            event.preventDefault();
            const newSelection = {
                start: state.selectionAnchor || { line: position.line, column: position.column },
                end: { line: position.line, column: position.column }
            };

            const selectionChanged = !state.selection ||
                state.selection.start.line !== newSelection.start.line ||
                state.selection.start.column !== newSelection.start.column ||
                state.selection.end.line !== newSelection.end.line ||
                state.selection.end.column !== newSelection.end.column;

            const isEmpty = newSelection.start.line === newSelection.end.line &&
                            newSelection.start.column === newSelection.end.column;

            if (isEmpty && !state.selection) {
                // Ignore micro-movements to prevent losing focus due to DOM re-renders on simple click
                return;
            }

            if (selectionChanged) {
                state.selection = isEmpty ? null : newSelection;
                state.currentLine = position.line;
                state.currentColumn = position.column + 1;
                queueRender(true);
                reportCursorAndSelection(position.element);
            }
        });

        viewport.addEventListener('pointerup', event => {
            if (!state.isSelecting) return;
            state.isSelecting = false;
            document.body.classList.remove('selecting');
            viewport.releasePointerCapture?.(event.pointerId);
            const hadSelection = hasCustomSelection();
            const selection = normalizeSelection();
            if (selection && !hasCustomSelection()) {
                state.selection = null;
            } else if (selection) {
                setTimeout(() => focusLine(state.currentLine, Math.max(0, state.currentColumn - 1)), 0);
            }
            if (hadSelection || hasCustomSelection()) {
                queueRender(true);
            }
            reportCursorAndSelection(document.activeElement);
        });

        viewport.addEventListener('pointercancel', event => {
            if (!state.isSelecting) return;
            state.isSelecting = false;
            document.body.classList.remove('selecting');
            viewport.releasePointerCapture?.(event.pointerId);
            queueRender(true);
        });

        viewport.addEventListener('keydown', event => {
            const element = lineElementFromEvent(event);
            const ctrl = event.ctrlKey || event.metaKey;
            const key = event.key.toLowerCase();

            if (ctrl) {
                if (key === 's') {
                    event.preventDefault();
                    post({ type: 'shortcut', name: 'save' });
                    return;
                }
                if (key === 'o') {
                    event.preventDefault();
                    post({ type: 'shortcut', name: 'open' });
                    return;
                }
                if (key === 'w') {
                    event.preventDefault();
                    post({ type: 'shortcut', name: 'closeTab' });
                    return;
                }
                if (key === 'f') {
                    event.preventDefault();
                    if (event.shiftKey) post({ type: 'shortcut', name: 'searchAll' });
                    else openFindPanel();
                    return;
                }
                if (event.code === 'Backquote' || event.key === '`' || event.key === '~' || event.key === 'Dead') {
                    event.preventDefault();
                    post({ type: 'shortcut', name: 'terminal' });
                    return;
                }
            }

            if (!element || element.getAttribute('contenteditable') !== 'true') return;

            if (event.key === 'Tab') {
                event.preventDefault();
                insertTextAtCaret(' '.repeat(state.tabSize));
                return;
            }

            if (event.key === 'Enter') {
                event.preventDefault();
                splitCurrentLine(element);
                return;
            }

            if (event.key === 'Backspace' && getCaretOffset(element) === 0) {
                event.preventDefault();
                mergeWithPrevious(element);
                return;
            }
        });

        viewport.addEventListener('keyup', event => {
            const element = lineElementFromEvent(event);
            reportCursorAndSelection(element || document.activeElement);
        });

        viewport.addEventListener('click', event => {
            const element = lineElementFromEvent(event);
            reportCursorAndSelection(element || document.activeElement);
        });

        document.addEventListener('copy', event => {
            if (!hasCustomSelection()) return;
            event.clipboardData?.setData('text/plain', selectedText());
            event.preventDefault();
        });

        scrollContainer.addEventListener('scroll', () => queueRender());
        window.addEventListener('resize', () => queueRender(true));
        window.addEventListener('dragover', event => event.preventDefault(), false);
        window.addEventListener('drop', event => event.preventDefault(), false);

        findInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                event.preventDefault();
                requestFind(event.shiftKey);
            } else if (event.key === 'Escape') {
                event.preventDefault();
                closeFindPanel();
            }
        });
        findPrev.addEventListener('click', () => requestFind(true));
        findNextButton.addEventListener('click', () => requestFind(false));
        findClose.addEventListener('click', closeFindPanel);

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                handleCsharpMessage(msg);
            });
        }

        setupModel(1);
        post({ type: 'ready', virtualized: true });
    </script>
</body>
</html>
