<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Standalone Editor</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --fg: #d4d4d4;
            --gutter-bg: #252526;
            --gutter-fg: #858585;
            --selection: rgba(0, 120, 212, 0.38);
            --selection-fg: #ffffff;
            --tok-keyword: #569cd6;
            --tok-type: #4ec9b0;
            --tok-string: #ce9178;
            --tok-number: #b5cea8;
            --tok-comment: #6a9955;
            --tok-attr: #9cdcfe;
            --tok-md: #d7ba7d;
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 1.45;
            --wrap: pre-wrap;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
        }

        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--fg) 22%, transparent);
            border: 2px solid var(--bg);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: color-mix(in srgb, var(--fg) 35%, transparent);
        }

        #host {
            display: grid;
            grid-template-columns: 64px 1fr;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-family);
            font-size: var(--font-size);
        }

        #gutter {
            overflow: hidden;
            padding: 12px 8px 12px 0;
            background: var(--gutter-bg);
            color: var(--gutter-fg);
            border-right: 1px solid rgba(127, 127, 127, 0.2);
            text-align: right;
            line-height: var(--line-height);
            user-select: none;
            white-space: pre;
        }

        #editor-shell {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        #highlight,
        #editor {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            padding: 12px 14px;
            overflow: auto;
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
            white-space: var(--wrap);
            tab-size: 4;
        }

        #highlight {
            margin: 0;
            pointer-events: none;
            color: var(--fg);
            background: var(--bg);
            overflow: hidden;
        }

        #highlight-content {
            display: block;
            min-height: 100%;
            font: inherit;
            white-space: inherit;
        }

        #editor {
            outline: 0;
            resize: none;
            background: transparent;
            color: transparent;
            -webkit-text-fill-color: transparent;
            caret-color: var(--fg);
        }

        #editor::selection {
            background: var(--selection);
            color: var(--selection-fg);
            -webkit-text-fill-color: var(--selection-fg);
        }

        #editor::-moz-selection {
            background: var(--selection);
            color: var(--selection-fg);
        }

        .tok-keyword { color: var(--tok-keyword); }
        .tok-type { color: var(--tok-type); }
        .tok-string { color: var(--tok-string); }
        .tok-number { color: var(--tok-number); }
        .tok-comment { color: var(--tok-comment); font-style: italic; }
        .tok-operator { color: var(--fg); }
        .tok-tag { color: var(--tok-keyword); }
        .tok-attr { color: var(--tok-attr); }
        .tok-md { color: var(--tok-md); font-weight: 600; }

        #find-panel {
            position: absolute;
            top: 10px;
            right: 18px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border: 1px solid rgba(127, 127, 127, 0.35);
            border-radius: 4px;
            background: var(--gutter-bg);
            color: var(--fg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 12px;
        }

        #find-panel[hidden] {
            display: none;
        }

        #find-input {
            width: 220px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.45);
            border-radius: 3px;
            padding: 4px 8px;
            outline: 0;
            background: var(--bg);
            color: var(--fg);
        }

        #find-count {
            min-width: 48px;
            color: var(--gutter-fg);
            text-align: center;
        }

        .find-button {
            min-width: 28px;
            height: 28px;
            border: 1px solid rgba(127, 127, 127, 0.28);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            cursor: pointer;
        }

        .find-button:hover {
            background: rgba(127, 127, 127, 0.16);
        }
    </style>
</head>
<body>
    <div id="host">
        <div id="gutter">1</div>
        <div id="editor-shell">
            <pre id="highlight" aria-hidden="true"><code id="highlight-content"></code></pre>
            <textarea id="editor" spellcheck="false"></textarea>
            <div id="find-panel" hidden>
                <input id="find-input" type="text" placeholder="검색" autocomplete="off" spellcheck="false">
                <span id="find-count">0/0</span>
                <button id="find-prev" class="find-button" type="button" title="이전">↑</button>
                <button id="find-next" class="find-button" type="button" title="다음">↓</button>
                <button id="find-close" class="find-button" type="button" title="닫기">×</button>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const highlight = document.getElementById('highlight');
        const highlightContent = document.getElementById('highlight-content');
        const gutter = document.getElementById('gutter');
        const findPanel = document.getElementById('find-panel');
        const findInput = document.getElementById('find-input');
        const findCount = document.getElementById('find-count');
        const findPrev = document.getElementById('find-prev');
        const findNextButton = document.getElementById('find-next');
        const findClose = document.getElementById('find-close');
        let isProgrammaticChange = false;
        let tabSize = 4;
        let currentLanguage = 'plaintext';
        let findMatches = [];
        let activeFindIndex = -1;

        function parseHexColor(value) {
            if (!value || typeof value !== 'string') return null;
            const raw = value.trim();
            const match = raw.match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (!match) return null;

            let hex = match[1];
            if (hex.length === 3) {
                hex = hex.split('').map(ch => ch + ch).join('');
            }

            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function colorToHex(color) {
            const part = value => value.toString(16).padStart(2, '0');
            return `#${part(color.r)}${part(color.g)}${part(color.b)}`;
        }

        function relativeLuminance(color) {
            const normalize = value => {
                const channel = value / 255;
                return channel <= 0.03928 ? channel / 12.92 : Math.pow((channel + 0.055) / 1.055, 2.4);
            };

            return 0.2126 * normalize(color.r) + 0.7152 * normalize(color.g) + 0.0722 * normalize(color.b);
        }

        function contrastRatio(a, b) {
            const l1 = relativeLuminance(a);
            const l2 = relativeLuminance(b);
            const lighter = Math.max(l1, l2);
            const darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
        }

        function readableForegroundFor(background) {
            const white = { r: 255, g: 255, b: 255 };
            const black = { r: 17, g: 17, b: 17 };
            return contrastRatio(background, white) >= contrastRatio(background, black) ? white : black;
        }

        function resolveReadableColor(backgroundValue, foregroundValue, fallbackForeground) {
            const background = parseHexColor(backgroundValue);
            const foreground = parseHexColor(foregroundValue);
            const fallback = parseHexColor(fallbackForeground) || { r: 212, g: 212, b: 212 };

            if (!background) {
                return foregroundValue || fallbackForeground;
            }

            if (foreground && contrastRatio(background, foreground) >= 4.5) {
                return colorToHex(foreground);
            }

            if (contrastRatio(background, fallback) >= 4.5) {
                return colorToHex(fallback);
            }

            return colorToHex(readableForegroundFor(background));
        }

        function applySyntaxPalette(theme, background, foreground) {
            const parsedBackground = parseHexColor(background);
            const useLightPalette = parsedBackground ? relativeLuminance(parsedBackground) > 0.55 : theme === 'Light';

            if (useLightPalette) {
                document.documentElement.style.setProperty('--tok-keyword', '#0000ff');
                document.documentElement.style.setProperty('--tok-type', '#267f99');
                document.documentElement.style.setProperty('--tok-string', '#a31515');
                document.documentElement.style.setProperty('--tok-number', '#098658');
                document.documentElement.style.setProperty('--tok-comment', '#008000');
                document.documentElement.style.setProperty('--tok-attr', '#001080');
                document.documentElement.style.setProperty('--tok-md', '#795e26');
            } else {
                document.documentElement.style.setProperty('--tok-keyword', '#569cd6');
                document.documentElement.style.setProperty('--tok-type', '#4ec9b0');
                document.documentElement.style.setProperty('--tok-string', '#ce9178');
                document.documentElement.style.setProperty('--tok-number', '#b5cea8');
                document.documentElement.style.setProperty('--tok-comment', '#6a9955');
                document.documentElement.style.setProperty('--tok-attr', '#9cdcfe');
                document.documentElement.style.setProperty('--tok-md', '#d7ba7d');
            }

            document.documentElement.style.setProperty('--selection-fg', foreground);
        }

        function post(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function lineCount() {
            return Math.max(1, editor.value.split(/\r\n|\r|\n/).length);
        }

        function updateGutter() {
            const count = lineCount();
            let text = "";
            for (let i = 1; i <= count; i++) {
                text += i + (i === count ? "" : "\n");
            }
            gutter.textContent = text;
            gutter.scrollTop = editor.scrollTop;
        }

        function escapeHtml(value) {
            return (value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function tokenSpan(className, value) {
            return `<span class="${className}">${escapeHtml(value)}</span>`;
        }

        function highlightPlain(text) {
            return escapeHtml(text);
        }

        function highlightCodeLike(text) {
            const pattern = /(\/\/.*?$|\/\*[\s\S]*?\*\/|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`|\b(?:class|interface|struct|enum|namespace|using|public|private|protected|internal|static|readonly|async|await|return|if|else|switch|case|break|continue|for|foreach|while|do|try|catch|finally|throw|new|var|let|const|function|import|export|from|extends|implements|void|null|true|false|this|base|get|set|record|sealed|override|virtual)\b|\b(?:string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)\b|\b\d+(?:\.\d+)?\b)/gim;
            let html = '';
            let lastIndex = 0;
            for (const matchResult of text.matchAll(pattern)) {
                const match = matchResult[0];
                html += escapeHtml(text.slice(lastIndex, matchResult.index));
                if (match.startsWith('//') || match.startsWith('/*')) html += tokenSpan('tok-comment', match);
                else if (/^["'`]/.test(match)) html += tokenSpan('tok-string', match);
                else if (/^\d/.test(match)) html += tokenSpan('tok-number', match);
                else if (/^(string|int|long|double|float|decimal|bool|char|object|Task|List|Dictionary|IEnumerable|void)$/.test(match)) html += tokenSpan('tok-type', match);
                else html += tokenSpan('tok-keyword', match);
                lastIndex = matchResult.index + match.length;
            }
            html += escapeHtml(text.slice(lastIndex));
            return html;
        }

        function highlightJson(text) {
            return escapeHtml(text)
                .replace(/(&quot;[^&]*?&quot;)(\s*:)?/g, (_, key, colon) => colon ? `${tokenSpan('tok-attr', key.replace(/&quot;/g, '"'))}${colon}` : tokenSpan('tok-string', key.replace(/&quot;/g, '"')))
                .replace(/\b(true|false|null)\b/g, '<span class="tok-keyword">$1</span>')
                .replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
        }

        function highlightMarkup(text) {
            return escapeHtml(text).replace(/(&lt;\/?)([\w:-]+)([^&]*?)(&gt;)/g, (_, open, tag, attrs, close) => {
                const highlightedAttrs = attrs.replace(/([\w:-]+)(=)(&quot;.*?&quot;|'.*?')/g, '<span class="tok-attr">$1</span>$2<span class="tok-string">$3</span>');
                return `${open}<span class="tok-tag">${tag}</span>${highlightedAttrs}${close}`;
            });
        }

        function highlightMarkdown(text) {
            return escapeHtml(text)
                .replace(/^((?:#{1,6}|>|[-*]|\d+\.)\s.*)$/gm, '<span class="tok-md">$1</span>')
                .replace(/(`[^`]+`)/g, '<span class="tok-string">$1</span>')
                .replace(/(\*\*[^*]+\*\*|\*[^*]+\*|==[^=]+==|~~[^~]+~~)/g, '<span class="tok-md">$1</span>');
        }

        function updateHighlight() {
            const text = editor.value || ' ';
            let html;
            if (currentLanguage === 'html' || currentLanguage === 'xml') {
                html = highlightMarkup(text);
            } else if (currentLanguage === 'json') {
                html = highlightJson(text);
            } else if (currentLanguage === 'markdown' || currentLanguage === 'latex') {
                html = highlightMarkdown(text);
            } else if (currentLanguage === 'plaintext') {
                html = highlightPlain(text);
            } else {
                html = highlightCodeLike(text);
            }

            highlightContent.innerHTML = html + (text.endsWith('\n') ? ' ' : '');
            syncHighlightScroll();
        }

        function syncHighlightScroll() {
            gutter.scrollTop = editor.scrollTop;
            highlightContent.style.transform = `translate(${-editor.scrollLeft}px, ${-editor.scrollTop}px)`;
        }

        function revealOffset(offset, length = 0) {
            const safeOffset = Math.max(0, Math.min(offset, editor.value.length));
            const safeEnd = Math.max(safeOffset, Math.min(safeOffset + length, editor.value.length));
            editor.selectionStart = safeOffset;
            editor.selectionEnd = safeEnd;

            const before = editor.value.slice(0, safeOffset);
            const lineIndex = before.split(/\r\n|\r|\n/).length - 1;
            const style = getComputedStyle(editor);
            const fontSize = parseFloat(style.fontSize) || 14;
            const lineHeight = parseFloat(style.lineHeight) || fontSize * 1.45;
            editor.scrollTop = Math.max(0, lineIndex * lineHeight - editor.clientHeight / 3);
            syncHighlightScroll();
            editor.focus();
            reportCursorAndSelection();
        }

        function updateFindCount() {
            findCount.textContent = findMatches.length > 0 && activeFindIndex >= 0
                ? `${activeFindIndex + 1}/${findMatches.length}`
                : `0/${findMatches.length}`;
        }

        function refreshFindMatches() {
            const query = findInput.value;
            findMatches = [];
            activeFindIndex = -1;

            if (!query) {
                updateFindCount();
                return;
            }

            const source = editor.value;
            const haystack = source.toLocaleLowerCase();
            const needle = query.toLocaleLowerCase();
            let index = haystack.indexOf(needle);

            while (index >= 0) {
                findMatches.push({ start: index, length: query.length });
                index = haystack.indexOf(needle, index + Math.max(1, query.length));
            }

            updateFindCount();
        }

        function selectFindMatch(index) {
            if (findMatches.length === 0) {
                updateFindCount();
                return;
            }

            activeFindIndex = (index + findMatches.length) % findMatches.length;
            const match = findMatches[activeFindIndex];
            revealOffset(match.start, match.length);
            updateFindCount();
        }

        function findNextMatch(direction = 1) {
            const previousQuery = findInput.value;
            refreshFindMatches();

            if (!previousQuery || findMatches.length === 0) {
                return;
            }

            const cursor = direction >= 0 ? editor.selectionEnd : editor.selectionStart;
            let nextIndex;
            if (direction >= 0) {
                nextIndex = findMatches.findIndex(match => match.start >= cursor);
                if (nextIndex < 0) nextIndex = 0;
            } else {
                nextIndex = findMatches.length - 1;
                for (let i = findMatches.length - 1; i >= 0; i--) {
                    if (findMatches[i].start < cursor) {
                        nextIndex = i;
                        break;
                    }
                }
            }

            selectFindMatch(nextIndex);
        }

        function openFindPanel() {
            findPanel.hidden = false;
            const selected = selectedText();
            if (selected && !/[\r\n]/.test(selected)) {
                findInput.value = selected;
            }
            refreshFindMatches();
            findInput.focus();
            findInput.select();
        }

        function closeFindPanel() {
            findPanel.hidden = true;
            editor.focus();
        }

        function reportCursorAndSelection() {
            const pos = editor.selectionStart || 0;
            const before = editor.value.slice(0, pos);
            const lines = before.split(/\r\n|\r|\n/);
            post({ type: 'cursorChanged', line: lines.length, column: lines[lines.length - 1].length + 1 });
            post({ type: 'selectionResult', text: editor.value.substring(editor.selectionStart, editor.selectionEnd) });
        }

        function notifyContentChanged() {
            if (isProgrammaticChange) return;
            updateGutter();
            updateHighlight();
            post({ type: 'contentChanged', content: editor.value });
        }

        function selectedText() {
            return editor.value.substring(editor.selectionStart, editor.selectionEnd);
        }

        function selectionRange() {
            return {
                start: Math.min(editor.selectionStart, editor.selectionEnd),
                end: Math.max(editor.selectionStart, editor.selectionEnd)
            };
        }

        function setTextAndSelection(text, selectionStart, selectionEnd = selectionStart) {
            editor.value = text;
            editor.selectionStart = Math.max(0, Math.min(selectionStart, text.length));
            editor.selectionEnd = Math.max(0, Math.min(selectionEnd, text.length));
            editor.focus();
            notifyContentChanged();
            reportCursorAndSelection();
        }

        function replaceTextRange(start, end, replacement, selectionStart, selectionEnd = selectionStart) {
            const text = editor.value;
            const nextText = text.slice(0, start) + replacement + text.slice(end);
            setTextAndSelection(nextText, selectionStart, selectionEnd);
        }

        function replaceSelection(text, selectStartOffset = null, selectEndOffset = null) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.setRangeText(text, start, end, 'end');

            if (selectStartOffset !== null && selectEndOffset !== null) {
                editor.selectionStart = start + selectStartOffset;
                editor.selectionEnd = start + selectEndOffset;
            }

            editor.focus();
            notifyContentChanged();
            reportCursorAndSelection();
        }

        function hasAt(text, index, marker) {
            return index >= 0 && index + marker.length <= text.length && text.slice(index, index + marker.length) === marker;
        }

        function isStandaloneDelimiter(text, index, delimiter) {
            if (!hasAt(text, index, delimiter)) return false;
            if (delimiter.length === 1) {
                const marker = delimiter[0];
                if (index > 0 && text[index - 1] === marker) return false;
                if (index + 1 < text.length && text[index + 1] === marker) return false;
            }
            return true;
        }

        function areStandaloneWrapperDelimiters(text, openingIndex, closingIndex, opening, closing) {
            if (opening !== closing) return true;
            return isStandaloneDelimiter(text, openingIndex, opening) && isStandaloneDelimiter(text, closingIndex, closing);
        }

        function wrapSelection(opening, closing = opening) {
            const text = editor.value;
            const { start, end } = selectionRange();
            const content = text.slice(start, end);
            const replacement = opening + content + closing;
            const selectionStart = start + opening.length;
            const selectionEnd = end + opening.length;
            replaceTextRange(start, end, replacement, selectionStart, selectionEnd);
        }

        function toggleWrappedSelection(opening, closing = opening) {
            const text = editor.value;
            const { start, end } = selectionRange();
            const openingLength = opening.length;
            const closingLength = closing.length;
            const selected = text.slice(start, end);

            if (
                end - start >= openingLength + closingLength &&
                hasAt(text, start, opening) &&
                hasAt(text, end - closingLength, closing) &&
                areStandaloneWrapperDelimiters(text, start, end - closingLength, opening, closing)
            ) {
                const inner = selected.slice(openingLength, selected.length - closingLength);
                replaceTextRange(start, end, inner, start, start + inner.length);
                return;
            }

            const surroundingStart = start - openingLength;
            const hasSurrounding =
                hasAt(text, surroundingStart, opening) &&
                hasAt(text, end, closing) &&
                (start === end || areStandaloneWrapperDelimiters(text, surroundingStart, end, opening, closing));

            if (hasSurrounding) {
                const nextText = text.slice(0, surroundingStart) + selected + text.slice(end + closingLength);
                setTextAndSelection(nextText, start - openingLength, end - openingLength);
                return;
            }

            wrapSelection(opening, closing);
        }

        function selectedLineRange() {
            const text = editor.value;
            const { start, end } = selectionRange();
            const lineStart = start === 0 ? 0 : text.lastIndexOf('\n', start - 1) + 1;
            const anchor = end > start && text[end - 1] === '\n' ? end - 1 : end;
            const nextBreak = text.indexOf('\n', Math.max(0, anchor));
            const lineEnd = nextBreak < 0 ? text.length : nextBreak;
            return { lineStart, lineEnd, start, end };
        }

        function findHeadingPrefix(line) {
            if (!line.startsWith('#')) return null;
            const markerEnd = line.search(/[^#]/);
            const level = markerEnd < 0 ? line.length : markerEnd;
            if (level < 1 || level > 6) return null;
            if (markerEnd < 0) return { level, length: level };
            return line[markerEnd] === ' ' ? { level, length: level + 1 } : null;
        }

        function cycleHeadingLine(line) {
            const prefix = findHeadingPrefix(line);
            if (!prefix) return `# ${line}`;
            if (prefix.level < 6) return `#${line}`;
            return line.slice(prefix.length);
        }

        function cycleHeadingPrefix() {
            const text = editor.value;
            const { lineStart, lineEnd, start, end } = selectedLineRange();
            const block = text.slice(lineStart, lineEnd);
            const nextBlock = block.split('\n').map(cycleHeadingLine).join('\n');
            const nextText = text.slice(0, lineStart) + nextBlock + text.slice(lineEnd);

            if (start !== end) {
                setTextAndSelection(nextText, lineStart, lineStart + nextBlock.length);
                return;
            }

            const prefix = findHeadingPrefix(block);
            const cursorDelta = !prefix ? 2 : prefix.level < 6 ? 1 : -Math.min(prefix.length, start - lineStart);
            setTextAndSelection(nextText, start + cursorDelta);
        }

        function toggleLinePrefix(prefix) {
            const text = editor.value;
            const { lineStart, lineEnd, start, end } = selectedLineRange();
            const block = text.slice(lineStart, lineEnd);
            const lines = block.split('\n');
            const shouldRemove = lines.length > 0 && lines.every(line => line.startsWith(prefix));
            const nextBlock = lines.map(line => shouldRemove ? line.slice(prefix.length) : prefix + line).join('\n');
            const nextText = text.slice(0, lineStart) + nextBlock + text.slice(lineEnd);

            if (start !== end) {
                setTextAndSelection(nextText, lineStart, lineStart + nextBlock.length);
                return;
            }

            const delta = shouldRemove ? -Math.min(prefix.length, start - lineStart) : prefix.length;
            setTextAndSelection(nextText, start + delta);
        }

        function toggleOrderedList() {
            const text = editor.value;
            const { lineStart, lineEnd, start, end } = selectedLineRange();
            const block = text.slice(lineStart, lineEnd);
            const lines = block.split('\n');
            const markerPattern = /^\d+\.\s/;
            const shouldRemove = lines.length > 0 && lines.every(line => markerPattern.test(line));
            const nextBlock = lines.map((line, index) => shouldRemove ? line.replace(markerPattern, '') : `${index + 1}. ${line}`).join('\n');
            const nextText = text.slice(0, lineStart) + nextBlock + text.slice(lineEnd);

            if (start !== end) {
                setTextAndSelection(nextText, lineStart, lineStart + nextBlock.length);
                return;
            }

            const existingMarker = lines[0].match(markerPattern)?.[0] || '';
            const delta = shouldRemove ? -Math.min(existingMarker.length, start - lineStart) : '1. '.length;
            setTextAndSelection(nextText, start + delta);
        }

        const inlineCodeDelimiter = '`';
        const codeBlockOpening = '```\n';
        const codeBlockClosing = '\n```';

        function findWrappedAroundSelection(opening, closing = opening) {
            const text = editor.value;
            const { start, end } = selectionRange();

            if (end - start >= opening.length + closing.length && hasAt(text, start, opening) && hasAt(text, end - closing.length, closing)) {
                return { openingStart: start, contentStart: start + opening.length, contentEnd: end - closing.length, closingEnd: end };
            }

            const surroundingStart = start - opening.length;
            if (hasAt(text, surroundingStart, opening) && hasAt(text, end, closing)) {
                return { openingStart: surroundingStart, contentStart: start, contentEnd: end, closingEnd: end + closing.length };
            }

            return null;
        }

        function removeWrappedRange(range) {
            const text = editor.value;
            const content = text.slice(range.contentStart, range.contentEnd);
            const selectionStartOffset = Math.max(0, Math.min(editor.selectionStart - range.contentStart, content.length));
            const selectionEndOffset = Math.max(0, Math.min(editor.selectionEnd - range.contentStart, content.length));
            replaceTextRange(range.openingStart, range.closingEnd, content, range.openingStart + selectionStartOffset, range.openingStart + selectionEndOffset);
        }

        function replaceWrappedRange(range, opening, closing) {
            const text = editor.value;
            const content = text.slice(range.contentStart, range.contentEnd);
            const replacement = opening + content + closing;
            const selectionStartOffset = Math.max(0, Math.min(editor.selectionStart - range.contentStart, content.length));
            const selectionEndOffset = Math.max(0, Math.min(editor.selectionEnd - range.contentStart, content.length));
            replaceTextRange(range.openingStart, range.closingEnd, replacement, range.openingStart + opening.length + selectionStartOffset, range.openingStart + opening.length + selectionEndOffset);
        }

        function findContainingWrappedRange(opening, closing = opening) {
            const text = editor.value;
            const { start, end } = selectionRange();
            const openingStart = text.lastIndexOf(opening, start);
            if (openingStart < 0) return null;
            const contentStart = openingStart + opening.length;
            const closingStart = text.indexOf(closing, Math.max(contentStart, end));
            if (closingStart < 0) return null;
            const closingEnd = closingStart + closing.length;
            if (start >= contentStart && end <= closingStart) {
                return { openingStart, contentStart, contentEnd: closingStart, closingEnd };
            }
            return null;
        }

        function cycleCodeFormatting() {
            const codeBlock = findWrappedAroundSelection(codeBlockOpening, codeBlockClosing) || findContainingWrappedRange(codeBlockOpening, codeBlockClosing);
            if (codeBlock) {
                removeWrappedRange(codeBlock);
                return;
            }

            const inline = findWrappedAroundSelection(inlineCodeDelimiter) || findContainingWrappedRange(inlineCodeDelimiter);
            if (inline) {
                replaceWrappedRange(inline, codeBlockOpening, codeBlockClosing);
                return;
            }

            toggleWrappedSelection(inlineCodeDelimiter);
        }

        function buildMarkdownTable(size) {
            const header = '|' + Array(size).fill('  |').join('');
            const separator = '| ' + Array(size).fill('---').join(' | ') + ' |';
            const rows = Array(size - 1).fill(header);
            return [header, separator, ...rows].join('\n');
        }

        function firstMarkdownTableCellCursor(tableStart) {
            return tableStart + 2;
        }

        function findGeneratedMarkdownTable() {
            const text = editor.value;
            const { start, end } = selectionRange();
            for (const size of [3, 2]) {
                const table = buildMarkdownTable(size);
                let tableStart = text.indexOf(table);
                while (tableStart >= 0) {
                    const tableEnd = tableStart + table.length;
                    if (start >= tableStart && start <= tableEnd && end >= tableStart && end <= tableEnd) {
                        return { start: tableStart, end: tableEnd, size };
                    }
                    tableStart = text.indexOf(table, tableStart + table.length);
                }
            }
            return null;
        }

        function removeMarkdownTable(range) {
            const text = editor.value;
            let removeStart = range.start;
            let removeEnd = range.end;
            if (removeStart > 0 && text[removeStart - 1] === '\n' && removeEnd < text.length && text[removeEnd] === '\n') {
                removeEnd += 1;
            } else if (removeStart > 0 && text[removeStart - 1] === '\n' && removeEnd === text.length) {
                removeStart -= 1;
            } else if (removeStart === 0 && removeEnd < text.length && text[removeEnd] === '\n') {
                removeEnd += 1;
            }
            replaceTextRange(removeStart, removeEnd, '', removeStart);
        }

        function cycleMarkdownTable() {
            const existing = findGeneratedMarkdownTable();
            if (existing) {
                if (existing.size === 2) {
                    const table = buildMarkdownTable(3);
                    replaceTextRange(existing.start, existing.end, table, firstMarkdownTableCellCursor(existing.start));
                } else {
                    removeMarkdownTable(existing);
                }
                return;
            }

            const text = editor.value;
            const { start, end } = selectionRange();
            const needsLeadingBreak = start > 0 && text[start - 1] !== '\n';
            const needsTrailingBreak = end < text.length && text[end] !== '\n';
            const table = buildMarkdownTable(2);
            const replacement = `${needsLeadingBreak ? '\n' : ''}${table}${needsTrailingBreak ? '\n' : ''}`;
            const tableStart = start + (needsLeadingBreak ? 1 : 0);
            replaceTextRange(start, end, replacement, firstMarkdownTableCellCursor(tableStart));
        }

        function findMarkdownLinkRange() {
            const text = editor.value;
            const { start, end } = selectionRange();
            const lineStart = start === 0 ? 0 : text.lastIndexOf('\n', start - 1) + 1;
            const lineEnd = text.indexOf('\n', end) < 0 ? text.length : text.indexOf('\n', end);
            let open = text.lastIndexOf('[', Math.min(start, text.length - 1));

            while (open >= lineStart) {
                const textEnd = text.indexOf('](', open + 1);
                const urlEnd = textEnd >= 0 ? text.indexOf(')', textEnd + 2) : -1;
                if (textEnd >= 0 && urlEnd >= 0 && urlEnd <= lineEnd && start >= open && end <= urlEnd + 1) {
                    return { fullStart: open, textStart: open + 1, textEnd, urlStart: textEnd + 2, urlEnd, fullEnd: urlEnd + 1 };
                }
                open = text.lastIndexOf('[', open - 1);
            }
            return null;
        }

        function toggleMarkdownLink() {
            const link = findMarkdownLinkRange();
            const text = editor.value;
            if (link) {
                const linkText = text.slice(link.textStart, link.textEnd);
                replaceTextRange(link.fullStart, link.fullEnd, linkText, link.fullStart, link.fullStart + linkText.length);
                return;
            }

            const { start, end } = selectionRange();
            const selected = text.slice(start, end);
            const linkText = selected || '링크';
            const replacement = `[${linkText}](url)`;
            const urlStart = start + linkText.length + 3;
            replaceTextRange(start, end, replacement, selected ? urlStart : start + 1, selected ? urlStart + 3 : start + 1 + linkText.length);
        }

        function cycleOrInsertArrow() {
            const arrows = ['→', '←', '↑', '↓'];
            const text = editor.value;
            const { start, end } = selectionRange();
            const nextArrow = arrow => arrows[(arrows.indexOf(arrow) + 1) % arrows.length] || '→';

            if (start < end) {
                const selected = text.slice(start, end);
                if (arrows.includes(selected)) {
                    const next = nextArrow(selected);
                    replaceTextRange(start, end, next, start, start + next.length);
                    return;
                }
            }

            if (start > 0 && arrows.includes(text.slice(start - 1, start))) {
                const next = nextArrow(text.slice(start - 1, start));
                replaceTextRange(start - 1, start, next, start);
                return;
            }

            replaceTextRange(start, end, '→', start + 1);
        }

        function applyMarkdownTextColor(colorHex) {
            const colorOpeningPattern = /<span\s+style\s*=\s*["']\s*color\s*:\s*#[0-9a-fA-F]{6}\s*;?\s*["']\s*>/gi;
            const text = editor.value;
            const { start, end } = selectionRange();
            let match;
            let range = null;
            while ((match = colorOpeningPattern.exec(text)) !== null) {
                const contentStart = match.index + match[0].length;
                const closingStart = text.indexOf('</span>', contentStart);
                if (closingStart < 0) continue;
                const closingEnd = closingStart + '</span>'.length;
                if (start >= contentStart && end <= closingStart) {
                    range = { openingStart: match.index, contentStart, contentEnd: closingStart, closingEnd };
                }
            }

            if (range) {
                removeWrappedRange(range);
                return;
            }

            toggleWrappedSelection(`<span style="color: ${colorHex}">`, '</span>');
        }

        function cutCurrentLine() {
            const text = editor.value;
            if (!text) return;
            const cursor = editor.selectionStart;
            const lineStart = cursor === 0 ? 0 : text.lastIndexOf('\n', cursor - 1) + 1;
            const nextBreak = text.indexOf('\n', cursor);
            const lineEnd = nextBreak < 0 ? text.length : nextBreak;
            const clipboardText = text.slice(lineStart, lineEnd);
            let removeStart = lineStart;
            let removeEnd = lineEnd;
            let nextCursor = lineStart;

            if (lineEnd < text.length) {
                removeEnd = lineEnd + 1;
            } else if (lineStart > 0) {
                removeStart = lineStart - 1;
                nextCursor = removeStart;
            }

            if (navigator.clipboard && clipboardText) {
                navigator.clipboard.writeText(clipboardText).catch(() => {});
            }
            replaceTextRange(removeStart, removeEnd, '', nextCursor);
        }

        function applyMarkdownCommand(command, color) {
            const { start, end } = selectionRange();
            switch (command) {
                case 'bold':
                    toggleWrappedSelection('**');
                    break;
                case 'italic':
                    toggleWrappedSelection('*');
                    break;
                case 'underline':
                    toggleWrappedSelection('<u>', '</u>');
                    break;
                case 'highlight':
                    toggleWrappedSelection('==');
                    break;
                case 'inlineCode':
                    cycleCodeFormatting();
                    break;
                case 'codeBlock':
                    toggleWrappedSelection(codeBlockOpening, codeBlockClosing);
                    break;
                case 'heading':
                    cycleHeadingPrefix();
                    break;
                case 'link':
                    toggleMarkdownLink();
                    break;
                case 'quote':
                    toggleLinePrefix('> ');
                    break;
                case 'ul':
                    toggleLinePrefix('- ');
                    break;
                case 'ol':
                    toggleOrderedList();
                    break;
                case 'task':
                    toggleLinePrefix('- [ ] ');
                    break;
                case 'table':
                    cycleMarkdownTable();
                    break;
                case 'math':
                    toggleWrappedSelection('$$\n', '\n$$');
                    break;
                case 'arrow':
                    cycleOrInsertArrow();
                    break;
                case 'fontIncrease':
                    toggleWrappedSelection('<big>', '</big>');
                    break;
                case 'fontDecrease':
                    toggleWrappedSelection('<small>', '</small>');
                    break;
                case 'textColor':
                    applyMarkdownTextColor(color || '#E53935');
                    break;
                case 'cutLine':
                    cutCurrentLine();
                    break;
            }
        }

        function handleCsharpMessage(msg) {
            switch (msg.action) {
                case 'setText':
                    isProgrammaticChange = true;
                    editor.value = msg.text || "";
                    isProgrammaticChange = false;
                    updateGutter();
                    updateHighlight();
                    reportCursorAndSelection();
                    break;
                case 'setLanguage':
                    currentLanguage = msg.language || 'plaintext';
                    updateHighlight();
                    break;
                case 'updateOptions':
                    const theme = msg.theme || 'Dark';
                    const bg = msg.customBackgroundColor || (theme === 'Light' ? '#ffffff' : '#1e1e1e');
                    const preferredFg = msg.customForegroundColor || (theme === 'Light' ? '#111111' : '#d4d4d4');
                    const fg = resolveReadableColor(bg, preferredFg, theme === 'Light' ? '#111111' : '#d4d4d4');
                    document.documentElement.style.setProperty('--bg', bg);
                    document.documentElement.style.setProperty('--fg', fg);
                    document.documentElement.style.setProperty('--gutter-bg', theme === 'Light' ? '#f3f3f3' : '#252526');
                    document.documentElement.style.setProperty('--gutter-fg', theme === 'Light' ? '#6b6b6b' : '#858585');
                    document.documentElement.style.setProperty('--selection', theme === 'Light' ? 'rgba(0, 95, 184, 0.28)' : 'rgba(0, 120, 212, 0.38)');
                    document.documentElement.style.setProperty('--font-size', `${msg.fontSize || 14}px`);
                    document.documentElement.style.setProperty('--font-family', msg.fontFamily || 'Consolas, "Courier New", monospace');
                    document.documentElement.style.setProperty('--wrap', msg.wordWrap ? 'pre-wrap' : 'pre');
                    applySyntaxPalette(theme, bg, fg);
                    editor.style.overflowWrap = msg.wordWrap ? 'break-word' : 'normal';
                    editor.readOnly = !!msg.readOnly;
                    tabSize = msg.tabSize || 4;
                    editor.style.tabSize = tabSize;
                    highlight.style.tabSize = tabSize;
                    updateHighlight();
                    break;
                case 'triggerFind':
                    openFindPanel();
                    break;
                case 'getSelection':
                    post({ type: 'selectionResult', text: selectedText() });
                    break;
                case 'insertText':
                    replaceSelection(msg.text || "");
                    break;
                case 'markdownCommand':
                    applyMarkdownCommand(msg.command, msg.color);
                    break;
                case 'revealLine':
                    const lines = editor.value.split(/\r\n|\r|\n/);
                    let offset = 0;
                    for (let i = 0; i < Math.min((msg.lineNumber || 1) - 1, lines.length); i++) {
                        offset += lines[i].length + 1;
                    }
                    revealOffset(offset);
                    break;
                case 'focus':
                    editor.focus();
                    break;
            }
        }

        editor.addEventListener('input', notifyContentChanged);
        editor.addEventListener('scroll', syncHighlightScroll);
        editor.addEventListener('keyup', reportCursorAndSelection);
        editor.addEventListener('click', reportCursorAndSelection);
        editor.addEventListener('select', reportCursorAndSelection);
        editor.addEventListener('keydown', event => {
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'f') {
                event.preventDefault();
                openFindPanel();
                return;
            }

            if (event.key === 'Escape' && !findPanel.hidden) {
                event.preventDefault();
                closeFindPanel();
                return;
            }

            if (event.key === 'Tab') {
                event.preventDefault();
                replaceSelection(' '.repeat(tabSize));
            }
        });

        findInput.addEventListener('input', () => {
            refreshFindMatches();
        });

        findInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                event.preventDefault();
                findNextMatch(event.shiftKey ? -1 : 1);
            } else if (event.key === 'Escape') {
                event.preventDefault();
                closeFindPanel();
            }
        });

        findPrev.addEventListener('click', () => findNextMatch(-1));
        findNextButton.addEventListener('click', () => findNextMatch(1));
        findClose.addEventListener('click', closeFindPanel);

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                handleCsharpMessage(msg);
            });
        }

        updateGutter();
        post({ type: 'ready', standalone: true });
    </script>
</body>
</html>
