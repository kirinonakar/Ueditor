                const replacement = '```\n' + inlineCode.content + '\n```';
                replaceMarkdownRange(inlineCode.range, replacement, 4, 4 + inlineCode.content.length);
                return;
            }

            toggleWrappedSelection('`');
        }

        const markdownTextColorOpeningRegex = /<span\s+style\s*=\s*["']\s*color\s*:\s*#[0-9a-fA-F]{6}\s*;?\s*["']\s*>/ig;

        function findMarkdownTextColorRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            markdownTextColorOpeningRegex.lastIndex = 0;
            let match;
            while ((match = markdownTextColorOpeningRegex.exec(line)) !== null) {
                const contentStart = match.index + match[0].length;
                const closingStart = line.toLowerCase().indexOf('</span>', contentStart);
                if (closingStart < 0) continue;
                const closingEnd = closingStart + 7;
                if (range.start.column >= match.index && range.end.column <= closingEnd) {
                    const colorMatch = /color\s*:\s*(#[0-9a-fA-F]{6})/i.exec(match[0]);
                    return {
                        fullRange: {
                            start: { line: range.start.line, column: match.index },
                            end: { line: range.end.line, column: closingEnd }
                        },
                        openingRange: {
                            start: { line: range.start.line, column: match.index },
                            end: { line: range.end.line, column: contentStart }
                        },
                        content: line.slice(contentStart, closingStart),
                        contentStart,
                        colorHex: colorMatch ? colorMatch[1].toUpperCase() : ''
                    };
                }
            }
            return null;
        }

        function applyMarkdownTextColor(color) {
            const range = activeMarkdownRange();
            const colorHex = color || '#E53935';
            const colorRange = findMarkdownTextColorRange(range);
            if (colorHex.toLowerCase() === '#111111') {
                if (colorRange) {
                    replaceMarkdownRange(colorRange.fullRange, colorRange.content, 0, colorRange.content.length);
                }
                return;
            }

            if (colorRange) {
                if (colorRange.colorHex.toLowerCase() === colorHex.toLowerCase()) {
                    replaceMarkdownRange(colorRange.fullRange, colorRange.content, 0, colorRange.content.length);
                    return;
                }
                const opening = `<span style="color: ${colorHex}">`;
                replaceMarkdownRange(colorRange.openingRange, opening, opening.length, opening.length);
                return;
            }

            toggleWrappedSelection(`<span style="color: ${colorHex}">`, '</span>');
        }

        function parseMarkdownLinkAt(line, openBracketIndex) {
            if (openBracketIndex < 0 || line[openBracketIndex] !== '[') return null;
            const textEnd = line.indexOf('](', openBracketIndex + 1);
            if (textEnd < 0) return null;
            const urlStart = textEnd + 2;
            const fullEnd = line.indexOf(')', urlStart);
            if (fullEnd < 0) return null;
            return {
                fullStart: openBracketIndex,
                textStart: openBracketIndex + 1,
                textEnd,
                urlStart,
                urlEnd: fullEnd,
                fullEnd: fullEnd + 1
            };
        }

        function findMarkdownLinkRange(range) {
            if (range.start.line !== range.end.line) return null;
            const line = state.cache.get(range.start.line) ?? '';
            for (let index = Math.min(range.start.column, line.length - 1); index >= 0; index--) {
                if (line[index] !== '[') continue;
                const link = parseMarkdownLinkAt(line, index);
                if (link && range.start.column >= link.fullStart && range.end.column <= link.fullEnd) {
                    return {
                        range: {
                            start: { line: range.start.line, column: link.fullStart },
                            end: { line: range.end.line, column: link.fullEnd }
                        },
                        text: line.slice(link.textStart, link.textEnd),
                        urlStartOffset: link.urlStart - link.fullStart,
                        urlEndOffset: link.urlEnd - link.fullStart
                    };
                }
            }
            return null;
        }

        function toggleMarkdownLink() {
            const range = activeMarkdownRange();
            const link = findMarkdownLinkRange(range);
            if (link) {
                replaceMarkdownRange(link.range, link.text, 0, link.text.length);
                return;
            }

            const selected = textInRange(range);
            const linkText = selected || '링크';
            const replacement = `[${linkText}](url)`;
            if (selected) {
                const urlStart = linkText.length + 3;
                replaceMarkdownRange(range, replacement, urlStart, urlStart + 3);
            } else {
                replaceMarkdownRange(range, replacement, 1, 1 + linkText.length);
            }
        }

        function nextMarkdownArrow(current) {
            const arrows = ['→', '←', '↑', '↓'];
            const index = arrows.indexOf(current);
            return index >= 0 ? arrows[(index + 1) % arrows.length] : '→';
        }

        function cycleOrInsertArrow() {
            const range = activeMarkdownRange();
            const selected = textInRange(range);
            if (!rangeIsCollapsed(range) && ['→', '←', '↑', '↓'].includes(selected)) {
                const next = nextMarkdownArrow(selected);
                replaceMarkdownRange(range, next, next.length, next.length);
                return;
            }

            if (range.start.line === range.end.line && range.start.column > 0) {
                const line = state.cache.get(range.start.line) ?? '';
                const previous = line.slice(range.start.column - 1, range.start.column);
                if (['→', '←', '↑', '↓'].includes(previous)) {
                    const next = nextMarkdownArrow(previous);
                    replaceMarkdownRange({
                        start: { line: range.start.line, column: range.start.column - 1 },
                        end: { line: range.start.line, column: range.start.column }
                    }, next, next.length, next.length);
                    return;
                }
            }

            replaceMarkdownRange(range, '→', 1, 1);
        }

        function buildMarkdownTable(size) {
            const header = '|' + Array.from({ length: size }, () => '  |').join('');
            const separator = '| ' + Array.from({ length: size }, () => '---').join(' | ') + ' |';
            const bodyRows = Array.from({ length: size - 1 }, () => header);
            return [header, separator, ...bodyRows].join('\n');
        }

        function findGeneratedMarkdownTable(range) {
            for (const size of [3, 2]) {
                const tableLines = buildMarkdownTable(size).split('\n');
                const firstCandidate = Math.max(1, range.start.line - tableLines.length + 1);
                for (let startLine = firstCandidate; startLine <= range.start.line; startLine++) {
                    let matches = true;
                    for (let i = 0; i < tableLines.length; i++) {
                        if ((state.cache.get(startLine + i) ?? '') !== tableLines[i]) {
                            matches = false;
                            break;
                        }
                    }
                    const endLine = startLine + tableLines.length - 1;
                    if (matches && range.end.line <= endLine) {
                        return { startLine, endLine, size };
                    }
                }
            }
            return null;
        }

        function cycleMarkdownTable() {
            const range = activeMarkdownRange();
            const existing = findGeneratedMarkdownTable(range);
            if (existing) {
                if (existing.size === 2) {
                    const existingRange = {
                        start: { line: existing.startLine, column: 0 },
                        end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                    };
                    const table = buildMarkdownTable(3);
                    replaceMarkdownRange(existingRange, table, 2, 2);
                } else {
                    if (existing.endLine < state.lineCount) {
                        replaceMarkdownRange({
                            start: { line: existing.startLine, column: 0 },
                            end: { line: existing.endLine + 1, column: 0 }
                        }, '', 0, 0);
                    } else if (existing.startLine > 1) {
                        const previousText = state.cache.get(existing.startLine - 1) ?? '';
                        replaceMarkdownRange({
                            start: { line: existing.startLine - 1, column: previousText.length },
                            end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                        }, '', 0, 0);
                    } else {
                        replaceMarkdownRange({
                            start: { line: existing.startLine, column: 0 },
                            end: { line: existing.endLine, column: (state.cache.get(existing.endLine) ?? '').length }
                        }, '', 0, 0);
                    }
                }
                return;
            }

            const endLineText = state.cache.get(range.end.line) ?? '';
            const needsLeadingBreak = range.start.column > 0;
            const needsTrailingBreak = range.end.column < endLineText.length;
            const table = buildMarkdownTable(2);
            const replacement = `${needsLeadingBreak ? '\n' : ''}${table}${needsTrailingBreak ? '\n' : ''}`;
            const firstCellOffset = (needsLeadingBreak ? 1 : 0) + 2;
            replaceMarkdownRange(range, replacement, firstCellOffset, firstCellOffset);
        }

        async function cutCurrentMarkdownLine() {
            const range = activeMarkdownRange();
            const lineNumber = range.start.line;
            const lineText = state.cache.get(lineNumber) ?? '';
            await writeClipboardText(lineText);

            if (state.lineCount <= 1) {
                applyLineText(1, '');
                setSelectionAfterLineEdits({ line: 1, column: 0 }, { line: 1, column: 0 });
                return;
            }

            if (lineNumber < state.lineCount) {
                replaceMarkdownRange({
                    start: { line: lineNumber, column: 0 },
                    end: { line: lineNumber + 1, column: 0 }
                }, '', 0, 0);
            } else {
                const previousText = state.cache.get(lineNumber - 1) ?? '';
                replaceMarkdownRange({
                    start: { line: lineNumber - 1, column: previousText.length },
                    end: { line: lineNumber, column: lineText.length }
                }, '', 0, 0);
            }
        }

        function applyMarkdownCommand(command, color) {
            switch (command) {
                case 'bold': toggleWrappedSelection('**'); break;
                case 'italic': toggleWrappedSelection('*'); break;
                case 'underline': toggleWrappedSelection('<u>', '</u>'); break;
                case 'highlight': toggleWrappedSelection('=='); break;
                case 'inlineCode': toggleWrappedSelection('`'); break;
                case 'math': toggleWrappedSelection('$$', '$$'); break;
                case 'quote': toggleLinePrefix('> '); break;
                case 'ul': toggleLinePrefix('- '); break;
                case 'task': toggleLinePrefix('- [ ] '); break;
                case 'link': toggleMarkdownLink(); break;
                case 'textColor': applyMarkdownTextColor(color); break;
                case 'heading': cycleHeadingPrefix(); break;
                case 'arrow': cycleOrInsertArrow(); break;
                case 'fontIncrease': toggleWrappedSelection('<big>', '</big>'); break;
                case 'fontDecrease': toggleWrappedSelection('<small>', '</small>'); break;
                case 'cutLine': cutCurrentMarkdownLine(); break;
                case 'table': cycleMarkdownTable(); break;
            }
        }

        async function writeClipboardText(text) {
            const value = String(text ?? '');
            if (window.chrome && window.chrome.webview) {
                post({ type: 'clipboardWrite', text: value });
                return true;
            }

            if (navigator.clipboard?.writeText) {
                try {
                    await navigator.clipboard.writeText(value);
                    return true;
                } catch {
                    // Fall back to execCommand below for WebView environments without clipboard permission.
                }
            }

            const textarea = document.createElement('textarea');
            textarea.value = value;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            const ok = document.execCommand('copy');
            textarea.remove();
            if (ok) return true;

            post({ type: 'clipboardWrite', text: value });
            return true;
        }

        async function readClipboardText() {
            if (window.chrome && window.chrome.webview) {
                return await new Promise(resolve => {
                    const requestId = state.requestSeq++;
                    const timer = setTimeout(() => {
                        state.clipboardRequests.delete(requestId);
                        resolve('');
                    }, 1200);
                    state.clipboardRequests.set(requestId, { resolve, timer });
                    post({ type: 'clipboardRead', requestId });
                });
            }

            if (navigator.clipboard?.readText) {
                try {
                    return (await navigator.clipboard.readText()).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                } catch {
                    // Fall back below if clipboard read fails
                }
            }

            return await new Promise(resolve => {
                const requestId = state.requestSeq++;
                const timer = setTimeout(() => {
                    state.clipboardRequests.delete(requestId);
                    resolve('');
                }, 1200);
                state.clipboardRequests.set(requestId, { resolve, timer });
                post({ type: 'clipboardRead', requestId });
            });
        }

        function selectedLineRange() {
            const selection = normalizeSelection();
            if (!selection || !hasCustomSelection()) {
                return { startLine: state.currentLine, endLine: state.currentLine };
            }

            const endLine = selection.end.column === 0 && selection.end.line > selection.start.line
                ? selection.end.line - 1
                : selection.end.line;
            return {
                startLine: Math.max(1, selection.start.line),
                endLine: Math.max(selection.start.line, endLine)
            };
        }

        function lineCommentSyntax() {
            switch (state.language) {
                case 'python':
                case 'r':
                case 'ruby':
                case 'shell':
                case 'powershell':
                case 'yaml':
                case 'toml':
                case 'ini':
                case 'dockerfile':
                case 'makefile':
                    return { prefix: '# ' };
                case 'sql':
                case 'lua':
                    return { prefix: '-- ' };
                case 'latex':
                    return { prefix: '% ' };
                case 'vb':
                    return { prefix: "' " };
                case 'html':
                case 'xml':
                case 'markdown':
                    return { blockStart: '<!-- ', blockEnd: ' -->' };
                case 'css':
                case 'scss':
                case 'less':
                    return { blockStart: '/* ', blockEnd: ' */' };
                default:
                    return { prefix: '// ' };
            }
        }

        function toggleCommentForLine(lineNumber, syntax, shouldUncomment) {
            const original = state.cache.get(lineNumber) ?? '';
            const indent = original.match(/^\s*/)?.[0] || '';
            const body = original.slice(indent.length);
            let next = original;

            if (shouldUncomment && body.trim().length === 0) {
                return;
            }

            if (syntax.prefix) {
                next = shouldUncomment && body.startsWith(syntax.prefix)
                    ? indent + body.slice(syntax.prefix.length)
                    : indent + syntax.prefix + body;
            } else {
                const { blockStart, blockEnd } = syntax;
                const trimmed = body.trim();
                if (shouldUncomment && trimmed.startsWith(blockStart) && trimmed.endsWith(blockEnd)) {
                    const leading = body.slice(0, body.indexOf(trimmed));
                    const inner = trimmed.slice(blockStart.length, trimmed.length - blockEnd.length);
                    next = indent + leading + inner;
                } else {
                    next = indent + blockStart + body + blockEnd;
                }
            }

            state.cache.set(lineNumber, next);
            post({ type: 'lineChanged', lineNumber, text: next });
        }

        function toggleComment() {
            if (state.readOnly) return;
            const { startLine, endLine } = selectedLineRange();
            const syntax = lineCommentSyntax();
            const shouldUncomment = (() => {
                for (let line = startLine; line <= endLine; line++) {
                    const text = state.cache.get(line) ?? '';
                    const body = text.slice((text.match(/^\s*/)?.[0] || '').length);
                    if (syntax.prefix && body.length > 0 && !body.startsWith(syntax.prefix)) return false;
                    if (!syntax.prefix) {
                        const trimmed = body.trim();
                        if (trimmed.length > 0 && !(trimmed.startsWith(syntax.blockStart) && trimmed.endsWith(syntax.blockEnd))) {
                            return false;
                        }
                    }
                }
                return true;
            })();

            for (let line = startLine; line <= endLine; line++) {
                toggleCommentForLine(line, syntax, shouldUncomment);
            }

            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => focusLine(startLine, 0), 0);
        }

        function changeLineIndent(direction) {
            if (state.readOnly) return;

            const { startLine, endLine } = selectedLineRange();
            const indentText = ' '.repeat(Math.max(1, state.tabSize || 4));
            let changed = false;

            for (let line = startLine; line <= endLine; line++) {
                const original = state.cache.get(line);
                if (original === undefined) continue;

                let next = original;
                if (direction > 0) {
                    next = indentText + original;
                } else if (original.startsWith('\t')) {
                    next = original.slice(1);
                } else {
                    const leadingSpaces = original.match(/^ +/)?.[0].length || 0;
                    const removeCount = Math.min(indentText.length, leadingSpaces);
                    if (removeCount > 0) {
                        next = original.slice(removeCount);
                    }
                }

                if (next !== original) {
                    state.cache.set(line, next);
                    post({ type: 'lineChanged', lineNumber: line, text: next });
                    changed = true;
                }
            }

            if (!changed) return;

            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => focusLine(startLine, 0), 0);
        }

        function handleLineSortingAndCleanup(action) {
            if (state.readOnly) return;

            let useWholeDocument = !hasCustomSelection();
            let startLine, endLine;

            if (useWholeDocument) {
                startLine = 1;
                endLine = state.lineCount;
            } else {
                const range = selectedLineRange();
                startLine = range.startLine;
                endLine = range.endLine;
            }

            const lineSelection = {
                start: { line: startLine, column: 0 },
                end: { line: endLine, column: (state.cache.get(endLine) || '').length }
            };

            const lines = [];
            for (let i = startLine; i <= endLine; i++) {
                lines.push(state.cache.get(i) || '');
            }

            let newLines = [...lines];

            switch (action) {
                case 'sortAsc':
                    newLines.sort((a, b) => a.localeCompare(b));
                    break;
                case 'sortDesc':
                    newLines.sort((a, b) => b.localeCompare(a));
                    break;
                case 'removeDuplicates':
                    const seen = new Set();
                    newLines = lines.filter(line => {
                        if (seen.has(line)) return false;
                        seen.add(line);
                        return true;
                    });
                    break;
                case 'removeEmptyLines':
                    newLines = lines.filter(line => line.trim() !== '');
                    break;
                case 'collapseConsecutiveEmptyLines':
                    newLines = [];
                    let prevEmpty = false;
                    for (let i = 0; i < lines.length; i++) {
                        const isEmpty = lines[i].trim() === '';
                        if (isEmpty) {
                            if (!prevEmpty) {
                                newLines.push(lines[i]);
                                prevEmpty = true;
                            }
                        } else {
                            newLines.push(lines[i]);
                            prevEmpty = false;
                        }
                    }
                    break;
                case 'trimSpaces':
                    newLines = lines.map(line => line.trim());
                    break;
            }

            const transformedText = newLines.join('\n');
            replaceSelectionWith(lineSelection, transformedText);
        }

        function handleTextConversion(action) {
            if (state.readOnly) return;

            if (action === 'insertDivider') {
                const divider = '\n---\n';
                if (hasCustomSelection()) {
                    const sel = normalizeSelection();
                    if (sel) replaceSelectionWith(sel, divider);
                } else {
                    insertTextAtCaret(divider);
                }
                return;
            }

            let sel;
            let text;

            if (hasCustomSelection()) {
                sel = normalizeSelection();
                text = selectedText();
            } else {
                sel = {
                    start: { line: 1, column: 0 },
                    end: { line: state.lineCount, column: (state.cache.get(state.lineCount) || '').length }
                };
                const parts = [];
                for (let i = 1; i <= state.lineCount; i++) {
                    parts.push(state.cache.get(i) || '');
                }
                text = parts.join('\n');
            }

            if (!sel || !text) return;

            let transformed = text;

            switch (action) {
                case 'toUpperCase':
                    transformed = text.toUpperCase();
                    break;
                case 'toLowerCase':
                    transformed = text.toLowerCase();
                    break;
                case 'toSentenceCase':
                    transformed = text.replace(/((?:^|[.!?]\s+)\s*)(\S)/g, (match, p1, p2) => p1 + p2.toUpperCase());
                    break;
                case 'toTitleCase':
                    transformed = text.toLowerCase().replace(/\b([a-z])/g, match => match.toUpperCase());
                    break;
                case 'urlEncode':
                    try {
                        transformed = encodeURIComponent(text);
                    } catch (e) {
                        transformed = text;
                    }
                    break;
                case 'urlDecode':
                    try {
                        transformed = decodeURIComponent(text);
                    } catch (e) {
                        transformed = text;
                    }
                    break;
                case 'base64Encode':
                    try {
                        transformed = btoa(encodeURIComponent(text).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                            return String.fromCharCode(parseInt(p1, 16));
                        }));
                    } catch (e) {
                        transformed = text;
                    }
                    break;
                case 'base64Decode':
                    try {
                        transformed = decodeURIComponent(atob(text).split('').map(c => {
                            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                        }).join(''));
                    } catch (e) {
                        transformed = text;
                    }
                    break;
                case 'hexToDec':
                    try {
                        const trimmed = text.trim();
                        const cleaned = trimmed.replace(/^(0x|0X)/, '');
                        transformed = BigInt('0x' + cleaned).toString();
                    } catch (e) {
                        transformed = text;
                    }
                    break;
                case 'decToHex':
                    try {
                        const trimmed = text.trim();
                        if (/^-?\d+$/.test(trimmed)) {
                            const dec = BigInt(trimmed);
                            if (dec < 0n) {
                                transformed = '-' + (-dec).toString(16).toUpperCase();
                            } else {
                                transformed = '0x' + dec.toString(16).toUpperCase();
                            }
                        }
                    } catch (e) {
                        transformed = text;
                    }
                    break;
            }

            replaceSelectionWith(sel, transformed);
        }

        function handleFormatText() {
            if (state.readOnly) return;

            let sel;
            let text;

            if (hasCustomSelection()) {
                sel = normalizeSelection();
                text = selectedText();
            } else {
                sel = {
                    start: { line: 1, column: 0 },
                    end: { line: state.lineCount, column: (state.cache.get(state.lineCount) || '').length }
                };
                const parts = [];
                for (let i = 1; i <= state.lineCount; i++) {
                    parts.push(state.cache.get(i) || '');
                }
                text = parts.join('\n');
            }

            if (!sel || !text) return;

            let transformed = text;
            let lines = text.split('\n');

            // Standard: Trim trailing whitespaces
            lines = lines.map(line => line.trimEnd());

            if (state.language === 'markdown') {
                lines = lines.map(line => {
                    const headerMatch = line.match(/^(#{1,6})([^\s#].*)$/);
                    if (headerMatch) {
                        return headerMatch[1] + ' ' + headerMatch[2].trim();
                    }
                    const listMatch = line.match(/^(\s*)([-*+]|\d+\.)([^\s].*)$/);
                    if (listMatch) {
                        return listMatch[1] + listMatch[2] + ' ' + listMatch[3].trim();
                    }
                    const quoteMatch = line.match(/^(\s*)(>+)([^\s>].*)$/);
                    if (quoteMatch) {
                        return quoteMatch[1] + quoteMatch[2] + ' ' + quoteMatch[3].trim();
                    }
                    return line;
                });
                transformed = lines.join('\n');
            } else if (state.language === 'json') {
                try {
                    transformed = JSON.stringify(JSON.parse(text), null, state.tabSize || 4);
                } catch (e) {
                    transformed = lines.join('\n');
                }
            } else {
                transformed = lines.join('\n');
            }

            replaceSelectionWith(sel, transformed);
        }

        function deleteSelectionOrForward() {
            if (state.readOnly) return;
            if (hasCustomSelection()) {
                const sel = normalizeSelection();
                if (sel) replaceSelectionWith(sel, '');
                return;
            }

            const selection = window.getSelection();
            const element = activeEditableElement();
            if (element && selection?.rangeCount && element.contains(selection.anchorNode)) {
                const selected = selection.toString();
                if (selected) {
                    document.execCommand('delete');
                    commitLine(element);
                    return;
                }
            }

            deleteForwardAtCaret(element);
        }

        async function copySelectionToClipboard() {
            const text = selectedText();
            if (!text) return false;
            return await writeClipboardText(text);
        }

        async function cutSelectionToClipboard() {
            const text = selectedText();
            if (!text) return false;
            const copied = await writeClipboardText(text);
            if (!copied || state.readOnly) return copied;

            if (hasCustomSelection()) {
                const sel = normalizeSelection();
                if (sel) replaceSelectionWith(sel, '');
                return true;
            }

            const element = activeEditableElement();
            const selection = window.getSelection();
            if (element && selection?.rangeCount && element.contains(selection.anchorNode)) {
                document.execCommand('delete');
                commitLine(element);
            }

            return true;
        }

        async function pasteFromClipboard() {
            if (state.readOnly) return;
            const text = await readClipboardText();
            if (text) insertTextAtCaret(text);
        }

        function isPositionInsideSelection(position) {
            const selection = normalizeSelection();
            if (!selection || !position) return false;
            if (position.line < selection.start.line || position.line > selection.end.line) return false;
            if (position.line === selection.start.line && position.column < selection.start.column) return false;
            if (position.line === selection.end.line && position.column > selection.end.column) return false;
            return true;
        }

        function showContextMenu(clientX, clientY) {
            for (const button of contextMenu.querySelectorAll('.context-menu-button')) {
                const requiresEdit = button.dataset.requiresEdit === 'true';
                button.disabled = requiresEdit && state.readOnly;
            }

            const scrollSyncBtn = contextMenu.querySelector('[data-action="toggleScrollSync"]');
            if (scrollSyncBtn) {
                scrollSyncBtn.textContent = (state.scrollSyncEnabled ? '✓ ' : '') + (state.menuScrollSync || '스크롤 동기화');
            }

            contextMenu.hidden = false;
            const menuRect = contextMenu.getBoundingClientRect();
            const left = Math.min(clientX, window.innerWidth - menuRect.width - 4);
            const top = Math.min(clientY, window.innerHeight - menuRect.height - 4);
            contextMenu.style.left = `${Math.max(4, left)}px`;
            contextMenu.style.top = `${Math.max(4, top)}px`;

            // Adjust each submenu position individually to prevent clipping on any edge
            for (const item of contextMenu.querySelectorAll('.context-menu-item.has-submenu')) {
                const submenu = item.querySelector(':scope > .submenu');
                if (!submenu) continue;

                // Temporarily show (hidden) to get real dimensions
                const prevDisplay = submenu.style.display;
                const prevVisibility = submenu.style.visibility;
                submenu.style.visibility = 'hidden';
                submenu.style.display = 'block';
                submenu.style.left = '100%';
                submenu.style.right = 'auto';
                submenu.style.top = '-4px';
                submenu.style.bottom = 'auto';

                const itemRect = item.getBoundingClientRect();
                const sw = submenu.offsetWidth;
                const sh = submenu.offsetHeight;

                submenu.style.display = prevDisplay;
                submenu.style.visibility = prevVisibility;

                // Horizontal: open left if not enough room on right
                const goLeft = (itemRect.right + sw) > window.innerWidth;
                submenu.style.left = goLeft ? 'auto' : '100%';
                submenu.style.right = goLeft ? '100%' : 'auto';

                // Vertical: open upward if not enough room below
                const goUp = (itemRect.top - 4 + sh) > window.innerHeight;
                submenu.style.top = goUp ? 'auto' : '-4px';
                submenu.style.bottom = goUp ? '-4px' : 'auto';
            }
        }

        function hideContextMenu() {
            contextMenu.hidden = true;
        }

        const autocompleteState = {
            isOpen: false,
            candidates: [],
            activeIndex: 0,
            element: null,
            wordStart: 0,
            word: ''
        };

        function getWordUnderCaret(text, caretOffset) {
            let start = caretOffset;
            while (start > 0 && /[\w\-ㄱ-ㅎㅏ-ㅣ가-힣]/.test(text[start - 1])) {
                start--;
            }
            const word = text.slice(start, caretOffset);
            return { word, start };
        }

        // Returns the leading special-character prefix of a snippet keyword
        // e.g. keyword="[HKEY" → prefix="[", keyword="@val" → prefix="@"
        function snippetKeywordSpecialPrefix(keyword) {
            const match = keyword.match(/^([^\wㄱ-ㅎㅏ-ㅣ가-힣]+)/);
            return match ? match[1] : '';
        }

        function getAutocompleteCandidates(currentWord, fullTextBeforeCaret) {
            if (!currentWord || currentWord.length < 1) return [];
            const candidates = [];
            const seen = new Set();
            const lowerCurrent = currentWord.toLowerCase();

            // Detect if the current word has Hangul characters (either syllable or compatibility Jamo)
            const containsHangul = /[\u3130-\u318F\uAC00-\uD7A3]/.test(currentWord);
            let regex = null;
            if (typeof HangulAutocomplete !== 'undefined' && containsHangul) {
                try {
                    const pattern = HangulAutocomplete.makeRegex(currentWord);
                    if (pattern) {
                        regex = new RegExp('^' + pattern, 'i');
                    }
                } catch (e) {
                    console.error("HangulAutocomplete regex compile error:", e);
                }
            }

            for (const snippet of state.snippets) {
                const keyword = String(snippet.keyword || '').trim();
                const title = String(snippet.title || '').trim();
                const content = String(snippet.content || '');
                if (!keyword || !content) continue;

                const lowerKeyword = keyword.toLowerCase();

                // Check if keyword matches current word, but also try matching
                // the special-char prefix + current word against the keyword
                const specialPrefix = snippetKeywordSpecialPrefix(keyword);
                let matched = false;
                let extraPrefixLen = 0;

                if (regex) {
                    if (regex.test(keyword)) {
                        matched = true;
                    } else if (regex.test(title)) {
                        matched = true;
                    } else if (specialPrefix && fullTextBeforeCaret !== undefined) {
                        try {
                            const prefixPattern = HangulAutocomplete.escapeRegExp(specialPrefix) + HangulAutocomplete.makeRegex(currentWord);
                            const prefixRegex = new RegExp('^' + prefixPattern, 'i');
                            if (prefixRegex.test(keyword)) {
                                const textBefore = fullTextBeforeCaret;
                                if (textBefore.endsWith(specialPrefix + currentWord) || textBefore.slice(-specialPrefix.length) === specialPrefix) {
                                    matched = true;
                                    extraPrefixLen = specialPrefix.length;
                                }
                            }
                        } catch (e) {
                            console.error(e);
                        }
                    }
                } else {
                    const lowerTitle = title.toLowerCase();
                    if (lowerKeyword.startsWith(lowerCurrent)) {
                        matched = true;
                    } else if (lowerTitle.startsWith(lowerCurrent)) {
                        matched = true;
                    } else if (specialPrefix && fullTextBeforeCaret !== undefined) {
                        const withPrefix = specialPrefix + currentWord;
                        const lowerWithPrefix = withPrefix.toLowerCase();
                        if (lowerKeyword.startsWith(lowerWithPrefix)) {
                            const textBefore = fullTextBeforeCaret;
                            if (textBefore.endsWith(specialPrefix + currentWord) || textBefore.slice(-specialPrefix.length) === specialPrefix) {
                                matched = true;
                                extraPrefixLen = specialPrefix.length;
                            }
                        }
                    }
                }

                if (!matched) continue;

                const key = `snippet:${lowerKeyword}`;
                if (seen.has(key)) continue;
                seen.add(key);
                const prefixText = state.autocompleteSnippetPrefix || '스니펫: ';
                const defaultText = state.autocompleteSnippet || '스니펫';
                candidates.push({
                    kind: 'snippet',
                    label: keyword,
                    insertText: content,
                    detail: title ? `${prefixText}${title}` : defaultText,
                    extraPrefixLen
                });
            }

            for (const text of state.cache.values()) {
                if (!text) continue;
                const words = text.match(/[\w\-ㄱ-ㅎㅏ-ㅣ가-힣]+/g);
                if (!words) continue;
                for (const word of words) {
                    if (word.length <= currentWord.length) continue;
                    if (word === currentWord) continue;

                    let isWordMatched = false;
                    if (regex) {
                        isWordMatched = regex.test(word);
                    } else {
                        isWordMatched = word.toLowerCase().startsWith(lowerCurrent);
                    }

                    if (isWordMatched) {
                        const key = `word:${word.toLowerCase()}`;
                        if (seen.has(key)) continue;
                        seen.add(key);
                        candidates.push({
                            kind: 'word',
                            label: word,
                            insertText: word,
                            detail: ''
                        });
                    }
                }
            }

            return candidates
                .sort((a, b) => {
                    if (a.kind !== b.kind) return a.kind === 'snippet' ? -1 : 1;
                    if (a.label.toLowerCase() === lowerCurrent) return -1;
                    if (b.label.toLowerCase() === lowerCurrent) return 1;
                    return a.label.localeCompare(b.label);
                })
                .slice(0, 10);
        }

        function getCaretCoordinates() {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0).cloneRange();
            range.collapse(false);
            const rects = range.getClientRects();
            if (rects.length > 0) {
                return rects[0];
            }
            return null;
        }

        function triggerAutocomplete(element) {
            if (!state.autocompleteOnEnter && !state.autocompleteOnTab) return;
            if (hasCustomSelection()) {
                hideAutocomplete();
                return;
            }
            const text = lineTextFromElement(element);
            const caret = getCaretOffset(element);
            const { word, start } = getWordUnderCaret(text, caret);

            if (!word || word.length < 1) {
                hideAutocomplete();
                return;
            }

            const textBeforeCaret = text.slice(0, caret);
            const candidates = getAutocompleteCandidates(word, textBeforeCaret);
            if (candidates.length === 0) {
                hideAutocomplete();
                return;
            }

            const preserveActiveIndex = autocompleteState.isOpen && autocompleteState.word === word;

            autocompleteState.isOpen = true;
            autocompleteState.candidates = candidates;
            autocompleteState.activeIndex = preserveActiveIndex ? Math.min(autocompleteState.activeIndex, candidates.length - 1) : 0;
            autocompleteState.element = element;
            autocompleteState.wordStart = start;
            autocompleteState.word = word;
            autocompleteState.textBeforeCaret = textBeforeCaret;

            renderAutocomplete();
        }

        function renderAutocomplete() {
            const popup = document.getElementById('autocomplete-popup');
            if (!popup) return;
            const caretRect = getCaretCoordinates();
            if (!caretRect) {
                hideAutocomplete();
                return;
            }

            const itemsHtml = autocompleteState.candidates.map((candidate, idx) => {
                const isActive = idx === autocompleteState.activeIndex ? ' active' : '';
                const detail = candidate.detail
                    ? `<span class="autocomplete-detail">${escapeHtml(candidate.detail)}</span>`
                    : '';
                return `<button class="autocomplete-item${isActive}" type="button" data-index="${idx}"><span class="autocomplete-label">${escapeHtml(candidate.label)}</span>${detail}</button>`;
            }).join('');

            popup.innerHTML = itemsHtml;
            popup.hidden = false;

            const popupRect = popup.getBoundingClientRect();
            let left = caretRect.left;
            let top = caretRect.bottom + 4;

            if (left + popupRect.width > window.innerWidth) {
                left = window.innerWidth - popupRect.width - 10;
            }
            if (top + popupRect.height > window.innerHeight) {
                top = caretRect.top - popupRect.height - 4;
            }

            popup.style.left = `${Math.max(10, left)}px`;
            popup.style.top = `${Math.max(10, top)}px`;
        }

        function hideAutocomplete() {
            autocompleteState.isOpen = false;
            autocompleteState.candidates = [];
            autocompleteState.activeIndex = 0;
            autocompleteState.element = null;
            const popup = document.getElementById('autocomplete-popup');
            if (popup) popup.hidden = true;
        }

        function insertSelectedCandidate() {
            const candidate = autocompleteState.candidates[autocompleteState.activeIndex];
            const element = autocompleteState.element;
            if (!candidate || !element) {
                hideAutocomplete();
                return;
            }

            const text = lineTextFromElement(element);
            let wordStart = autocompleteState.wordStart;
            const caret = getCaretOffset(element);

            // If the snippet keyword has a leading special-char prefix and it exists
            // in the text just before wordStart, extend wordStart to include it
            if (candidate.kind === 'snippet') {
                const specialPrefix = snippetKeywordSpecialPrefix(candidate.label || '');
                if (specialPrefix && wordStart >= specialPrefix.length) {
                    const textBefore = text.slice(wordStart - specialPrefix.length, wordStart);
                    if (textBefore === specialPrefix) {
                        wordStart -= specialPrefix.length;
                    }
                }
            }

            replaceWordWithAutocompleteText(element, wordStart, caret, candidate.insertText || candidate.label || '');
            hideAutocomplete();
        }

        function replaceWordWithAutocompleteText(element, wordStart, caret, insertText) {
            const text = lineTextFromElement(element);
            const normalized = String(insertText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            if (!normalized.includes('\n')) {
                const nextText = text.slice(0, wordStart) + normalized + text.slice(caret);
                updateSingleLine(element, nextText, wordStart + normalized.length);
                return;
            }

            const lineNumber = Number(element.dataset.line || 1);
            const before = text.slice(0, wordStart);
            const after = text.slice(caret);
            const parts = normalized.split('\n');
            const insertedCount = parts.length - 1;
            const firstLine = before + parts[0];
            const lastLineNumber = lineNumber + insertedCount;

            state.cache.set(lineNumber, firstLine);
            shiftCachedLines(lineNumber + 1, insertedCount);
            post({ type: 'lineChanged', lineNumber, text: firstLine });

            for (let i = 1; i < parts.length; i++) {
                const nextText = i === parts.length - 1 ? parts[i] + after : parts[i];
                const nextLineNumber = lineNumber + i;
                state.cache.set(nextLineNumber, nextText);
                post({ type: 'insertLine', lineNumber: nextLineNumber, text: nextText });
            }

            state.lineCount += insertedCount;
            setupVirtualHeight();
            post({ type: 'contentChanged' });
            queueRender(true);
            setTimeout(() => focusLine(lastLineNumber, parts[parts.length - 1]?.length || 0), 0);
        }

        function openFindPanel() {
            findPanel.hidden = false;
            const replaceRow = document.getElementById('replace-row');
            if (replaceRow) {
                replaceRow.style.display = state.readOnly ? 'none' : 'flex';
            }
            const replaceActionsRow = document.getElementById('replace-actions-row');
            if (replaceActionsRow) {
                replaceActionsRow.style.display = state.readOnly ? 'none' : 'flex';
            }
            const selected = selectedText();
            if (selected && !/[\r\n]/.test(selected)) {
                findInput.value = selected;
            }
            findInput.focus();
            findInput.select();
            requestFindAll();
        }

        function executeReplace() {
            if (state.readOnly || !state.activeSearch) return;

            const replaceText = replaceInput.value || '';
            const { lineNumber, indexOfMatch, matchLength, query } = state.activeSearch;
            const originalText = state.cache.get(lineNumber);
            if (originalText === undefined) return;

            if (indexOfMatch + matchLength > originalText.length) return;

            let nextText = originalText;
            if (state.findRegex) {
                try {
                    const regex = new RegExp(query, state.findMatchCase ? 'g' : 'gi');
                    let replaced = false;
                    nextText = originalText.replace(regex, (m, ...args) => {
                        const offset = args[args.length - 2];
                        if (offset === indexOfMatch && !replaced) {
                            replaced = true;
                            const cleanQuery = query.replace(/^\^/, '').replace(/\$$/, '');
                            const cleanRegex = new RegExp(cleanQuery, state.findMatchCase ? '' : 'i');
                            return m.replace(cleanRegex, replaceText);
                        }
                        return m;
                    });
                } catch (e) {
                    nextText = originalText.slice(0, indexOfMatch) + replaceText + originalText.slice(indexOfMatch + matchLength);
                }
            } else {
                nextText = originalText.slice(0, indexOfMatch) + replaceText + originalText.slice(indexOfMatch + matchLength);
            }

            state.cache.set(lineNumber, nextText);
            post({ type: 'lineChanged', lineNumber: lineNumber, text: nextText });
            post({ type: 'contentChanged' });

            const currentQuery = findInput.value;
            if (currentQuery) {
                post({ type: 'findAll', query: currentQuery, matchCase: state.findMatchCase, isRegex: state.findRegex });
            } else {
                queueRender(true);
            }
        }

        function executeReplaceAll() {
            if (state.readOnly || state.searchMatches.length === 0) return;

            const query = findInput.value;
            if (!query) return;

            const replaceText = replaceInput.value || '';
            post({
                type: 'replaceAll',
                query: query,
                replace: replaceText,
                matchCase: state.findMatchCase,
                isRegex: state.findRegex
            });
        }

        function closeFindPanel() {
            findPanel.hidden = true;
            state.searchQuery = '';
            state.searchMatches = [];
            state.searchIndex = -1;
            state.activeSearch = null;
            queueRender(true);
            focusLine(state.currentLine, Math.max(0, state.currentColumn - 1));
        }

        function requestFindAll() {
            const query = findInput.value;
            if (!query) {
                state.searchQuery = '';
                state.searchMatches = [];
                state.searchIndex = -1;
                state.activeSearch = null;
                queueRender(true);
                return;
            }
            state.searchQuery = query;
            post({ type: 'findAll', query, matchCase: state.findMatchCase, isRegex: state.findRegex });
        }

        function requestFind(reverse = false) {
            const query = findInput.value;
            if (!query || state.searchMatches.length === 0) return;

            if (state.searchIndex < 0) state.searchIndex = 0;

            if (reverse) {
                state.searchIndex = (state.searchIndex - 1 + state.searchMatches.length) % state.searchMatches.length;
            } else {
                state.searchIndex = (state.searchIndex + 1) % state.searchMatches.length;
            }

            const match = state.searchMatches[state.searchIndex];
            state.activeSearch = {
                lineNumber: match.lineNumber,
                indexOfMatch: match.indexOfMatch,
                matchLength: match.matchLength,
                query
            };
            revealLine(match.lineNumber, match.indexOfMatch, match.matchLength, query, true);
        }

        function renderSearchMatchesForLine(lineNumber, text, matches, activeMatch) {
            if (matches.length === 0) {
                return highlightLine(text, state.language, lineNumber, 0);
            }

            matches = [...matches].sort((a, b) => a.indexOfMatch - b.indexOfMatch);

            const parts = [];
            let pos = 0;

            for (const match of matches) {
                const idx = match.indexOfMatch;
                const len = match.matchLength;

                if (idx < pos || idx >= text.length) continue;

                if (idx > pos) {
                    parts.push(highlightLine(text.slice(pos, idx), state.language, lineNumber, pos));
                }

                const isActive = activeMatch && 
                    idx === activeMatch.indexOfMatch && 
                    lineNumber === activeMatch.lineNumber;

                const matchText = text.slice(idx, idx + len);
                const cls = isActive ? 'search-match active-match' : 'search-match';
                parts.push(`<mark class="${cls}">${escapeHtml(matchText)}</mark>`);
                pos = idx + len;
            }

            if (pos < text.length) {
                parts.push(highlightLine(text.slice(pos), state.language, lineNumber, pos));
            }

            return parts.join('');
        }

        function handleCsharpMessage(msg) {
            switch (msg.action) {
                case 'initModel':
                    state.initialized = true;
                    state.language = msg.language || 'plaintext';
                    applyOptions(msg);
                    setupModel(msg.lineCount || 1);
                    if (receiveLineBlock(msg.initialStartLine || 1, msg.initialLines || []) > 0) {
                        queueRender(true);
                    }
                    document.getElementById('loading-overlay')?.classList.add('hidden');
                    break;
                case 'setText':
                    {
                        if (state.isComposing) {
                            break;
                        }
                        const text = msg.text || '';
                        const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                        state.selection = null;
                syncCustomSelectionClass();
                        const targetLine = Math.min(state.currentLine, lines.length);
                        const targetCol = Math.min(Math.max(0, state.currentColumn - 1), (lines[targetLine - 1] || '').length);
                        setupModel(Math.max(1, lines.length));
                        lines.forEach((line, index) => state.cache.set(index + 1, line));
                        queueRender(true);
                        if (msg.shouldFocus !== false) {
                            setTimeout(() => focusLine(targetLine, targetCol), 20);
                        }
                    }
                    break;
                case 'updateLine':
                    {
                        updateLineFromHost(msg.lineNumber || 1, msg.text || '', !!msg.isComposing);
                    }
                    break;
                case 'receiveLines':
                    {
                        receiveLineBlock(msg.startLine || 1, msg.lines || []);
                        runPendingLineActions();
                        if (!state.isComposing) {
                            queueRender(true);
                        }
                    }
                    break;
                case 'lineCountChanged':
                    state.lineCount = Math.max(1, Number(msg.lineCount || 1));
                    state.cacheVersion++;
                    setupVirtualHeight();
                    queueRender(true);
                    break;
                case 'setLanguage':
                    state.language = msg.language || 'plaintext';
                    queueRender(true);
                    break;
                case 'updateOptions':
                    applyOptions(msg);
                    break;
                case 'updateSnippets':
                    state.snippets = Array.isArray(msg.snippets) ? msg.snippets : [];
                    if (autocompleteState.isOpen) {
                        const element = autocompleteState.element;
                        if (element) triggerAutocomplete(element);
                    }
                    break;
                case 'triggerFind':
                    openFindPanel();
                    break;
                case 'getSelection':
                    post({ type: 'selectionResult', text: selectedText() });
                    break;
                case 'flushForSave':
                    flushPendingEditForSave(msg.requestId || 0);
                    break;
                case 'insertText':
                    insertTextAtCaret(msg.text || '');
                    break;
                case 'markdownCommand':
                    applyMarkdownCommand(msg.command, msg.color);
                    break;
                case 'revealLine':
                    revealLine(msg.lineNumber || 1, msg.indexOfMatch || 0, msg.matchLength || 0, msg.query || '');
                    break;
                case 'findAllResult':
                    state.searchQuery = msg.query || '';
                    state.searchMatches = msg.matches || [];
                    state.searchIndex = state.searchMatches.length > 0 ? 0 : -1;
                    state.activeSearch = null;
                    if (state.searchIndex >= 0) {
                        const match = state.searchMatches[0];
                        state.activeSearch = {
                            lineNumber: match.lineNumber,
                            indexOfMatch: match.indexOfMatch,
                            matchLength: match.matchLength,
                            query: state.searchQuery
                        };
                        revealLine(match.lineNumber, match.indexOfMatch, match.matchLength, state.searchQuery, true);
                    }
                    queueRender(true);
                    break;
                case 'findResult':
                    if (msg.found) {
                        revealLine(msg.lineNumber, msg.indexOfMatch || 0, msg.matchLength || 0, msg.query || findInput.value, true);
                    }
                    break;
                case 'focus':
                    focusLine(state.currentLine, Math.max(0, state.currentColumn - 1));
                    break;
                case 'clipboardReadResult':
                    {
                        const requestId = Number(msg.requestId || 0);
                        const pending = state.clipboardRequests.get(requestId);
                        if (pending) {
                            clearTimeout(pending.timer);
                            state.clipboardRequests.delete(requestId);
                            pending.resolve(String(msg.text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n'));
                        }
                    }
                    break;
                case 'scrollSyncChanged':
                    state.scrollSyncEnabled = !!msg.enabled;
                    break;
                case 'syncScroll':
                    if (state.scrollSyncEnabled && msg.firstLine) {
                        isSyncingScroll = true;
                        const targetScrollTop = lineTop(msg.firstLine) + (msg.offset || 0);
                        scrollContainer.scrollTop = targetScrollTop;
                        requestAnimationFrame(() => {
                            isSyncingScroll = false;
                        });
                    }
                    break;
            }
        }

        function revealLine(lineNumber, indexOfMatch = 0, matchLength = 0, query = '', preventFocus = false) {
            const safeLine = Math.min(Math.max(1, Number(lineNumber || 1)), state.lineCount);
            state.currentLine = safeLine;
            state.currentColumn = Math.max(1, Number(indexOfMatch || 0) + 1);
            state.activeSearch = query
                ? { lineNumber: safeLine, indexOfMatch, matchLength, query }
                : null;
            scrollContainer.scrollTop = Math.max(0, lineTop(safeLine) - state.lineHeight * state.overscan);
            requestLines(Math.max(1, safeLine - state.overscan), state.overscan * 2 + 1);
            queueRender(true);
            if (!preventFocus) {
                setTimeout(() => focusLine(safeLine, Math.max(0, indexOfMatch || 0)), 40);
            }
        }

        function printDocument(fullText) {
            var printContainer = document.getElementById('print-container');
            if (!printContainer) {
                printContainer = document.createElement('div');
                printContainer.id = 'print-container';
                document.body.appendChild(printContainer);
            }
            printContainer.textContent = fullText;

            var editorHost = document.getElementById('editor-host');
            var currentBg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#fff';
            var currentFg = getComputedStyle(document.documentElement).getPropertyValue('--fg').trim() || '#000';
            
            printContainer.style.cssText = 'display:block; font-family: ' + getComputedStyle(document.documentElement).getPropertyValue('--font-family').trim() + '; font-size: ' + getComputedStyle(document.documentElement).getPropertyValue('--font-size').trim() + '; white-space: pre; padding: 20px; color: ' + currentFg + '; background: ' + currentBg + '; margin: 0; position: absolute; inset: 0; z-index: 1000; overflow: auto;';
            editorHost.style.display = 'none';

            var baseFontSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-size').trim()) || 13;
            var currentZoom = 1.0;
            printContainer.style.fontSize = baseFontSize + 'px';
            
            printContainer.onwheel = function (e) {
                if (e.ctrlKey) {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        currentZoom = Math.min(3.0, currentZoom + 0.1);
                    } else {
                        currentZoom = Math.max(0.5, currentZoom - 0.1);
                    }
                    printContainer.style.fontSize = (baseFontSize * currentZoom) + 'px';
                }
            };

            window.onafterprint = function () {
                editorHost.style.display = '';
                printContainer.style.cssText = 'display:none;';
                printContainer.onwheel = null;
                window.onafterprint = null;
                queueRender(true);
            };

            setTimeout(function () {
                window.print();
            }, 100);
        }

        viewport.addEventListener('input', event => {
            if (shouldSuppressNativeBeforeInput(event)) {
                return;
            }
            const element = lineElementFromEvent(event);
            if (element) {
                if (!state.isComposing && isPendingImeSelectionCollapseFor(element, event)) {
                    return;
                }
                if (!state.columnComposition) {
                    state.selection = null;
                    syncCustomSelectionClass();
                }
                commitLine(element);
                triggerAutocomplete(element);
            }
        });

        viewport.addEventListener('focusin', event => {
            const element = lineElementFromEvent(event);
            if (element && element.getAttribute('contenteditable') === 'true') {
                state.editingLine = Number(element.dataset.line || state.currentLine || 1);
                queueRender();
            }
        });

        viewport.addEventListener('focusout', () => {
            setTimeout(() => {
                if (!document.activeElement?.closest?.('.line-text')) {
                    state.editingLine = null;
                    queueRender(true);
                }
            }, 0);
        });

        viewport.addEventListener('compositionstart', event => {
            let element = lineElementFromEvent(event) || activeEditableElement();
            const pendingCompositionSelection = compositionSelectionRange();
            let collapsedSelectionForComposition = false;

            if (pendingCompositionSelection && !pendingCompositionSelection.isColumn) {
                element = replaceSelectionForCompositionStart(element) || element;
                collapsedSelectionForComposition = true;
            }

            if (isPendingImeSelectionCollapseFor(element)) {
                clearPendingImeSelectionCollapse();
            }

            state.isComposing = true;
            state.compositionLine = element ? Number(element.dataset.line || state.currentLine || 1) : state.currentLine;

            if (element && element.getAttribute('contenteditable') === 'true') {
                state.editingLine = state.compositionLine;

                if (collapsedSelectionForComposition) {
                    // 선택 삭제 직후에는 아무 한글 보정도 하지 않고, caret만 정리된 상태에서
                    // 브라우저/native IME가 평소 입력처럼 조합을 이어가게 둔다.
                    state.columnComposition = null;
                    return;
                }

                // 조합 시작 시점에는 setCaret(element.focus())을 호출하지 않는다.
                // 단, syntax highlight span이 있는 경우 makeEditablePlainText가 DOM을
                // 평탄화하면서 커서가 줄 처음으로 리셋될 수 있으므로 커서를 직접 복원한다.
                const savedCaret = getCaretOffset(element);
                makeEditablePlainText(element, null, false);
                if (savedCaret > 0) {
                    const text = element.textContent || '';
                    const col = Math.max(0, Math.min(savedCaret, text.length));
                    const textNode = element.firstChild;
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        const range = document.createRange();
                        range.setStart(textNode, col);
                        range.collapse(true);
                        const sel = window.getSelection();
                        if (sel) {
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                }
                beginColumnComposition(element);
            } else {
                state.columnComposition = null;
            }
        });

        viewport.addEventListener('compositionupdate', event => {
            // 한글 조합 문자열을 수동으로 보정하지 않는다.
            // native IME 표시를 그대로 두어 평소 입력과 같은 경로를 사용한다.
            state.isComposing = true;
        });

        viewport.addEventListener('compositionend', event => {
            const element = lineElementFromEvent(event) || activeEditableElement();
            const lineNumber = element ? Number(element.dataset.line || state.compositionLine || state.currentLine) : state.compositionLine;

            state.isComposing = false;
            clearPendingImeSelectionCollapse();
            state.compositionLine = null;

            if (finishColumnComposition(element, lineNumber)) {
                return;
            }

            if (element && element.getAttribute('contenteditable') === 'true') {
                state.selection = null;
                syncCustomSelectionClass();
                state.editingLine = lineNumber;
                // Chromium/WebView2는 compositionend 직후에 최종 input을 한 번 더 보낼 수 있다.
                // DOM을 수동 보정하지 말고 다음 task에서 native 결과만 모델에 커밋한다.
                setTimeout(() => {
                    const current = viewport.querySelector(`.line-text[data-line="${lineNumber}"]`) || element;
                    if (current && current.getAttribute('contenteditable') === 'true') {
                        commitLine(current);
                        triggerAutocomplete(current);
                    }
                }, 0);
            }
        });

        let lastPointerDownTime = 0;
        let lastPointerDownPosition = null;

        scrollContainer.addEventListener('pointerdown', event => {
            if (event.button !== 0 || findPanel.contains(event.target)) return;

            // Check if clicked on a line number to select the entire line
            const lineNumEl = event.target.closest('.line-number');
            if (lineNumEl) {
                const row = lineNumEl.closest('.line-row');
                if (row) {
                    const line = Number(row.dataset.line || 1);
                    const text = state.cache.get(line) || '';
                    const lineLength = text.length;

                    event.preventDefault();
                    scrollContainer.setPointerCapture?.(event.pointerId);

                    state.selectionAnchor = { line: line, column: 0 };
                    state.selection = { start: { line: line, column: 0 }, end: { line: line, column: lineLength || 1 } };
                    syncCustomSelectionClass();
                    state.isSelecting = true;
                    state.isLineSelecting = true;
                    document.body.classList.add('selecting');
                    state.currentLine = line;
                    state.currentColumn = lineLength + 1;

                    queueRender(true);
                    setTimeout(() => {
                        const element = viewport.querySelector(`.line-text[data-line="${line}"]`);
                        if (element && element.getAttribute('contenteditable') === 'true') {
                            setCaret(element, lineLength);
                        }
                    }, 0);
                    reportCursorAndSelection(row.querySelector('.line-text'));
                    return;
                }
            }

            const position = positionFromPointer(event);
            if (!position) return;

            // Handle double-click word selection
            const now = Date.now();
            const isDoubleClick = (event.detail >= 2) ||
                ((now - lastPointerDownTime < 350) &&
                    lastPointerDownPosition &&
                    (lastPointerDownPosition.line === position.line) &&
                    (Math.abs(lastPointerDownPosition.column - position.column) < 5));

            lastPointerDownTime = now;
            lastPointerDownPosition = position;

            if (isDoubleClick && !event.shiftKey) {
                if (selectWordAtPointer(event)) {
                    event.preventDefault();
                    return;
                }
            }

            const isEditable = position.element.getAttribute('contenteditable') === 'true';
            event.preventDefault();
            scrollContainer.setPointerCapture?.(event.pointerId);

            const hadSelection = hasCustomSelection();
            const positionText = state.cache.get(position.line) ?? lineTextFromElement(position.element);
            state.dragStartPosition = {
                line: position.line,
                column: position.column,
                isEmptyLine: positionText.length === 0,
                clientX: event.clientX,
                clientY: event.clientY
            };
            const isColumnSelect = event.altKey;
            const anchor = event.shiftKey && state.selectionAnchor
                ? state.selectionAnchor
                : { line: position.line, column: position.column };
            state.selectionAnchor = anchor;
            state.selection = event.shiftKey
                ? { start: anchor, end: { line: position.line, column: position.column }, isColumn: isColumnSelect }
                : null;
            syncCustomSelectionClass();
            state.isSelecting = true;
            state.isLineSelecting = false;
            document.body.classList.add('selecting');
            state.currentLine = position.line;
            state.currentColumn = position.column + 1;
            if (isEditable) {
                setCaret(position.element, position.column);
            }
            if (event.shiftKey || hadSelection) {
                queueRender(true);
                setTimeout(() => focusLine(state.currentLine, Math.max(0, state.currentColumn - 1)), 0);
            }
            reportCursorAndSelection(position.element);
        });

        function endSelection(event) {
            if (!state.isSelecting) return;
            state.isSelecting = false;

            clearTimeout(nativeSelectionReportTimer);
            nativeSelectionReportTimer = setTimeout(() => {
                reportCursorAndSelection(document.activeElement);
            }, 30);
        });

        let isSyncingScroll = false;
        scrollContainer.addEventListener('scroll', () => {
            hideContextMenu();
            queueRender();
            if (state.scrollSyncEnabled && !isSyncingScroll) {
                const firstVisible = lineAt(scrollContainer.scrollTop);
                const offset = scrollContainer.scrollTop - lineTop(firstVisible);
                post({
                    type: 'editorScroll',
                    firstLine: firstVisible,
                    offset: offset
                });
            }
        });
        window.addEventListener('resize', () => queueRender(true));
        window.addEventListener('dragover', event => event.preventDefault(), false);
        window.addEventListener('drop', event => event.preventDefault(), false);

        let findDebounceTimer;
        findInput.addEventListener('input', () => {
            clearTimeout(findDebounceTimer);
            findDebounceTimer = setTimeout(() => requestFindAll(), 200);
        });
        findInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                event.preventDefault();
                requestFind(event.shiftKey);
            } else if (event.key === 'Escape') {
                event.preventDefault();
                closeFindPanel();
            }
        });
        findPrev.addEventListener('click', () => requestFind(true));
        findNextButton.addEventListener('click', () => requestFind(false));
        findClose.addEventListener('click', closeFindPanel);

        const findMatchCase = document.getElementById('find-match-case');
        const findRegex = document.getElementById('find-regex');

        findMatchCase.addEventListener('click', () => {
            state.findMatchCase = !state.findMatchCase;
            findMatchCase.classList.toggle('active', state.findMatchCase);
            requestFindAll();
        });

        findRegex.addEventListener('click', () => {
            state.findRegex = !state.findRegex;
            findRegex.classList.toggle('active', state.findRegex);
            requestFindAll();
        });

        replaceBtn.addEventListener('click', () => executeReplace());
        replaceAllBtn.addEventListener('click', () => executeReplaceAll());
        replaceInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                event.preventDefault();
                executeReplace();
            } else if (event.key === 'Escape') {
                event.preventDefault();
                closeFindPanel();
            }
        });

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                handleCsharpMessage(msg);
            });
        }

        setupVirtualHeight();
        post({ type: 'ready', virtualized: true });
    </script>
</body>

</html>
