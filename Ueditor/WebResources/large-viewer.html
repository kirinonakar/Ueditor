<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ueditor Large File Viewer</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #858585;
            --code-color: #d4d4d4;
            --edit-bg-color: #2d2d2d;
            --edit-fg-color: #ffffff;
            --font-family: Consolas, "Courier New", monospace;
            --font-size: 14px;
            --line-height: 22px;
            --line-num-width: 65px;
            --selected-bg: #2d2d2d;
        }

        body.light-theme {
            --bg-color: #ffffff;
            --text-color: #a0a0a0;
            --code-color: #000000;
            --edit-bg-color: #ffffff;
            --edit-fg-color: #111111;
            --selected-bg: #f0f0f0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            font-size: var(--font-size);
            user-select: text;
        }

        /* Outer scrollable viewport */
        #scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        /* Virtual high spacer to fake scroll height */
        #virtual-spacer {
            width: 1px;
            height: 0px; /* Calculated dynamically */
        }

        /* Real rendering viewport showing visible items */
        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* One line structure */
        .line-row {
            display: flex;
            height: var(--line-height);
            box-sizing: border-box;
            align-items: center;
        }

        .line-row:hover {
            background-color: var(--selected-bg);
        }

        /* Line number gutter */
        .line-num {
            width: var(--line-num-width);
            text-align: right;
            padding-right: 12px;
            color: var(--text-color);
            font-size: 12px;
            border-right: 1px solid var(--selected-bg);
            box-sizing: border-box;
            user-select: none;
        }

        /* Text content */
        .line-text {
            flex: 1;
            padding-left: 15px;
            white-space: pre;
            color: var(--code-color);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .line-text::selection,
        .line-input::selection {
            background: rgba(0, 120, 212, 0.35);
            color: var(--edit-fg-color);
        }

        .line-input {
            width: 95%;
            background: var(--edit-bg-color);
            color: var(--edit-fg-color);
            border: 1px solid #0078d4;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            box-sizing: border-box;
            padding: 2px 5px;
        }

        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.35);
            border: 2px solid var(--bg-color);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.55);
        }
    </style>
</head>
<body>
    <div id="scroll-container">
        <div id="virtual-spacer"></div>
        <div id="viewport"></div>
    </div>

    <script>
        const scrollContainer = document.getElementById('scroll-container');
        const virtualSpacer = document.getElementById('virtual-spacer');
        const viewport = document.getElementById('viewport');

        const LINE_HEIGHT = 22; // Must match CSS --line-height
        let totalLines = 0;
        let visibleCount = 0;
        let lastScrollTop = -1;
        let startLine = 1;
        let isFetching = false;
        let lineBuffer = {}; // Cache recently loaded lines to prevent rapid IPC flickers
        let filePath = "";
        let readOnly = true;
        let searchHighlight = null;

        // Initialize virtual layout based on line counts
        function setupVirtualScroll(lineCount) {
            totalLines = lineCount;
            const scrollHeight = totalLines * LINE_HEIGHT;
            virtualSpacer.style.height = `${scrollHeight}px`;
            
            // Calculate visible count plus 10 buffer lines
            visibleCount = Math.ceil(scrollContainer.clientHeight / LINE_HEIGHT) + 10;
            
            // Initial render
            lineBuffer = {};
            render();
        }

        function render() {
            const scrollTop = scrollContainer.scrollTop;
            
            // Throttle rendering
            if (Math.abs(scrollTop - lastScrollTop) < 5 && lastScrollTop !== -1) return;
            lastScrollTop = scrollTop;

            // Calculate start and end indices
            const rawStart = Math.floor(scrollTop / LINE_HEIGHT);
            startLine = Math.max(1, rawStart - 5); // 5 safety lines above
            const endLine = Math.min(totalLines, startLine + visibleCount);

            // Position viewport correctly using translation offsets
            const offsetY = (startLine - 1) * LINE_HEIGHT;
            viewport.style.transform = `translateY(${offsetY}px)`;

            // Gather lines we need to load
            const missingLines = [];
            for (let i = startLine; i <= endLine; i++) {
                if (lineBuffer[i] === undefined) {
                    missingLines.push(i);
                }
            }

            if (missingLines.length > 0 && !isFetching) {
                // Request lines from C# backend
                isFetching = true;
                sendNotificationToCsharp({
                    type: 'requestLines',
                    filePath: filePath,
                    startLine: startLine,
                    count: visibleCount
                });
            } else {
                updateViewportDOM(startLine, endLine);
            }
        }

        function updateViewportDOM(start, end) {
            let html = '';
            for (let i = start; i <= end; i++) {
                let text = lineBuffer[i] !== undefined ? lineBuffer[i] : "로딩 중...";
                let escapedText = "";
                
                if (searchHighlight && searchHighlight.query) {
                    const query = searchHighlight.query;
                    const needle = query.toLowerCase();
                    const haystack = text.toLowerCase();
                    let lineHtml = "";
                    let lastIndex = 0;
                    let index = haystack.indexOf(needle);

                    while (index >= 0) {
                        lineHtml += escapeHtml(text.slice(lastIndex, index));
                        
                        const isActive = (searchHighlight.lineNumber === i && searchHighlight.indexOfMatch === index);
                        const bg = isActive ? "#fd7e14" : "#ffd43b";
                        const fg = isActive ? "#ffffff" : "#212529";
                        const shadow = isActive ? "box-shadow: 0 0 3px rgba(253, 126, 20, 0.6);" : "";
                        
                        lineHtml += `<mark style="background-color: ${bg}; color: ${fg}; font-weight: bold; border-radius: 2px; padding: 1px 2px; ${shadow}">${escapeHtml(text.slice(index, index + query.length))}</mark>`;
                        
                        lastIndex = index + query.length;
                        index = haystack.indexOf(needle, lastIndex);
                    }
                    lineHtml += escapeHtml(text.slice(lastIndex));
                    escapedText = lineHtml;
                } else {
                    escapedText = escapeHtml(text);
                }

                html += `
                    <div class="line-row">
                        <div class="line-num">${i}</div>
                        <div class="line-text" style="cursor: text;" ondblclick="enableEdit(this, ${i})">${escapedText}</div>
                    </div>
                `;
            }
            viewport.innerHTML = html;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function enableEdit(el, lineNum) {
            if (readOnly) return;
            if (el.querySelector('input')) return; // Already editing
            const originalText = lineBuffer[lineNum] !== undefined ? lineBuffer[lineNum] : el.innerText;
            el.innerHTML = `<input type="text" class="line-input" value="${escapeHtml(originalText)}" />`;
            const input = el.querySelector('input');
            input.focus();
            input.select();

            let committed = false;
            function commitChange() {
                if (committed) return;
                committed = true;
                const val = input.value;
                lineBuffer[lineNum] = val;
                el.innerHTML = escapeHtml(val);
                sendNotificationToCsharp({
                    type: 'updateLine',
                    filePath: filePath,
                    lineNumber: lineNum,
                    text: val
                });
            }

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    commitChange();
                } else if (e.key === 'Escape') {
                    committed = true;
                    el.innerHTML = escapeHtml(originalText);
                }
            });

            input.addEventListener('blur', function() {
                commitChange();
            });
        }

        // Listen scroll event
        scrollContainer.addEventListener('scroll', render);
        
        // Prevent duplicate window launching on drag-and-drop
        window.addEventListener('dragover', e => e.preventDefault(), false);
        window.addEventListener('drop', e => e.preventDefault(), false);
        window.addEventListener('resize', () => {
            visibleCount = Math.ceil(scrollContainer.clientHeight / LINE_HEIGHT) + 10;
            render();
        });

        // Communication wrappers
        function sendNotificationToCsharp(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function(event) {
                try {
                    const message = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
                    handleCsharpMessage(message);
                } catch (e) {
                    console.error("Failed parsing message in large viewer: ", e);
                }
            });
        }

        function handleCsharpMessage(msg) {
            switch(msg.action) {
                case 'init':
                    filePath = msg.filePath;
                    applyTheme(msg);
                    if (msg.fontSize) {
                        document.documentElement.style.setProperty('--font-size', `${msg.fontSize}px`);
                        document.documentElement.style.setProperty('--line-height', `${msg.fontSize + 8}px`);
                    }
                    if (msg.fontFamily) {
                        document.documentElement.style.setProperty('--font-family', msg.fontFamily);
                    }
                    readOnly = msg.readOnly !== false;
                    setupVirtualScroll(msg.lineCount);
                    break;
                case 'receiveLines':
                    // Cache received line data
                    const start = msg.startLine;
                    const lines = msg.lines;
                    for (let i = 0; i < lines.length; i++) {
                        lineBuffer[start + i] = lines[i];
                    }
                    isFetching = false;
                    
                    // Re-render viewport DOM with fresh lines
                    const end = Math.min(totalLines, startLine + visibleCount);
                    updateViewportDOM(startLine, end);
                    break;
                case 'updateOptions':
                    applyTheme(msg);
                    if (msg.fontSize) {
                        document.documentElement.style.setProperty('--font-size', `${msg.fontSize}px`);
                        document.documentElement.style.setProperty('--line-height', `${msg.fontSize + 8}px`);
                    }
                    if (msg.fontFamily) {
                        document.documentElement.style.setProperty('--font-family', msg.fontFamily);
                    }
                    if (msg.readOnly !== undefined) {
                        readOnly = msg.readOnly;
                    }
                    break;
                case 'revealLine':
                    const lineNum = msg.lineNumber;
                    if (lineNum && lineNum > 0 && lineNum <= totalLines) {
                        searchHighlight = {
                            lineNumber: lineNum,
                            indexOfMatch: msg.indexOfMatch || 0,
                            matchLength: msg.matchLength || 0,
                            query: msg.query || ""
                        };
                        const targetScrollTop = (lineNum - 1) * LINE_HEIGHT;
                        scrollContainer.scrollTop = targetScrollTop;
                        render();
                    }
                    break;
            }
        }

        function applyTheme(msg) {
            const bg = msg.customBackgroundColor || (msg.theme === 'Light' ? '#ffffff' : '#1e1e1e');
            const preferredFg = msg.customForegroundColor || (msg.theme === 'Light' ? '#000000' : '#d4d4d4');
            const fg = resolveReadableColor(bg, preferredFg, msg.theme === 'Light' ? '#000000' : '#d4d4d4');

            if (msg.customBackgroundColor) {
                document.documentElement.style.setProperty('--bg-color', msg.customBackgroundColor);
            } else if (msg.theme === 'Light') {
                document.documentElement.style.setProperty('--bg-color', '#ffffff');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#1e1e1e');
            }

            document.documentElement.style.setProperty('--code-color', fg);
            document.documentElement.style.setProperty('--edit-bg-color', bg);
            document.documentElement.style.setProperty('--edit-fg-color', fg);

            if (msg.theme === 'Light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        function parseHexColor(value) {
            if (!value || typeof value !== 'string') return null;
            const raw = value.trim();
            const match = raw.match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (!match) return null;

            let hex = match[1];
            if (hex.length === 3) {
                hex = hex.split('').map(ch => ch + ch).join('');
            }

            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function colorToHex(color) {
            const part = value => value.toString(16).padStart(2, '0');
            return `#${part(color.r)}${part(color.g)}${part(color.b)}`;
        }

        function relativeLuminance(color) {
            const normalize = value => {
                const channel = value / 255;
                return channel <= 0.03928 ? channel / 12.92 : Math.pow((channel + 0.055) / 1.055, 2.4);
            };

            return 0.2126 * normalize(color.r) + 0.7152 * normalize(color.g) + 0.0722 * normalize(color.b);
        }

        function contrastRatio(a, b) {
            const l1 = relativeLuminance(a);
            const l2 = relativeLuminance(b);
            const lighter = Math.max(l1, l2);
            const darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
        }

        function readableForegroundFor(background) {
            const white = { r: 255, g: 255, b: 255 };
            const black = { r: 17, g: 17, b: 17 };
            return contrastRatio(background, white) >= contrastRatio(background, black) ? white : black;
        }

        function resolveReadableColor(backgroundValue, foregroundValue, fallbackForeground) {
            const background = parseHexColor(backgroundValue);
            const foreground = parseHexColor(foregroundValue);
            const fallback = parseHexColor(fallbackForeground) || { r: 212, g: 212, b: 212 };

            if (!background) {
                return foregroundValue || fallbackForeground;
            }

            if (foreground && contrastRatio(background, foreground) >= 4.5) {
                return colorToHex(foreground);
            }

            if (contrastRatio(background, fallback) >= 4.5) {
                return colorToHex(fallback);
            }

            return colorToHex(readableForegroundFor(background));
        }
    </script>
</body>
</html>
